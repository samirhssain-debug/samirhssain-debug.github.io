<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>شاشة المسجد</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"><style>:root{--clock-weight:900;--ticker-weight:900;--date-weight:700;--bg-image:url('https://images.unsplash.com/photo-1542816417-0983c9c9ad53');--mosque-name-size:28px;--mosque-name-font:'Arial';--mosque-name-color:#ffffff;--prayer-name-size:26px;--prayer-time-size:22px;--circle-color:#00ff00}body{margin:0;font-family:Arial,sans-serif;color:white;height:100vh;overflow:hidden;background:var(--bg-image) no-repeat center/cover}.overlay{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.65)}.container{position:relative;height:100%;display:flex;flex-direction:column;padding:15px;gap:10px;transition:opacity 0.5s}.prayer-mode{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;
=s.ishaIqama}if(s.jumuah){document.getElementById('jumuahTimeInput').value=s.jumuah;document.getElementById('jumuahTime').innerText=s.jumuah}if(s.adhanEnabled!==undefined)document.getElementById('adhanEnabled').checked=s.adhanEnabled;if(s.prayerModeEnabled!==undefined)document.getElementById('prayerModeEnabled').checked=s.prayerModeEnabled;if(s.adhkarEnabled!==undefined)document.getElementById('adhkarEnabled').checked=s.adhkarEnabled;if(s.adhkarDuration)document.getElementById('adhkarDuration').value=s.adhkarDuration}function fetchPrayerTimes(){const c=document.getElementById('cityInput').value||'Taza',co=document.getElementById('countryInput').value||'Morocco';fetch(`https://api.aladhan.com/v1/timingsByCity?city=${c}&country=${co}&method=5`).then(r=>r.json()).then(d=>{if(d.code===200){const t=d.data.timings;document.getElementById('fajrTime').value=t.Fajr;document.getElementById('dhuhrTime').value=addHour(t.Dhuhr);document.getElementById('asrTime').value=t.Asr;document.getElementById('maghribTime').value=t.Maghrib;document.getElementById('ishaTime').value=t.Isha;document.getElementById('jumuahTimeInput').value=addHour(t.Dhuhr);saveSettings()}}).catch(e=>alert('خطأ في الجلب: '+e))}function initDraggableCircle(){const c=document.getElementById('countdownCircle');let d=false,sx,sy,sl,st;c.addEventListener('mousedown',s);c.addEventListener('touchstart',e=>s(e.touches[0]));function s(e){d=true;c.classList.add('dragging');sx=e.clientX;sy=e.clientY;const r=c.getBoundingClientRect();sl=r.left;st=r.top;document.addEventListener('mousemove',m);document.addEventListener('mouseup',e);document.addEventListener('touchmove',e=>m(e.touches[0]));document.addEventListener('touchend',e)}function m(e){if(!d)return;const dx=e.clientX-sx,dy=e.clientY-sy;c.style.position='fixed';c.style.left=sl+dx+'px';c.style.top=st+dy+'px';c.style.right='auto'}function e(){d=false;c.classList.remove('dragging');document.removeEventListener('mousemove',m);document.removeEventListener('mouseup',e);document.removeEventListener('touchmove',m);document.removeEventListener('touchend',e)}}setInterval(updateClock,1000);updateClock();</script></body></html>
