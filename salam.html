<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مسجد النور - لوحة رقمية احترافية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --primary-color: #0a4d3a;
            --secondary-color: #d4af37;
            --accent-color1: #e67e22;
            --accent-color2: #3498db;
            --accent-color3: #9b59b6;
            --text-light: #ffffff;
            --text-dark: #1a2a1f;
            --card-bg: rgba(0, 0, 0, 0.55);
            --prayer-card-bg: rgba(0, 0, 0, 0.55);
            --prayer-text-color: #ffffff;
            --prayer-border-radius: 30px;
            --prayer-card-size: 130px;
            --show-iqama: block;
            --ticker-speed: 25s;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.3s ease;
            color: var(--text-light);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            backdrop-filter: blur(8px);
            border: 1px solid var(--secondary-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.05);
        }
        .menu-btn span {
            width: 24px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .menu-btn:hover span {
            background: black;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.4));
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }

        .mosque-name {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, rgba(212,175,55,0.3), rgba(212,175,55,0.1));
            padding: 8px 20px;
            border-radius: 50px;
            border-right: 3px solid var(--secondary-color);
        }

        .datetime {
            text-align: left;
            font-family: monospace;
        }

        .live-clock {
            font-size: 1.8rem;
            font-weight: bold;
            direction: ltr;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 40px;
            overflow-y: auto;
        }

        .prayers-section {
            margin-bottom: 25px;
        }

        .prayer-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .prayer-card {
            background: var(--prayer-card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--prayer-border-radius);
            padding: 15px 25px;
            text-align: center;
            min-width: var(--prayer-card-size);
            border: 1px solid rgba(212,175,55,0.4);
            transition: all 0.2s;
            color: var(--prayer-text-color);
        }
        .prayer-card:nth-child(1) { border-top: 3px solid var(--accent-color1); }
        .prayer-card:nth-child(2) { border-top: 3px solid var(--accent-color2); }
        .prayer-card:nth-child(3) { border-top: 3px solid var(--accent-color3); }
        .prayer-card:nth-child(4) { border-top: 3px solid var(--secondary-color); }
        .prayer-card:nth-child(5) { border-top: 3px solid var(--accent-color1); }

        .prayer-card.active-prayer {
            background: linear-gradient(135deg, rgba(212,175,55,0.9), rgba(212,175,55,0.7));
            color: var(--text-dark);
            text-shadow: none;
            transform: scale(1.02);
            border: 2px solid #ffd700;
        }
        .prayer-name {
            font-size: 1.6rem;
            font-weight: bold;
        }
        .adhan-time {
            font-size: 2rem;
            font-family: monospace;
            font-weight: bold;
            direction: ltr;
        }
        .iqama-time {
            font-size: 1rem;
            opacity: 0.85;
            margin-top: 5px;
            display: var(--show-iqama);
        }

        .countdowns-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .countdown-box {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            border-radius: 60px;
            padding: 12px 30px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            border-right: 4px solid var(--secondary-color);
        }
        .takbeer-box {
            background: linear-gradient(135deg, rgba(139,69,19,0.9), rgba(139,69,19,0.7));
            border-radius: 60px;
            padding: 12px 30px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            border-right: 4px solid #ff6600;
        }
        .ticker-section {
            margin: 15px 0;
        }
        .ticker-container {
            background: linear-gradient(90deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            border-radius: 50px;
            padding: 12px 20px;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-text {
            display: inline-block;
            font-size: 1.4rem;
            animation: scrollText var(--ticker-speed, 25s) linear infinite;
        }
        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .dua-section {
            margin: 15px 0;
        }
        .dua-rotator {
            font-size: 1.8rem;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            padding: 20px;
            border-radius: 60px;
            text-align: center;
            transition: all 0.3s;
        }
        .time-dhikr {
            font-size: 1.4rem;
            background: linear-gradient(135deg, rgba(0,100,0,0.7), rgba(0,100,0,0.5));
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin-top: 10px;
        }

        /* ===== الإعدادات - تم تحسين ثبات الأزرار ===== */
        .settings-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #1e3a2a, #0a2f1a);
            border-radius: 25px;
            z-index: 200;
            display: none;
            flex-direction: column;
            width: 340px;
            max-height: 85vh;
            border: 2px solid var(--secondary-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .settings-header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px 10px 20px;
            border-bottom: 1px solid rgba(212,175,55,0.3);
            position: relative;
        }
        .close-btn-x {
            position: absolute;
            left: 10px;
            top: 10px;
            background: rgba(255,0,0,0.3);
            border: 1px solid #ff9999;
            color: white;
            font-size: 1.2rem;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-weight: bold;
        }
        .close-btn-x:hover {
            background: #ff4444;
            transform: scale(1.1);
        }
        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* جعل أزرار التمرير ثابتة في الأسفل ولا تختفي */
        .scroll-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 12px 20px;
            border-top: 1px solid rgba(212,175,55,0.3);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            border-radius: 0 0 25px 25px;
            position: relative;
            z-index: 5;
        }
        .scroll-arrow {
            background: rgba(212,175,55,0.3);
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .scroll-arrow:hover {
            background: var(--secondary-color);
            color: black;
        }
        .settings-content label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .settings-content input, .settings-content select {
            padding: 8px;
            border-radius: 20px;
            border: none;
        }
        .btn {
            background: linear-gradient(135deg, #2c5530, #1a3a1a);
            border: none;
            color: white;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        .btn:hover {
            background: linear-gradient(135deg, var(--secondary-color), #b8960c);
            color: black;
        }
        .city-select-input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            text-align: right;
            font-family: 'Cairo', sans-serif;
        }
        .gps-status {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 5px;
        }
        @media (max-width: 800px) {
            .top-bar { padding: 10px 20px; }
            .prayer-card { min-width: 100px; padding: 8px 12px; }
            .prayer-name { font-size: 1.1rem; }
            .adhan-time { font-size: 1.3rem; }
            .settings-panel { width: 300px; left: 10px; right: 10px; }
            .menu-btn { top: 10px; right: 10px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
<div class="dashboard" id="dashboard">
    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="top-bar">
        <div class="mosque-name" id="mosqueName">🕌 مسجد النور</div>
        <div class="datetime">
            <div id="gregorianDate"></div>
            <div id="hijriDate" style="font-size:0.9rem;"></div>
            <div class="live-clock" id="liveClock"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="prayers-section">
            <div class="prayer-grid" id="prayerGrid"></div>
        </div>

        <div class="countdowns-section">
            <div class="countdown-box" id="nextPrayerCountdown">متبقي للصلاة: --</div>
            <div class="takbeer-box" id="takbeerCountdown" style="display:none;">تكبيرات قبل الأذان: --</div>
            <div class="countdown-box" id="iqamaCountdown" style="display:none;">متبقي للإقامة: --</div>
        </div>

        <div class="ticker-section">
            <div class="ticker-container" id="tickerContainer">
                <div class="ticker-text" id="hadithTicker">قال رسول الله صلى الله عليه وسلم: إنما بعثت لأتمم مكارم الأخلاق</div>
            </div>
        </div>

        <div class="dua-section">
            <div class="dua-rotator" id="duaRotator">سبحان الله وبحمده</div>
        </div>

        <div class="time-dhikr" id="timeDhikr">أذكار الصباح: سبحان الله العظيم</div>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
        <button class="close-btn-x" id="closeBtnX">×</button>
        <h3 style="color:gold; margin: 0 auto;">⚙️ الإعدادات المتقدمة</h3>
    </div>
    
    <div class="settings-content" id="settingsContent">
        <!-- ========== قسم تغيير اسم المسجد (جديد) ========== -->
        <label>🏷️ اسم المسجد المخصص:</label>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="customMosqueNameInput" placeholder="أدخل اسم المسجد" style="flex: 1; padding: 8px; border-radius: 20px; border: none; text-align: right;">
            <button id="saveMosqueNameBtn" class="btn" style="padding: 8px 15px;">💾 حفظ الاسم</button>
        </div>
        
        <label>🏙️ اختار مدينتك أو قريتك:</label>
        <select id="citySelect" class="city-select-input">
            <option value="">-- اختار المدينة --</option>
            <option value="الناظور">الناظور</option>
            <option value="أحفير">أحفير</option>
            <option value="تمسمان">تمسمان</option>
            <option value="وجدة">وجدة</option>
            <option value="بركان">بركان</option>
            <option value="الحسيمة">الحسيمة</option>

            <option value="أزغنغان">أزغنغان</option>
            <option value="بني شيكر">بني شيكر</option>
            <option value="تاوريرت">تاوريرت</option>
            <option value="جرادة">جرادة</option>
            <option value="السعيدية">السعيدية</option>
            <option value="تطوان">تطوان</option>
            <option value="طنجة">طنجة</option>
            <option value="فاس">فاس</option>
            <option value="الدار البيضاء">الدار البيضاء</option>
            <option value="الرباط">الرباط</option>

        <div id="gpsStatus" class="gps-status"></div>
        <label>🔊 رفع الصوت:</label>
        <button id="volumeUpBtn" class="btn">رفع الصوت ▲</button>
        
        <label>🔉 خفض الصوت:</label>
        <button id="volumeDownBtn" class="btn">خفض الصوت ▼</button>

            <option value="auto">تلقائي (API)</option>
            <option value="manual">يدوي</option>
        </select>

        <div id="manualTimesSection" style="display:none;">
            <h4>📅 أوقات يدوية</h4>
            <label>الفجر: <input type="time" id="fajrAdhan" value="05:20"></label>
            <label>إقامة الفجر: <input type="time" id="fajrIqama" value="05:40"></label>
            <label>الظهر: <input type="time" id="dhuhrAdhan" value="13:00"></label>

            <label>المغرب: <input type="time" id="maghribAdhan" value="18:45"></label>
            <label>إقامة المغرب: <input type="time" id="maghribIqama" value="19:00"></label>
            <label>العشاء: <input type="time" id="ishaAdhan" value="20:15"></label>
            <label>إقامة العشاء: <input type="time" id="ishaIqama" value="20:30"></label>
            <button id="saveManualTimesBtn" class="btn">💾 حفظ الأوقات</button>
        </div>

        <h4 style="color:gold;">🎨 شكل بطاقات الصلوات</h4>
        <label>🎨 لون خلفية البطاقات:</label>
        <input type="color" id="prayerCardBg" value="#0000008C">
        <label>✏️ لون النص:</label>
        <input type="color" id="prayerTextColor" value="#ffffff">
        <label>🔘 شكل الحواف:</label>
        <select id="prayerBorderRadius">
            <option value="15px">مربعة</option>
            <option value="30px" selected>دائرية</option>
            <option value="50px">مستديرة جداً</option>
        </select>
        <label>📏 حجم البطاقات:</label>
        <select id="prayerCardSize">
            <option value="100px">صغير</option>
            <option value="130px" selected>متوسط</option>
            <option value="160px">كبير</option>
        </select>
        <label>📢 إظهار إقامة الصلاة:</label>
        <select id="showIqamaToggle">
            <option value="block">نعم</option>
            <option value="none">لا</option>
        </select>

        <label>🎨 اللون الرئيسي:</label>
        <input type="color" id="themeColor" value="#0a4d3a">

        <label>🖼️ خلفية (لون):</label>
        <input type="color" id="bgColorPicker" value="#0a2f2a">

        <label>🖼️ خلفية (صورة من جهازك):</label>
        <input type="file" id="bgImageUpload" accept="image/*">

        <label>📜 سرعة الشريط المتحرك (ثانية):</label>
        <input type="range" id="tickerSpeed" min="10" max="50" value="25">

        <label>🔄 سرعة تغير الأدعية (ثانية):</label>
        <input type="range" id="duaSpeed" min="1" max="5" step="0.5" value="2">

        <label>📿 مدة أذكار ما بعد الصلاة (<span style="color:yellow;">بالدقائق</span>):</label>
        <input type="number" id="dhikrMinutes" value="2" min="1" max="30">

        <label>🔔 تفعيل الإعلانات:</label>
        <select id="announcementsToggle">
            <option value="all">الكل مفعل</option>
            <option value="azan_only">الأذان فقط</option>
            <option value="prayer_only">الصلاة فقط</option>
        </select>

        <label>🌞 وضع النهار:</label>
        <button id="dayModeBtn" class="btn">☀️ تفعيل وضع النهار</button>
        
        <label>🌙 وضع الليل:</label>
        <button id="nightModeBtn" class="btn">🌙 تفعيل وضع الليل</button>

        <button id="closeSettings" class="btn">❌ إغلاق الإعدادات</button>
    </div>
    
    <!-- أزرار الصعود والنزول ثابتة ولا تختفي -->
    <div class="scroll-controls">
        <button class="scroll-arrow" id="scrollUpBtn">↑ صعود</button>
        <button class="scroll-arrow" id="scrollDownBtn">↓ نزول</button>
    </div>
</div>

        "🤲 سبحان الله والحمد لله ولا إله إلا الله والله أكبر",
        "🤲 اللهم اغفر لي وارحمني واهدني",
        "🤲 حسبي الله لا إله إلا هو عليه توكلت",
        "🤲 اللهم صل على محمد وعلى آل محمد",
        "🤲 اللهم إني أسألك العفو والعافية"
    ];

    let hadithIndex = 0, duaIndex = 0;

    function formatEnglishNumber(num) {
        return num.toString();
    }

    // دالة مساعدة لتحويل "HH:MM" إلى عدد الدقائق منذ منتصف الليل
    function timeToMinutes(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    // الحصول على الوقت الحالي كـ "HH:MM" بشكل موحد
    function getCurrentTimeString() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    // دالة عرض اسم المسجد حسب الأولوية (المخصص > الافتراضي)
    function updateMosqueNameDisplay() {
        const mosqueNameSpan = document.getElementById('mosqueName');
        if (!mosqueNameSpan) return;
        if (customMosqueName && customMosqueName.trim() !== "") {
            mosqueNameSpan.innerHTML = `🕌 ${customMosqueName}`;
        } else if (currentCityName) {
            mosqueNameSpan.innerHTML = `🕌 مسجد ${currentCityName}`;
        } else {
            mosqueNameSpan.innerHTML = `🕌 مسجد النور`;
        }
    }

    // حفظ اسم المسجد المخصص في التخزين المحلي
    function saveCustomMosqueName() {
        const input = document.getElementById('customMosqueNameInput');
        if (input) {
            customMosqueName = input.value.trim();
            localStorage.setItem('customMosqueName', customMosqueName);
            updateMosqueNameDisplay();
            alert("✅ تم حفظ اسم المسجد بنجاح");
        }
    }

    // تطبيق الأوقات المستلمة (مع تحسين حساب الإقامة)
    function applyTimings(timings, cityName) {
        prayerTimes = {
            الفجر: { adhan: timings.Fajr.substring(0, 5), iqama: timings.Fajr.substring(0, 5) },
            الظهر: { adhan: timings.Dhuhr.substring(0, 5), iqama: timings.Dhuhr.substring(0, 5) },
            العصر: { adhan: timings.Asr.substring(0, 5), iqama: timings.Asr.substring(0, 5) },
            المغرب: { adhan: timings.Maghrib.substring(0, 5), iqama: timings.Maghrib.substring(0, 5) },
            العشاء: { adhan: timings.Isha.substring(0, 5), iqama: timings.Isha.substring(0, 5) }
        };

        // تحديث الإقامة لتكون بعد الأذان بـ 15 دقيقة
        for (let [name, times] of Object.entries(prayerTimes)) {
            const [hour, minute] = times.adhan.split(':').map(Number);
            let iqamaHour = hour;
            let iqamaMinute = minute + 15;
            if (iqamaMinute >= 60) {
                iqamaHour += 1;
                iqamaMinute -= 60;
            }
            if (iqamaHour >= 24) iqamaHour -= 24;
            prayerTimes[name].iqama = `${iqamaHour.toString().padStart(2,'0')}:${iqamaMinute.toString().padStart(2,'0')}`;
        }

        // تحديث الخانات اليدوية
        if (document.getElementById('fajrAdhan')) {
            document.getElementById('fajrAdhan').value = prayerTimes.الفجر.adhan;
            document.getElementById('fajrIqama').value = prayerTimes.الفجر.iqama;
            document.getElementById('dhuhrAdhan').value = prayerTimes.الظهر.adhan;
            document.getElementById('dhuhrIqama').value = prayerTimes.الظهر.iqama;
            document.getElementById('asrAdhan').value = prayerTimes.العصر.adhan;
            document.getElementById('asrIqama').value = prayerTimes.العصر.iqama;
            document.getElementById('maghribAdhan').value = prayerTimes.المغرب.adhan;
            document.getElementById('maghribIqama').value = prayerTimes.المغرب.iqama;
            document.getElementById('ishaAdhan').value = prayerTimes.العشاء.adhan;
            document.getElementById('ishaIqama').value = prayerTimes.العشاء.iqama;
        }

        renderPrayerTimes();

        // تحديث اسم المدينة الحالية، ولكن لا نغير اسم المسجد إذا كان هناك اسم مخصص
        currentCityName = cityName;
        localStorage.setItem('selectedCityName', cityName);
        
        // تحديث العرض: إذا كان هناك اسم مخصص نبقيه، وإلا نستخدم اسم المدينة
        updateMosqueNameDisplay();

        isAutoMode = true;
        const timeModeSelect = document.getElementById('timeModeSelect');
        if (timeModeSelect) timeModeSelect.value = 'auto';
        const manualTimesSection = document.getElementById('manualTimesSection');
        if (manualTimesSection) manualTimesSection.style.display = 'none';
    }

    async function getPrayersByCityName() {
        const citySelect = document.getElementById('citySelect');
        const cityName = citySelect.value;
        const statusDiv = document.getElementById('gpsStatus');

        if (!cityName) {
            if (statusDiv) {
                statusDiv.innerHTML = '⚠️ الرجاء اختيار مدينة من القائمة';
                statusDiv.style.color = '#ff9999';
            }
            return;
        }

        if (statusDiv) {
            statusDiv.innerHTML = `⏳ جاري جلب مواقيت ${cityName}...`;
            statusDiv.style.color = '#ffd700';
        }

        if (MOROCCO_CITIES[cityName]) {
            const coords = MOROCCO_CITIES[cityName];
            try {
                const response = await fetch(`https://api.aladhan.com/v1/timings?latitude=${coords.lat}&longitude=${coords.lon}&method=2`);
                const data = await response.json();
                if (data.code === 200) {
                    applyTimings(data.data.timings, cityName);
                    if (statusDiv) {
                        statusDiv.innerHTML = `✅ تم جلب مواقيت ${cityName} بدقة`;
                        statusDiv.style.color = '#90ee90';
                        setTimeout(() => statusDiv.innerHTML = '', 3000);
                    }
                    return;
                }
            } catch (e) {
                console.log('خطأ في الإحداثيات، نجلب بالاسم');
            }
        }

        try {
            const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(cityName)}&country=Morocco&method=2`);
            const data = await response.json();
            if (data.code === 200) {
                applyTimings(data.data.timings, cityName);
                if (statusDiv) {
                    statusDiv.innerHTML = `✅ تم جلب مواقيت ${cityName}`;
                    statusDiv.style.color = '#90ee90';
                    setTimeout(() => statusDiv.innerHTML = '', 3000);
                }
            } else {
                if (statusDiv) {
                    statusDiv.innerHTML = `❌ لم نتمكن من العثور على مواقيت ${cityName}`;
                    statusDiv.style.color = '#ff9999';
                }
            }
        } catch (err) {
            if (statusDiv) {
                statusDiv.innerHTML = '❌ خطأ في الاتصال، تأكد من الإنترنت';
                statusDiv.style.color = '#ff9999';
            }
        }
    }

    // تحديث الساعة والتاريخ والهجري
    function updateDateTime() {
        const now = new Date();
        const day = formatEnglishNumber(now.getDate());
        const month = now.toLocaleString('ar', { month: 'long' });
        const year = formatEnglishNumber(now.getFullYear());
        const gregorianDiv = document.getElementById('gregorianDate');
        if (gregorianDiv) gregorianDiv.innerHTML = `📅 ${day} ${month} ${year}`;

        const hours = formatEnglishNumber(now.getHours().toString().padStart(2,'0'));
        const minutes = formatEnglishNumber(now.getMinutes().toString().padStart(2,'0'));
        const seconds = formatEnglishNumber(now.getSeconds().toString().padStart(2,'0'));
        const clockDiv = document.getElementById('liveClock');
        if (clockDiv) clockDiv.innerHTML = `${hours}:${minutes}:${seconds}`;

        try {
            const hijri = new Intl.DateTimeFormat('ar-TN-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(now);
            const hijriDiv = document.getElementById('hijriDate');
            if (hijriDiv) hijriDiv.innerHTML = `📖 ${hijri} هـ`;
        } catch(e) {
            const hijriDiv = document.getElementById('hijriDate');
            if (hijriDiv) hijriDiv.innerHTML = `📖 التاريخ الهجري`;
        }

        const hour = now.getHours();
        const dhikrElement = document.getElementById('timeDhikr');
        if (dhikrElement) {
            if (hour >= 6 && hour < 12) dhikrElement.innerHTML = "🌅 أذكار الصباح: سبحان الله وبحمده عدد خلقه";
            else if (hour >= 18 || hour < 5) dhikrElement.innerHTML = "🌙 أذكار المساء: أعوذ بكلمات الله التامات من شر ما خلق";
            else dhikrElement.innerHTML = "🕌 سبحان الله والحمد لله";
        }
    }

    function renderPrayerTimes() {
        const grid = document.getElementById('prayerGrid');
        if (!grid) return;
        grid.innerHTML = "";
        const currentTime = getCurrentTimeString();

        for (let [name, times] of Object.entries(prayerTimes)) {
            const card = document.createElement('div');
            card.className = 'prayer-card';

            // تحديد الصلاة النشطة (بين الأذان والإقامة)
            if (currentTime >= times.adhan && currentTime < times.iqama) {
                card.classList.add('active-prayer');
            }

            card.innerHTML = `
                <div class="prayer-name">${name}</div>
                <div class="adhan-time">${times.adhan}</div>
                <div class="iqama-time">إقامة ${times.iqama}</div>
            `;
            grid.appendChild(card);
        }
    }

    function getNextPrayerTime() {
        const now = new Date();
        const nowMinutes = now.getHours() * 60 + now.getMinutes();
        let next = null;
        let nextName = "";
        for (let [name, times] of Object.entries(prayerTimes)) {
            const adhanMinutes = timeToMinutes(times.adhan);
            if (adhanMinutes > nowMinutes) {
                if (!next || adhanMinutes < next) {
                    next = adhanMinutes;
                    nextName = name;
                }
            }
        }
        if (!next) {
            // الرجوع إلى أول صلاة في اليوم التالي
            const first = Object.entries(prayerTimes)[0];
            next = timeToMinutes(first[1].adhan) + 1440;
            nextName = first[0];
        }
        return { next, nextName };
    }

    function updateCountdowns() {
        const now = new Date();
        const nowMinutes = now.getHours() * 60 + now.getMinutes();
        const { next, nextName } = getNextPrayerTime();
        const diffMinutes = next - nowMinutes;
        const diffSec = diffMinutes * 60 - now.getSeconds();
        
        const countdownDiv = document.getElementById('nextPrayerCountdown');
        if (countdownDiv) {
            if (diffSec <= 5 && diffSec > -10) {
                countdownDiv.innerHTML = `🔔 وقت صلاة ${nextName} الآن 🔔`;
            } else if (diffSec > 0) {
                const mins = Math.floor(diffSec / 60);
                const secs = diffSec % 60;
                countdownDiv.innerHTML = `⏳ متبقي لصلاة ${nextName}: ${formatEnglishNumber(mins)} دقيقة ${formatEnglishNumber(secs)} ثانية`;
            } else {
                countdownDiv.innerHTML = `⏳ متبقي لصلاة ${nextName}: --`;
            }
        }
    }

    // تحديث الأوقات يومياً تلقائياً (عند منتصف الليل)
    function scheduleDailyUpdate() {
        const now = new Date();
        const night = new Date(now);
        night.setDate(night.getDate() + 1);
        night.setHours(0, 5, 0, 0); // 00:05:00
        const timeToMidnight = night - now;
        setTimeout(() => {
            if (isAutoMode && currentCityName) {
                getPrayersByCityName(); // إعادة جلب الأوقات اليومية
            }
            scheduleDailyUpdate(); // جدولة مرة أخرى
        }, timeToMidnight);
    }

    function adjustVolume(delta) {
        volumeLevel = Math.min(100, Math.max(0, volumeLevel + delta));
        alert(`🔊 مستوى الصوت: ${volumeLevel}%`);
    }

    function applyPrayerCardStyle() {
        const bgInput = document.getElementById('prayerCardBg');
        const textColorInput = document.getElementById('prayerTextColor');
        const radiusInput = document.getElementById('prayerBorderRadius');
        const sizeInput = document.getElementById('prayerCardSize');
        const iqamaToggle = document.getElementById('showIqamaToggle');
        
        if (bgInput) document.documentElement.style.setProperty('--prayer-card-bg', bgInput.value);
        if (textColorInput) document.documentElement.style.setProperty('--prayer-text-color', textColorInput.value);
        if (radiusInput) document.documentElement.style.setProperty('--prayer-border-radius', radiusInput.value);
        if (sizeInput) document.documentElement.style.setProperty('--prayer-card-size', sizeInput.value);
        if (iqamaToggle) document.documentElement.style.setProperty('--show-iqama', iqamaToggle.value);
        renderPrayerTimes();
    }

    function applyTheme() {
        const themeColor = document.getElementById('themeColor');
        if (themeColor) document.documentElement.style.setProperty('--primary-color', themeColor.value);
    }

    function applyBackground() {
        const color = document.getElementById('bgColorPicker');
        const fileInput = document.getElementById('bgImageUpload');
        const dashboard = document.getElementById('dashboard');
        if (!dashboard) return;
        
        if (fileInput && fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                dashboard.style.backgroundImage = `url('${e.target.result}')`;
                if (color) dashboard.style.backgroundColor = color.value;
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            dashboard.style.backgroundImage = 'none';
            if (color) dashboard.style.backgroundColor = color.value;
        }
    }

    function setDayMode() {
        const dashboard = document.getElementById('dashboard');
        if (dashboard) {
            dashboard.style.backgroundImage = "linear-gradient(135deg, #fdf5e6, #f0e6d0)";
            dashboard.style.backgroundColor = "#fdf5e6";
            dashboard.style.color = "#2c3e2b";
            dashboard.style.textShadow = "none";
        }
        localStorage.setItem('themeMode', 'day');
    }

    function setNightMode() {
        const dashboard = document.getElementById('dashboard');
        if (dashboard) {
            dashboard.style.backgroundImage = "";
            dashboard.style.backgroundColor = "#0a2f2a";
            dashboard.style.color = "white";
            dashboard.style.textShadow = "2px 2px 8px rgba(0,0,0,0.7)";
        }
        localStorage.setItem('themeMode', 'night');
    }

    function updateTickerSpeed() {
        const speedInput = document.getElementById('tickerSpeed');
        if (speedInput) {
            const speed = speedInput.value;
            document.documentElement.style.setProperty('--ticker-speed', `${speed}s`);
            localStorage.setItem('tickerSpeed', speed);
        }
    }

    function updateDuaSpeed() {
        const speedInput = document.getElementById('duaSpeed');
        if (!speedInput) return;
        const speed = parseFloat(speedInput.value);
        if (duaInterval) clearInterval(duaInterval);
        duaInterval = setInterval(() => {
            duaIndex = (duaIndex + 1) % duaList.length;
            const duaRotator = document.getElementById('duaRotator');
            if (duaRotator) duaRotator.innerHTML = duaList[duaIndex];
        }, speed * 1000);
    }

    function toggleTimeMode() {
        const modeSelect = document.getElementById('timeModeSelect');
        if (!modeSelect) return;
        const mode = modeSelect.value;
        const manualSection = document.getElementById('manualTimesSection');
        isAutoMode = mode === 'auto';
        if (manualSection) manualSection.style.display = isAutoMode ? 'none' : 'block';
        if (!isAutoMode) {
            const savedTimes = localStorage.getItem('manualPrayerTimes');
            if (savedTimes) {
                const times = JSON.parse(savedTimes);
                if (times.fajrAdhan) document.getElementById('fajrAdhan').value = times.fajrAdhan;
                if (times.fajrIqama) document.getElementById('fajrIqama').value = times.fajrIqama;
                if (times.dhuhrAdhan) document.getElementById('dhuhrAdhan').value = times.dhuhrAdhan;
                if (times.dhuhrIqama) document.getElementById('dhuhrIqama').value = times.dhuhrIqama;
                if (times.asrAdhan) document.getElementById('asrAdhan').value = times.asrAdhan;
                if (times.asrIqama) document.getElementById('asrIqama').value = times.asrIqama;
                if (times.maghribAdhan) document.getElementById('maghribAdhan').value = times.maghribAdhan;
                if (times.maghribIqama) document.getElementById('maghribIqama').value = times.maghribIqama;
                if (times.ishaAdhan) document.getElementById('ishaAdhan').value = times.ishaAdhan;
                if (times.ishaIqama) document.getElementById('ishaIqama').value = times.ishaIqama;
            }
        }
    }

            dhuhrIqama: document.getElementById('dhuhrIqama').value,

    function openSettings() {
        const panel = document.getElementById('settingsPanel');
        if (panel) panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    // دالة تمرير المحتوى مع منع انتشار الحدث حتى لا تختفي الأزرار
    function scrollSettings(direction) {
        const content = document.getElementById('settingsContent');
        if (content) {
            content.scrollBy({ top: direction === 'up' ? -150 : 150, behavior: 'smooth' });
        }
    }

    function loadSavedCity() {
        const savedCity = localStorage.getItem('selectedCityName');
        const citySelect = document.getElementById('citySelect');
        if (savedCity && citySelect) {
            for (let i = 0; i < citySelect.options.length; i++) {
                if (citySelect.options[i].value === savedCity) {
                    citySelect.selectedIndex = i;
                    break;
                }
            }
            setTimeout(() => getPrayersByCityName(), 500);
        }

        const savedTheme = localStorage.getItem('themeMode');
        if (savedTheme === 'day') {
            setDayMode();
        } else if (savedTheme === 'night') {
            setNightMode();
        }

        const savedSpeed = localStorage.getItem('tickerSpeed');
        if (savedSpeed) {
            const tickerSpeed = document.getElementById('tickerSpeed');
            if (tickerSpeed) {
                tickerSpeed.value = savedSpeed;
                document.documentElement.style.setProperty('--ticker-speed', `${savedSpeed}s`);
            }
        }
        
        // تحميل اسم المسجد المخصص
        const savedMosqueName = localStorage.getItem('customMosqueName');
        if (savedMosqueName) {
            customMosqueName = savedMosqueName;
            const input = document.getElementById('customMosqueNameInput');
            if (input) input.value = customMosqueName;
            updateMosqueNameDisplay();
        }
    }

        if (timeModeSelect) timeModeSelect.onchange = toggleTimeMode;

        if (saveManualTimesBtn) saveManualTimesBtn.onclick = saveManualTimes;

        if (citySelect) citySelect.onchange = getPrayersByCityName;

        const saveMosqueNameBtn = document.getElementById('saveMosqueNameBtn');
        if (saveMosqueNameBtn) saveMosqueNameBtn.onclick = saveCustomMosqueName;
    }

    // بدء التشغيل
    document.addEventListener('DOMContentLoaded', () => {
        updateDateTime();
        renderPrayerTimes();
        initEventListeners();
        loadSavedCity();
        scheduleDailyUpdate();  // جدولة التحديث اليومي للأوقات
        
        // تحديث دوري كل ثانية
        setInterval(() => {
            updateDateTime();
            updateCountdowns();
            renderPrayerTimes();
        }, 1000);
        
        setInterval(() => {
            hadithIndex = (hadithIndex + 1) % hadithList.length;
            const ticker = document.getElementById('hadithTicker');
            if (ticker) ticker.innerHTML = hadithList[hadithIndex];
        }, 8000);
        
        updateDuaSpeed();
        applyTheme();
        updateTickerSpeed();
    });
</script>
</body>
</html>
