<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masjid SaaS Cloud v2</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow:hidden;
}

#bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.4);
}

.top{
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(0,0,0,0.5);
}

.clock{font-size:40px;font-weight:bold;}

.panel{
position:fixed;
right:-320px;
top:0;
width:320px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
z-index:10;
}

input,button{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{background:#1e90ff;color:#fff;}

.prayers{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}

.countdown{
text-align:center;
font-size:45px;
color:lime;
}
</style>
</head>

<body>

<img id="bg">

<div class="top">
<div onclick="toggle()">☰</div>
<div class="clock" id="clock"></div>
</div>

<h3 id="mosque">مسجد</h3>

<div class="prayers" id="prayers"></div>

<div class="countdown" id="countdown">--:--</div>

<!-- PANEL -->
<div class="panel" id="panel">
<h3>Admin Cloud</h3>

<input id="mosqueName" placeholder="اسم المسجد">
<input id="city" placeholder="المدينة">

<button onclick="saveCloud()">حفظ Cloud</button>
<button onclick="loadCloud()">تحديث</button>

<hr>

<input type="file" onchange="setBg(event)">
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* 🔥 Firebase config (بدّلها بمشروعك) */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_APP.firebaseapp.com",
databaseURL: "https://YOUR_DB.firebaseio.com",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_APP.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ============ CLOUD SAVE ============ */
window.saveCloud = function(){
set(ref(db,"masjid"),{
name:mosqueName.value,
city:city.value,
bg:document.getElementById("bg").src
});
}

/* ============ CLOUD LISTENER ============ */
function listen(){
onValue(ref(db,"masjid"),(snap)=>{
let d=snap.val();
if(!d) return;

document.getElementById("mosque").innerText=d.name||"مسجد";
if(d.bg) document.getElementById("bg").src=d.bg;

fetchPrayerTimes(d.city||"fes");
});
}
listen();

/* ============ PRAYER API ============ */
async function fetchPrayerTimes(city){
try{
let res=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=MA&method=2`);
let data=await res.json();
let t=data.data.timings;

let keys=["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
let html="";

keys.forEach(k=>{
html+=`
<div class="card">
<h3>${k}</h3>
<div>${t[k]}</div>
</div>`;
});

document.getElementById("prayers").innerHTML=html;

/* countdown (simple) */
startCountdown(t.Maghrib);

}catch(e){
console.log(e);
}
}

/* ============ COUNTDOWN ============ */
function startCountdown(timeStr){
setInterval(()=>{
let now=new Date();
let [h,m]=timeStr.split(":");

let target=new Date();
target.setHours(h,m,0);

let diff=Math.floor((target-now)/1000);
if(diff<0) diff=0;

let mm=Math.floor(diff/60);
let ss=diff%60;

document.getElementById("countdown").innerText=
mm+":"+ss;

},1000);
}

/* ============ BG ============ */
window.setBg=function(e){
let file=e.target.files[0];
let r=new FileReader();
r.onload=()=>{
document.getElementById("bg").src=r.result;
};
r.readAsDataURL(file);
}

/* CLOCK */
setInterval(()=>{
let t=new Date();
document.getElementById("clock").innerText=
t.getHours().toString().padStart(2,'0')+":"+
t.getMinutes().toString().padStart(2,'0');
},1000);

/* PANEL */
window.toggle=()=>{
let p=document.getElementById("panel");
p.style.right=(p.style.right=="0px")?"-320px":"0px";
}

/* manual reload */
window.loadCloud=function(){
location.reload();
}
</script>

</body>
</html>
