<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>شاشة المسجد</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.container{
position:relative;
height:100%;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.top{
text-align:center;
font-size:30px;
font-weight:bold;
}

.clock{
text-align:center;
font-size:80px;
}

.date{
text-align:center;
font-size:24px;
}

.countdown-circle{
width:120px;
height:120px;
border:3px solid #00ff00;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:absolute;
right:20px;
top:150px;
}

.settings-btn{
position:absolute;
top:10px;
left:10px;
background:#000;
color:#ffd700;
border:2px solid #ffd700;
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.settings{
position:absolute;
top:60px;
left:10px;
background:#000;
border:2px solid #ffd700;
padding:15px;
display:none;
width:300px;
max-height:80vh;
overflow:auto;
}

.settings.show{display:block;}

input{width:100%;margin-bottom:10px;}

.prayer-mode{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2000;
}

.prayer-mode.active{display:flex;}

.adhkar-mode{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2000;
}

.adhkar-mode.active{display:flex;}
</style>
</head>

<body>

<div class="overlay"></div>

<div id="blackScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;z-index:3000;"></div>

<button class="settings-btn" onclick="toggleSettings()">⚙️</button>

<div class="settings" id="settings">

<h3>⚙️ إعدادات</h3>

<label>اسم المسجد</label>
<input type="text" id="mosqueNameInput" value="مسجد النور">

<h4>⏱️ شاشة الصلاة</h4>
<input type="number" id="prayerScreenDuration" value="10">

<h4>🌙 شاشة سوداء قبل الأذكار</h4>
<label><input type="checkbox" id="blackScreenEnabled" checked> تفعيل</label>
<input type="number" id="blackScreenDuration" value="10">

<h4>🕌 مواقيت</h4>
<input type="time" id="fajrTime" value="05:10">
<input type="time" id="dhuhrTime" value="13:30">
<input type="time" id="asrTime" value="16:40">
<input type="time" id="maghribTime" value="19:10">
<input type="time" id="ishaTime" value="20:30">

<button onclick="saveSettings()">💾 حفظ</button>

</div>

<div class="container" id="mainContainer">

<div class="top" id="mosqueName">🕌 مسجد النور</div>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<div class="countdown-circle">
<div id="countdownTime">00:00:00</div>
<div>المتبقي</div>
</div>

</div>

<div class="prayer-mode" id="prayerMode">
<h1 id="prayerTitle">الصلاة</h1>
<h1 id="prayerCountdown">10:00</h1>
</div>

<div class="adhkar-mode" id="adhkarMode">
<h2>أذكار</h2>
</div>

<script>

/* SETTINGS */
function toggleSettings(){
document.getElementById('settings').classList.toggle('show');
}

function saveSettings(){
localStorage.setItem('mosqueName',mosqueNameInput.value);
localStorage.setItem('prayerDuration',prayerScreenDuration.value);
localStorage.setItem('blackEnabled',blackScreenEnabled.checked);
localStorage.setItem('blackDuration',blackScreenDuration.value);
alert("تم الحفظ");
}

function loadSettings(){
if(localStorage.getItem('mosqueName')){
mosqueName.innerText="🕌 "+localStorage.getItem('mosqueName');
}
}

loadSettings();

/* CLOCK */
function updateClock(){
let n=new Date();

clock.innerText=n.toLocaleTimeString();

/* DATE FIX */
const day=n.getDate();
const months=["يناير","فبراير","مارس","أبريل","ماي","يونيو","يوليوز","غشت","شتنبر","أكتوبر","نونبر","دجنبر"];
date.innerText=day+" "+months[n.getMonth()]+" "+n.getFullYear();

updateCountdown(n);
checkAdhan(n);
}

setInterval(updateClock,1000);

/* COUNTDOWN */
function updateCountdown(n){
let now=n.getHours()*3600+n.getMinutes()*60+n.getSeconds();

let times=[
fajrTime.value,
dhuhrTime.value,
asrTime.value,
maghribTime.value,
ishaTime.value
];

let next=86400;

for(let t of times){
let [h,m]=t.split(':');
let sec=h*3600+m*60;
if(sec>now){
next=sec-now;
break;
}
}

let h=Math.floor(next/3600);
let m=Math.floor((next%3600)/60);
let s=next%60;

countdownTime.innerText=
String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0');
}

/* ADHAN */
let triggered={};

function checkAdhan(n){
let ct=n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');

let times={
fajr:fajrTime.value,
dhuhr:dhuhrTime.value,
asr:asrTime.value,
maghrib:maghribTime.value,
isha:ishaTime.value
};

for(let p in times){
if(times[p]==ct && !triggered[p]){
triggered[p]=true;
startPrayer();
setTimeout(()=>triggered[p]=false,60000);
}
}
}

/* PRAYER */
function startPrayer(){
mainContainer.style.display="none";
prayerMode.classList.add("active");

let duration=localStorage.getItem('prayerDuration')||10;
let time=duration*60;

let int=setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;

prayerCountdown.innerText=
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0');

time--;

if(time<0){
clearInterval(int);
endPrayer();
}
},1000);
}

/* END */
function endPrayer(){
prayerMode.classList.remove("active");

/* BLACK SCREEN */
if(localStorage.getItem('blackEnabled')==="true"){
blackScreen.style.display="block";

let d=localStorage.getItem('blackDuration')||10;

setTimeout(()=>{
blackScreen.style.display="none";
showAdhkar();
},d*1000);

}else{
showAdhkar();
}
}

function showAdhkar(){
adhkarMode.classList.add("active");

setTimeout(()=>{
adhkarMode.classList.remove("active");
mainContainer.style.display="flex";
},5000);
}

</script>

</body>
</html>
