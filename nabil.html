<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>شاشة المسجد</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a4d8c;
            color: white;
            display: flex;
        }
     .bg-layer {
            position: fixed;
            inset: 0;
            background: var(--bg-image, linear-gradient(135deg, #0a4d8c, #0d6efd));
            background-size: cover;
            background-position: center;
            z-index: -2;
        }
     .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: -1;
        }
        body.iqama-active.overlay { background: rgba(139,0,0,0.7)!important; }

     .main-screen {
            flex: 1;
            padding: 2%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

     .sidebar {
            width: 0;
            background: rgba(0,0,0,0.95);
            overflow-x: hidden;
            transition: 0.3s;
            z-index: 10000;
            padding-top: 60px;
            position: fixed;
            right: 0;
            top: 0;
            height: 100%;
        }
     .sidebar.open { width: 400px; padding: 60px 20px 20px 20px; }
     .sidebar.close-btn {
            position: absolute;
            top: 15px;
            left: 25px;
            font-size: 36px;
            cursor: pointer;
            color: #FFD700;
        }
     .sidebar h3 { color: #FFD700; margin: 20px 0 10px; font-size: 1.3em; }
     .lang-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
     .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            color: white;
            padding: 8px 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
     .lang-btn.active,.lang-btn:focus {
            background: #FFD700;
            color: #000;
            border-color: #FFD700;
            outline: none;
        }
     .menu-item {
            padding: 15px 10px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid transparent;
            font-size: 1.2em;
        }
     .menu-item:focus {
            background: rgba(255,215,0,0.2);
            border-color: #FFD700;
            outline: none;
        }
     .menu-item.radio {
            width: 20px;
            height: 20px;
            border: 2px solid #FFD700;
            border-radius: 50%;
            position: relative;
        }
     .menu-item.active.radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #FFD700;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

     .menu-icon {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 2.5em;
            cursor: pointer;
            z-index: 9999;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 5px 15px;
            border: 3px solid #FFD700;
            text-shadow: 0 0 15px #FFD700;
        }
     .top-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; }
     .date-hijri { font-size: 2.2em; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); }
     .mosque-name { font-size: 2.8em; font-weight: 900; text-align: center; margin: 10px 0; text-shadow: 3px 3px 6px rgba(0,0,0,0.9); }

     .center-content { flex: 1; display: flex; align-items: center; justify-content: space-around; }
     .main-clock { font-size: 8em; font-weight: 900; text-shadow: 0 0 50px rgba(0,0,0,0.9); }
     .next-prayer-box {
            background: rgba(0,0,0,0.6);
            border: 4px solid #FFD700;
            border-radius: 50%;
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 20px;
            left: 100px;
        }
     .next-prayer-time { font-size: 3.5em; font-weight: 700; }
     .next-prayer-name { font-size: 1.2em; }

     .prayers-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 5;
            border: 2px solid rgba(255,215,0,0.5);
        }
     .prayer-item { padding: 10px 5px; }
     .prayer-item.iqama-time { font-size: 1.5em; opacity: 0.9; }
     .prayer-item.prayer-name { font-size: 2em; margin: 8px 0; }
     .prayer-item.prayer-time { font-size: 2.8em; font-weight: 700; }
     .prayer-item.next { background: rgba(255,215,0,0.2); border-radius: 10px; }
     .prayer-item.current { background: rgba(255,68,68,0.2); border-radius: 10px; }

     .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10001;
            align-items: center;
            justify-content: center;
        }
     .modal.show { display: flex; }
     .modal-content {
            background: rgba(20,20,20,0.98);
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
        }
     .modal-content h2 { color: #FFD700; margin-bottom: 20px; text-align: center; }
     .modal-content input,.modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 1.2em;
            border-radius: 8px;
            border: 2px solid #555;
            background: #222;
            color: white;
        }
     .modal-content input:focus,.modal-content textarea:focus {
            border-color: #FFD700;
            outline: none;
        }
     .modal-content button {
            padding: 12px 30px;
            font-size: 1.2em;
            border-radius: 8px;
            border: none;
            background: #FFD700;
            color: #000;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
        }
        #bgImageInput { display: none; }
     .upload-btn {
            display: block;
            text-align: center;
            padding: 15px;
            background: rgba(255,215,0,0.2);
            border: 2px dashed #FFD700;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="bg-layer" id="bgLayer"></div>
    <div class="overlay"></div>

    <div class="menu-icon" onclick="openSidebar()" tabindex="0">☰</div>

    <div class="sidebar" id="sidebar">
        <span class="close-btn" onclick="closeSidebar()">&times;</span>

        <h3>اللغة</h3>
        <div class="lang-grid">
            <button class="lang-btn" tabindex="1">AM</button>
            <button class="lang-btn active" tabindex="2">AR</button>
            <button class="lang-btn" tabindex="3">BN</button>
            <button class="lang-btn" tabindex="4">DE</button>
            <button class="lang-btn" tabindex="5">EN</button>
            <button class="lang-btn" tabindex="6">ES</button>
            <button class="lang-btn" tabindex="7">FR</button>
            <button class="lang-btn" tabindex="8">ID</button>
            <button class="lang-btn" tabindex="9">IN</button>
            <button class="lang-btn" tabindex="10">IT</button>
            <button class="lang-btn" tabindex="11">KG</button>
            <button class="lang-btn" tabindex="12">KU</button>
        </div>

        <div class="menu-item" tabindex="13" onclick="openModal('location')">
            <span>إختيار موقع المسجد</span><div class="radio"></div>
        </div>
        <div class="menu-item" tabindex="14" onclick="openModal('options')">
            <span>خيارات</span><div class="radio"></div>
        </div>
        <div class="menu-item" tabindex="15" onclick="openModal('name')">
            <span>تحرير إسم المسجد</span><div class="radio"></div>
        </div>
        <div class="menu-item" tabindex="16" onclick="openModal('news')">
            <span>تحرير إعلانات المسجد</span><div class="radio"></div>
        </div>
        <div class="menu-item" tabindex="17" onclick="openModal('background')">
            <span>تغيير خلفية الشاشة</span><div class="radio"></div>
        </div>
        <div class="menu-item" tabindex="18" onclick="openModal('iqama')">
            <span>ضبط وقت الأذان والإقامة</span><div class="radio"></div>
        </div>
    </div>

    <div class="main-screen">
        <div class="top-bar">
            <div class="date-hijri" id="dateHijri">السبت 23 شوال</div>
            <div class="next-prayer-box">
                <div class="next-prayer-time" id="nextPrayerTime">0:04</div>
                <div class="next-prayer-name" id="nextPrayerName">المتبقي للظهر</div>
            </div>
        </div>

        <div class="mosque-name" id="mosqueNameDisplay">Nador</div>

        <div class="center-content">
            <div class="main-clock" id="clock">13:13:36</div>
        </div>

        <div class="prayers-row" id="prayersRow"></div>
    </div>
    <div class="modal" id="modalName">
        <div class="modal-content">
            <h2>تحرير إسم المسجد</h2>
            <input type="text" id="mosqueNameInput" placeholder="اسم المسجد">
            <button onclick="saveMosqueName()">حفظ</button>
            <button onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <div class="modal" id="modalLocation">
        <div class="modal-content">
            <h2>إختيار موقع المسجد</h2>
            <input type="text" id="countryInput" placeholder="البلد">
            <input type="text" id="cityInput" placeholder="المدينة">
            <button onclick="saveLocation()">حفظ</button>
            <button onclick="useGPS()">📍 GPS</button>
            <button onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <div class="modal" id="modalNews">
        <div class="modal-content">
            <h2>تحرير إعلانات المسجد</h2>
            <textarea id="newsInput" rows="4" placeholder="نص الشريط المتحرك"></textarea>
            <button onclick="saveNews()">حفظ</button>
            <button onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <div class="modal" id="modalBackground">
        <div class="modal-content">
            <h2>تغيير خلفية الشاشة</h2>
            <label class="upload-btn" for="bgImageInput">
                📷 اختر صورة من الجهاز
            </label>
            <input type="file" id="bgImageInput" accept="image/*">
            <button onclick="removeBackground()">حذف الصورة</button>
            <button onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <div class="modal" id="modalIqama">
        <div class="modal-content">
            <h2>ضبط وقت الأذان والإقامة</h2>
            <div id="iqamaInputs"></div>
            <button onclick="saveIqama()">حفظ</button>
            <button onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <script>
        let SETTINGS = JSON.parse(localStorage.getItem('mosqueSettings')) || {
            mosqueName: 'Nador',
            city: 'Nador',
            country: 'Morocco',
            news: 'مرحبا بكم في المسجد',
            bgImage: null,
            iqama: { 'الفجر': 15, 'الظهر': 10, 'العصر': 10, 'المغرب': 4, 'العشاء': 10 }
        };

        let prayerTimes = { Fajr: '05:11', Sunrise: '06:39', Dhuhr: '13:18', Asr: '16:45', Maghrib: '19:42', Isha: '20:59' };

        function applySettings() {
            document.getElementById('mosqueNameDisplay').textContent = SETTINGS.mosqueName;
            if (SETTINGS.bgImage) {
                document.getElementById('bgLayer').style.backgroundImage = `url(${SETTINGS.bgImage})`;
            } else {
                document.getElementById('bgLayer').style.backgroundImage = 'linear-gradient(135deg, #0a4d8c, #0d6efd)';
            }
        }

        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            setTimeout(() => document.querySelector('.sidebar.lang-btn.active').focus(), 100);
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
        }

        document.addEventListener('keydown', (e) => {
            const sidebar = document.getElementById('sidebar');
            const key = e.keyCode || e.which;

            if (!sidebar.classList.contains('open')) {
                if (key === 18 || key === 93 || key === 113) {
                    openSidebar();
                    e.preventDefault();
                }
                return;
            }

            const focusable = Array.from(sidebar.querySelectorAll('[tabindex]')).sort((a,b) => a.tabIndex - b.tabIndex);
            const current = document.activeElement;
            let idx = focusable.indexOf(current);

            if (key === 40) {
                e.preventDefault();
                idx = (idx + 1) % focusable.length;
                focusable[idx].focus();
            }
            if (key === 38) {
                e.preventDefault();
                idx = (idx - 1 + focusable.length) % focusable.length;
                focusable[idx].focus();
            }
            if (key === 4 || key === 27) {
                e.preventDefault();
                closeSidebar();
            }
            if (key === 13) {
                if (current.classList.contains('menu-item')) current.click();
            }
        });

        function openModal(type) {
            closeSidebar();
            const modal = document.getElementById('modal' + type.charAt(0).toUpperCase() + type.slice(1));
            if (type === 'name') document.getElementById('mosqueNameInput').value = SETTINGS.mosqueName;
            if (type === 'location') {
                document.getElementById('countryInput').value = SETTINGS.country;
                document.getElementById('cityInput').value = SETTINGS.city;
            }
            if (type === 'news') document.getElementById('newsInput').value = SETTINGS.news;
            if (type === 'iqama') {
                let html = '';
                Object.entries(SETTINGS.iqama).forEach(([prayer, time]) => {
                    html += `<label>${prayer}: <input type="number" id="iqama_${prayer}" value="${time}" style="width:80px"></label><br>`;
                });
                document.getElementById('iqamaInputs').innerHTML = html;
            }
            modal.classList.add('show');
        }
        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
        }

        function saveMosqueName() {
            SETTINGS.mosqueName = document.getElementById('mosqueNameInput').value;
            saveAll();
        }
        function saveLocation() {
            SETTINGS.country = document.getElementById('countryInput').value;
            SETTINGS.city = document.getElementById('cityInput').value;
            saveAll();
            fetchPrayerTimes();
        }
        function saveNews() {
            SETTINGS.news = document.getElementById('newsInput').value;
            saveAll();
        }
        function saveIqama() {
            Object.keys(SETTINGS.iqama).forEach(prayer => {
                SETTINGS.iqama[prayer] = parseInt(document.getElementById('iqama_' + prayer).value);
            });
            saveAll();
        }
        function saveAll() {
            localStorage.setItem('mosqueSettings', JSON.stringify(SETTINGS));
            applySettings();
            closeModal();
            displayPrayers();
        }
        document.getElementById('bgImageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    SETTINGS.bgImage = event.target.result;
                    saveAll();
                    alert('✅ تم تغيير الخلفية');
                };
                reader.readAsDataURL(file);
            }
        });
        function removeBackground() {
            SETTINGS.bgImage = null;
            saveAll();
            alert('✅ تم حذف الصورة');
        }

        function useGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}`);
                    const data = await res.json();
                    document.getElementById('cityInput').value = data.city || data.locality;
                    document.getElementById('countryInput').value = data.countryName;
                });
            }
        }

        function displayPrayers() {
            const prayers = [
                {name: 'الفجر', time: prayerTimes.Fajr, iqama: SETTINGS.iqama['الفجر']},
                {name: 'الظهر', time: prayerTimes.Dhuhr, iqama: SETTINGS.iqama['الظهر']},
                {name: 'العصر', time: prayerTimes.Asr, iqama: SETTINGS.iqama['العصر']},
                {name: 'المغرب', time: prayerTimes.Maghrib, iqama: SETTINGS.iqama['المغرب']},
                {name: 'العشاء', time: prayerTimes.Isha, iqama: SETTINGS.iqama['العشاء']}
            ];

            document.getElementById('prayersRow').innerHTML = prayers.map((p, i) => `
                <div class="prayer-item">
                    <div class="iqama-time">${p.iqama}'</div>
                    <div class="prayer-name">${p.name}</div>
                    <div class="prayer-time">${p.time}</div>
                </div>`).join('');
            document.getElementById('prayersRow').style.display = 'grid';
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ar-MA', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

            const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', { weekday: 'long', day: 'numeric', month: 'long' }).format(now);
            document.getElementById('dateHijri').textContent = hijri;

            updateNextPrayer();
        }

        function updateNextPrayer() {
            const now = new Date();
            const times = [
                {name: 'الفجر', time: prayerTimes.Fajr},
                {name: 'الظهر', time: prayerTimes.Dhuhr},
                {name: 'العصر', time: prayerTimes.Asr},
                {name: 'المغرب', time: prayerTimes.Maghrib},
                {name: 'العشاء', time: prayerTimes.Isha}
            ];

            for (let p of times) {
                const [h, m] = p.time.split(':').map(Number);
                const prayerDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
                if (prayerDate > now) {
                    const diff = prayerDate - now;
                    const hours = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    document.getElementById('nextPrayerTime').textContent = `${hours}:${String(mins).padStart(2,'0')}`;
                    document.getElementById('nextPrayerName').textContent = `المتبقي لل${p.name}`;
                    return;
                }
            }
        }

        async function fetchPrayerTimes() {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${SETTINGS.city}&country=${SETTINGS.country}&method=21`);
                const data = await res.json();
                if(data.code === 200) prayerTimes = data.data.timings;
            } catch (e) { console.log('استعمال المواقيت الافتراضية'); }
            displayPrayers();
        }

        applySettings();
        fetchPrayerTimes();
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
