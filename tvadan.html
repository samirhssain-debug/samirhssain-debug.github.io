<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مسجد النور - شاشة المسجد</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI', 'Cairo', sans-serif;
            background: 
                linear-gradient(135deg, rgba(10, 77, 140, 0.85), rgba(13, 110, 253, 0.85)),
                url('https://images.unsplash.com/photo-1564769625392-651b10b4f737?w=1920&q=80') center/cover no-repeat fixed;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5%; /* هامش أمان للتيفي بوكس */
        }
        body.iqama-active { 
            background: 
                linear-gradient(135deg, rgba(139, 0, 0, 0.9), rgba(196, 30, 58, 0.9)),
                url('https://images.unsplash.com/photo-1564769625392-651b10b4f737?w=1920&q=80') center/cover no-repeat fixed;
        }
        .container { 
            width: 95%; 
            height: 95%;
            max-width: 1700px; 
            padding: 30px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header { display: flex; justify-content: space-between; align-items: center; font-size: 1.8em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .date-box { text-align: right; }
        .weather-box { text-align: left; }
        .mosque-name { font-size: 2.8em; font-weight: bold; text-shadow: 3px 3px 6px rgba(0,0,0,0.7); }
        
        .iqama-bar-container { 
            background: rgba(0,0,0,0.5); 
            padding: 15px; 
            border-radius: 15px; 
            margin: 15px 0;
            display: none;
            backdrop-filter: blur(10px);
        }
        .iqama-bar-container.show { display: block; }
        .iqama-text { font-size: 2.2em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .iqama-progress { width: 100%; height: 25px; background: rgba(0,0,0,0.6); border-radius: 15px; overflow: hidden; }
        .iqama-fill { height: 100%; background: linear-gradient(90deg, #FFD700, #FFA500); border-radius: 15px; transition: width 1s linear; }
        .iqama-fill.warning { background: linear-gradient(90deg, #ff4444, #cc0000); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        
        .main-time { display: flex; justify-content: space-between; align-items: center; }
        .current-prayer { font-size: 3.5em; text-shadow: 3px 3px 6px rgba(0,0,0,0.7); }
        .clock { font-size: 9em; font-weight: bold; letter-spacing: 8px; text-shadow: 0 0 40px rgba(255,255,255,0.8), 3px 3px 6px rgba(0,0,0,0.7); }
        .next-prayer { font-size: 3.5em; text-shadow: 3px 3px 6px rgba(0,0,0,0.7); }
        .quran { font-size: 2.2em; font-family: 'Amiri', serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .prayers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
        .prayer-box {
            background: rgba(255,255,255,0.15); border-radius: 15px; padding: 20px 15px;
            backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.2);
        }
        .prayer-box.next { background: rgba(255,215,0,0.4); border: 3px solid gold; transform: scale(1.08); box-shadow: 0 0 30px rgba(255,215,0,0.6); }
        .prayer-box.current { background: rgba(255,0,0,0.5); border: 3px solid #ff4444; box-shadow: 0 0 30px rgba(255,0,0,0.6); }
        .prayer-name { font-size: 2.2em; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
        .prayer-time { font-size: 3.2em; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
        .iqama { font-size: 1.6em; opacity: 0.9; margin-top: 8px; }
        .adhan-alert { display: none; position: fixed; inset: 0; background: rgba(139,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        .adhan-alert h2 { font-size: 7em; margin-bottom: 20px; }
        .adhan-alert p { font-size: 3.5em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="weather-box" id="weather">39° ☁️<br>39° 26°</div>
            <div class="date-box">
                <div id="hijriDate">14 شوال 1447</div>
                <div id="gregorianDate">2026/4/10 الجمعة</div>
            </div>
            <div class="date-box">
                <div id="shuruq">الشروق 06:54</div>
                <div id="duha">الضحى 07:09</div>
            </div>
        </div>

        <div class="mosque-name">مسجد النور - وجدة</div>

        <div class="iqama-bar-container" id="iqamaBar">
            <div class="iqama-text" id="iqamaText">باقي 15:00 دقيقة على إقامة الفجر</div>
            <div class="iqama-progress">
                <div class="iqama-fill" id="iqamaFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="main-time">
            <div class="current-prayer" id="currentPrayerName">13:22<br>الجمعة</div>
            <div class="clock" id="clock">14:31:56</div>
            <div class="next-prayer" id="nextPrayerInfo">2:20<br>المتبقي للعصر</div>
        </div>

        <div class="quran" id="quranVerse">﴿ وَمَن يُؤْمِن بِاللَّهِ يَهْدِ قَلْبَهُ ﴾</div>
        <div class="prayers" id="prayers"></div>
    </div>

    <div class="adhan-alert" id="adhanAlert">
        <h2>🕌 الله أكبر</h2>
        <p id="adhanName"></p>
    </div>

    <audio id="adhanSound" src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/adhan/adhan.mp3"></audio>

    <script>
        const CITY = 'Oujda';
        const COUNTRY = 'Morocco';
        let prayerTimes = {};
        let alertShown = false;
        let currentPrayerData = null;
        let iqamaInterval = null;
        const iqamaTimes = { 'الفجر': 15, 'الظهر': 10, 'العصر': 10, 'المغرب': 4, 'العشاء': 10 };
        const verses = [
            '﴿ وَمَن يُؤْمِن بِاللَّهِ يَهْدِ قَلْبَهُ ﴾',
            '﴿ إِنَّ الصَّلَاةَ كَانَتْ عَلَى الْمُؤْمِنِينَ كِتَابًا مَّوْقُوتًا ﴾',
            '﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ ﴾',
            '﴿ قَدْ أَفْلَحَ الْمُؤْمِنُونَ * الَّذِينَ هُمْ فِي صَلَاتِهِمْ خَاشِعُونَ ﴾'
        ];

        function updateDates() {
            const now = new Date();
            const gregorian = now.toLocaleDateString('ar-MA', { weekday: 'long', year: 'numeric', month: 'numeric', day: 'numeric' });
            document.getElementById('gregorianDate').textContent = gregorian;
            const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(now);
            document.getElementById('hijriDate').textContent = hijri;
        }

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('ar-MA', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            document.getElementById('clock').textContent = time;
        }

        async function fetchPrayerTimes() {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${CITY}&country=${COUNTRY}&method=21`);
                const data = await res.json();
                prayerTimes = data.data.timings;
                document.getElementById('shuruq').textContent = `الشروق ${prayerTimes.Sunrise}`;
                const [sh, sm] = prayerTimes.Sunrise.split(':').map(Number);
                const duhaM = sm + 15;
                const duhaH = sh + Math.floor(duhaM / 60);
                document.getElementById('duha').textContent = `الضحى ${String(duhaH).padStart(2,'0')}:${String(duhaM % 60).padStart(2,'0')}`;
                displayPrayers();
            } catch (e) {}
        }

        function displayPrayers() {
            const prayers = [
                {name: 'الفجر', time: prayerTimes.Fajr},
                {name: 'الظهر', time: prayerTimes.Dhuhr},
                {name: 'العصر', time: prayerTimes.Asr},
                {name: 'المغرب', time: prayerTimes.Maghrib},
                {name: 'العشاء', time: prayerTimes.Isha}
            ];
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            let nextPrayer = null;
            let isInIqamaPeriod = false;
            prayers.forEach(p => {
                const [h, m] = p.time.split(':').map(Number);
                const prayerMinutes = h * 60 + m;
                const iqamaMinutes = prayerMinutes + iqamaTimes[p.name];
                if (currentMinutes >= prayerMinutes && currentMinutes < iqamaMinutes) {
                    isInIqamaPeriod = true;
                    currentPrayerData = {name: p.name, adhanTime: prayerMinutes, iqamaTime: iqamaMinutes};
                }
                if (!nextPrayer && prayerMinutes > currentMinutes) {
                    nextPrayer = {...p, minutes: prayerMinutes};
                }
            });
            document.getElementById('prayers').innerHTML = prayers.map(p => {
                const isCurrent = currentPrayerData && currentPrayerData.name === p.name;
                const isNext = !isInIqamaPeriod && nextPrayer && nextPrayer.name === p.name;
                return `<div class="prayer-box ${isCurrent? 'current' : isNext? 'next' : ''}">
                    <div class="iqama">${iqamaTimes[p.name]}'</div>
                    <div class="prayer-name">${p.name}</div>
                    <div class="prayer-time">${p.time}</div>
                </div>`;
            }).join('');
            if (isInIqamaPeriod) { showIqamaBar(); } else { hideIqamaBar(); if (nextPrayer) updateNextPrayer(nextPrayer); }
        }

        function showIqamaBar() {
            document.getElementById('iqamaBar').classList.add('show');
            document.body.classList.add('iqama-active');
            if (!iqamaInterval) iqamaInterval = setInterval(updateIqamaBar, 1000);
        }
        function hideIqamaBar() {
            document.getElementById('iqamaBar').classList.remove('show');
            document.body.classList.remove('iqama-active');
            if (iqamaInterval) { clearInterval(iqamaInterval); iqamaInterval = null; }
        }
        function updateIqamaBar() {
            if (!currentPrayerData) return;
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            const currentSeconds = now.getSeconds();
            const totalSeconds = (currentMinutes * 60 + currentSeconds) - (currentPrayerData.adhanTime * 60);
            const iqamaTotalSeconds = (currentPrayerData.iqamaTime - currentPrayerData.adhanTime) * 60;
            const remainingSeconds = iqamaTotalSeconds - totalSeconds;
            if (remainingSeconds <= 0) { hideIqamaBar(); currentPrayerData = null; return; }
            const mins = Math.floor(remainingSeconds / 60);
            const secs = remainingSeconds % 60;
            document.getElementById('iqamaText').textContent = `باقي ${mins}:${String(secs).padStart(2,'0')} دقيقة على إقامة ${currentPrayerData.name}`;
            const percent = (totalSeconds / iqamaTotalSeconds) * 100;
            const fill = document.getElementById('iqamaFill');
            fill.style.width = percent + '%';
            if (remainingSeconds < 120) fill.classList.add('warning'); else fill.classList.remove('warning');
        }
        function updateNextPrayer(next) {
            const now = new Date();
            const [h, m] = next.time.split(':').map(Number);
            const prayerDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
            const diff = prayerDate - now;
            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            document.getElementById('nextPrayerInfo').innerHTML = `${hours}:${String(minutes).padStart(2,'0')}<br>المتبقي لل${next.name}`;
        }
        function checkAdhan() {
            const now = new Date();
            const timeNow = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            Object.entries({
                'الفجر': prayerTimes.Fajr, 'الظهر': prayerTimes.Dhuhr, 'العصر': prayerTimes.Asr,
                'المغرب': prayerTimes.Maghrib, 'العشاء': prayerTimes.Isha
            }).forEach(([name, time]) => {
                if (time === timeNow &&!alertShown) {
                    document.getElementById('adhanName').textContent = `حان الآن وقت ${name}`;
                    document.getElementById('adhanAlert').style.display = 'flex';
                    document.getElementById('adhanSound').play();
                    alertShown = true;
                    setTimeout(() => { document.getElementById('adhanAlert').style.display = 'none'; alertShown = false; displayPrayers(); }, 90000);
                }
            });
            displayPrayers();
        }
        updateDates(); fetchPrayerTimes(); setInterval(updateClock, 1000); setInterval(checkAdhan, 15000);
        setInterval(() => { document.getElementById('quranVerse').textContent = verses[Math.floor(Math.random() * verses.length)]; }, 60000);
        setInterval(updateDates, 3600000);
    </script>
</body>
</html>
