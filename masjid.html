<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masjid Screen Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

#bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.4);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:rgba(0,0,0,0.5);
}

.clock{
font-size:40px;
font-weight:bold;
}

.name{
text-align:center;
font-size:22px;
margin:5px 0;
}

.prayers{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
text-align:center;
}

.card h3{margin:0;font-size:18px;}
.card div{font-size:16px;}

.countdown{
text-align:center;
font-size:50px;
color:lime;
font-weight:bold;
margin-top:10px;
}

.red{color:red;}

.ticker{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.7);
overflow:hidden;
}

.ticker span{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:move 20s linear infinite;
}

@keyframes move{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* PANEL */
.panel{
position:fixed;
right:-320px;
top:0;
width:320px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
}

input,button{
width:100%;
padding:8px;
margin:5px 0;
border:none;
border-radius:5px;
}

button{background:#1e90ff;color:white;}
</style>
</head>

<body>

<img id="bg">

<div class="topbar">
<div onclick="toggle()">☰</div>
<div class="clock" id="clock"></div>
</div>

<div class="name" id="mosqueName">مسجد النور</div>

<div class="prayers" id="prayers"></div>

<div class="countdown" id="countdown">--:--</div>

<div class="ticker">
<span>سبحان الله - الحمد لله - لا إله إلا الله - الله أكبر - أستغفر الله</span>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
<h3>الإعدادات</h3>

<input id="nameInput" placeholder="اسم المسجد">
<input id="cityInput" placeholder="المدينة (ex: fes)">

<input type="file" onchange="setBg(event)">

<button onclick="save()">حفظ</button>
<button onclick="load()">تحديث</button>
</div>

<script>
/* LOAD */
function load(){
let d=JSON.parse(localStorage.getItem("masjid")||"{}");

document.getElementById("mosqueName").innerText=d.name||"مسجد النور";

if(d.bg) document.getElementById("bg").src=d.bg;

fetchPrayerTimes(d.city||"fes");
}
load();

/* SAVE */
function save(){
let d={
name:nameInput.value,
city:cityInput.value,
bg:document.getElementById("bg").src
};

localStorage.setItem("masjid",JSON.stringify(d));
load();
}

/* PRAYER API */
async function fetchPrayerTimes(city="fes"){
try{
let res=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=MA&method=2`);
let data=await res.json();
let t=data.data.timings;

let keys=["Fajr","Sunrise","Dhuhr","Asr","Maghrib","Isha"];
let html="";

keys.forEach(k=>{
html+=`
<div class="card">
<h3>${k}</h3>
<div>${t[k]}</div>
</div>`;
});

document.getElementById("prayers").innerHTML=html;

/* countdown */
startCountdown(t.Maghrib);

}catch(e){
document.getElementById("prayers").innerHTML="خطأ فالمواقيت";
}
}

/* COUNTDOWN */
function startCountdown(timeStr){
setInterval(()=>{
let now=new Date();
let [h,m]=timeStr.split(":");

let target=new Date();
target.setHours(h,m,0);

let diff=Math.floor((target-now)/1000);
if(diff<0) diff=0;

let mm=Math.floor(diff/60);
let ss=diff%60;

let c=document.getElementById("countdown");
c.innerText=mm+":"+ss;

if(diff<60)c.classList.add("red");
else c.classList.remove("red");

},1000);
}

/* BG */
function setBg(e){
let file=e.target.files[0];
let r=new FileReader();
r.onload=()=>{
document.getElementById("bg").src=r.result;
};
r.readAsDataURL(file);
}

/* CLOCK */
setInterval(()=>{
let t=new Date();
document.getElementById("clock").innerText=
t.getHours().toString().padStart(2,'0')+":"+
t.getMinutes().toString().padStart(2,'0');
},1000);

/* PANEL */
function toggle(){
let p=document.getElementById("panel");
p.style.right=(p.style.right=="0px")?"-320px":"0px";
}
</script>

</body>
</html>
