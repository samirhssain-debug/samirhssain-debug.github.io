<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة المسجد</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:black;
    color:white;
    overflow:hidden;
}

/* الخلفية */
#bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    opacity:0.55;
}

/* الساعة */
.clock{
    font-size:70px;
    text-align:center;
    margin-top:15px;
}

/* مواقيت الصلاة */
.prayers{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

/* الصلاة القادمة */
.next{
    text-align:center;
    margin-top:10px;
    font-size:30px;
    background:rgba(0,0,0,0.6);
    padding:10px;
}

/* الأذكار */
.adhkar{
    position:fixed;
    bottom:15px;
    width:100%;
    text-align:center;
    font-size:26px;
    opacity:0.9;
}

/* ========================= */
/* شاشة الإقامة (Full Black) */
/* ========================= */
.count-box{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black; /* بدون شفافية */
    z-index:999;
}

.count-title{
    font-size:55px;
    margin-bottom:20px;
}

.count-time{
    font-size:160px;
    color:#00ffcc;
}

/* ========================= */
/* شاشة بعد الصلاة (صورة كبيرة) */
/* ========================= */
.after-prayer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:998;
}

.after-prayer img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<!-- الخلفية -->
<img id="bg" src="https://images.unsplash.com/photo-1548013146-72479768bada">

<!-- الساعة -->
<div class="clock" id="clock"></div>

<!-- مواقيت الصلاة (بالعربية) -->
<div class="prayers">
    <div>الفجر 05:30</div>
    <div>الظهر 13:10</div>
    <div>العصر 16:30</div>
    <div>المغرب 19:00</div>
    <div>العشاء 20:30</div>
</div>

<!-- الصلاة القادمة -->
<div class="next" id="next">
الصلاة القادمة: المغرب
</div>

<!-- ===================== -->
<!-- شاشة الإقامة -->
<!-- ===================== -->
<div class="count-box" id="countBox">
    <div class="count-title">الوقت المتبقي للإقامة</div>
    <div class="count-time" id="countdown">10:00</div>
</div>

<!-- ===================== -->
<!-- شاشة بعد الصلاة -->
<!-- ===================== -->
<div class="after-prayer" id="afterPrayer">
    <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9">
</div>

<!-- الأذكار -->
<div class="adhkar">
سبحان الله • الحمد لله • لا إله إلا الله • الله أكبر
</div>

<script>

/* الساعة */
setInterval(()=>{
    let d = new Date();
    document.getElementById("clock").innerText =
    d.getHours()+":"+d.getMinutes()+":"+d.getSeconds();
},1000);

/* ===================== */
/* نظام الإقامة */
/* ===================== */
let seconds = 600;

function showIqama(){
    document.getElementById("countBox").style.display="flex";
}

/* العداد */
setInterval(()=>{
    if(seconds > 0){
        seconds--;

        let m = Math.floor(seconds/60);
        let s = seconds%60;

        document.getElementById("countdown").innerText =
        m+":"+(s<10?"0":"")+s;
    }
},1000);

/* تشغيل الإقامة (تجريبي) */
setTimeout(()=>{
    showIqama();
},3000);

/* ===================== */
/* بعد الصلاة → صورة كبيرة */
/* ===================== */
setTimeout(()=>{
    document.getElementById("countBox").style.display="none";
    document.getElementById("afterPrayer").style.display="flex";
},15000);

</script>

</body>
</html>
