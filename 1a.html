<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>صفحتي المميزة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 2rem;
            text-align: center;
        }

        p {
            color: #555;
            line-height: 1.7;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin: 0 auto;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118,75,162,0.2);
        }

        label {
            font-weight: bold;
            color: #333;
        }

        .result {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ مرحباً بك ✨</h1>
        <p>هذا كود HTML يعمل بشكل ممتاز وجاهز للاستخدام. يمكنك تعديل النصوص والألوان كما تريد.</p>

        <label for="userName">ما اسمك؟</label>
        <input type="text" id="userName" placeholder="أدخل اسمك هنا">

        <label for="message">رسالتك</label>
        <textarea id="message" rows="3" placeholder="اكتب شيئاً جميلاً..."></textarea>

        <div style="text-align: center;">
            <button class="btn" id="greetBtn">أرسل التحية 🎉</button>
        </div>

        <div id="resultBox" class="result"></div>

        <div class="footer">
            ❤️ كود خادم ممتاز | يمكنك نسخه واستخدامه بحرية
        </div>
    </div>

    <script>
        const btn = document.getElementById('greetBtn');
        const resultDiv = document.getElementById('resultBox');

        btn.addEventListener('click', () => {
            const name = document.getElementById('userName').value.trim();
            const msg = document.getElementById('message').value.trim();

            if (name === "" && msg === "") {
                resultDiv.innerHTML = "⚠️ من فضلك اكتب اسمك أو رسالة.";
            } else if (name === "") {
                resultDiv.innerHTML = `📝 رسالتك: "${msg}"<br>شكراً لمشاركتك!`;
            } else if (msg === "") {
                resultDiv.innerHTML = `👋 أهلاً ${name}! سعدنا بمعرفتك.`;
            } else {
                resultDiv.innerHTML = `👋 أهلاً ${name}!<br>📩 رسالتك: "${msg}"<br>شكراً جزيلاً لك 🌟`;
            }
            resultDiv.style.display = "block";
            resultDiv.style.background = "#e9ecef";
        });
    </script>
</body>
</html>
