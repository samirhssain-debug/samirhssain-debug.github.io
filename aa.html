<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة المسجد - وضع محسن</title><style>
body{
    margin:0;
    font-family: Arial;
    background:black;
    color:white;
    overflow:hidden;
}

/* الخلفية سوداء */
#bg{
    display:none;
}

/* الساعة */
.top{
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
    background:rgba(0,0,0,0.7);
}

.clock{
    font-size:55px;
    font-weight:bold;
}

.next{
    font-size:28px;
    color:#00ffcc;
}

/* الصلاة */
.prayers{
    display:flex;
    justify-content:space-around;
    margin-top:10px;
    font-size:22px;
    font-weight:bold;
}

/* الأذكار */
.adhkar{
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.9);
    padding:10px;
    font-size:24px;
    text-align:center;
}

/* الإقامة */
.count-box{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
}

.count-time{
    font-size:140px;
    color:#00ffcc;
    transition:0.3s;
}

/* تحذير آخر دقيقة */
.warning{
    font-size:220px !important;
    color:red !important;
}

</style></head><body><div class="top">
    <div class="clock" id="clock"></div>
    <div class="next" id="next"></div>
</div><div class="prayers">
    <div>الفجر 05:30</div>
    <div>الظهر 13:10</div>
    <div>العصر 16:30</div>
    <div>المغرب 19:00</div>
    <div>العشاء 20:30</div>
</div><div class="count-box" id="countBox">
    <div class="count-time" id="countdown">10:00</div>
</div><div class="adhkar" id="adhkar">
</div><script>

/* الساعة */
setInterval(()=>{
    let d = new Date();
    document.getElementById("clock").innerText =
    String(d.getHours()).padStart(2,'0')+":"+
    String(d.getMinutes()).padStart(2,'0')+":"+
    String(d.getSeconds()).padStart(2,'0');
},1000);

/* الأذكار صباح/مساء */
function setAdhkar(){
    let h = new Date().getHours();
    let text = "";

    if(h < 12){
        text = "أذكار الصباح • سبحان الله • الحمد لله • لا إله إلا الله";
    }else{
        text = "أذكار المساء • أستغفر الله • سبحان الله • الله أكبر";
    }

    document.getElementById("adhkar").innerText = text;
}
setAdhkar();
setInterval(setAdhkar,60000);

/* الإقامة */
let seconds = 600;
let active = true;

function show(){
    document.getElementById("countBox").style.display="flex";
}

setInterval(()=>{
    if(active && seconds>0){
        seconds--;

        let m = Math.floor(seconds/60);
        let s = seconds%60;

        let el = document.getElementById("countdown");
        el.innerText = m+":"+(s<10?"0":"")+s;

        /* آخر دقيقة */
        if(seconds <= 60){
            el.classList.add("warning");
        }else{
            el.classList.remove("warning");
        }
    }
},1000);

setTimeout(show,3000);

</script></body>
</html>
