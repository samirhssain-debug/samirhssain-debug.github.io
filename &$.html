<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="لوحة المسجد الذكية - مجانية للمساجد - صدقة جارية">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="لوحة المسجد">
    <meta name="theme-color" content="#FFD700">
    <title>🕌 لوحة المسجد الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.85);
            --bg: #08111e;
            --text: #F0F6FF;
            --neon-green: #00ff88;
            --neon-red: #ff2020;
            --bg-opacity: 0.45;
            --font: 'Scheherazade New', 'Amiri', serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font);
        }
        body {
            background: var(--bg);
            color: var(--text);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #000;
            position: relative;
            font-size: 1.8vh;
            -webkit-font-smoothing: antialiased;
            cursor: none;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }
        /* إخفاء المؤشر العادي */
        * {
            cursor: none !important;
        }
        
        /* فأرة التطبيق */
        .app-cursor {
            position: fixed;
            width: 28px;
            height: 28px;
            background: rgba(255, 215, 0, 0.9);
            border: 2px solid #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 8px #fff;
            transition: width 0.1s, height 0.1s, background 0.1s, opacity 0.3s;
            will-change: left, top;
        }
        .app-cursor.click-effect {
            width: 38px;
            height: 38px;
            background: rgba(255, 100, 100, 0.9);
        }
        .app-cursor.hide {
            opacity: 0;
        }

        /* باقي المظهر */
        body.night-mode { background: #050b15; color: #ddeeff; }
        body::before { content: ''; position: fixed; inset: 0; background: rgba(0,0,0,0.38); z-index: -1; pointer-events: none; }
        body::after { content: ''; position: fixed; inset: 0; background: inherit; opacity: var(--bg-opacity); z-index: -2; pointer-events: none; }
        #bgVideo { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -3; display: none; }
        #bgVideo.active { display: block; }
        #videoOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: -2; display: none; pointer-events: none; }
        #videoOverlay.active { display: block; }
        .controls-top { position: fixed; top: 14px; left: 14px; display: flex; gap: 12px; z-index: 1000; opacity: 0; transition: opacity 0.5s ease; }
        .controls-top:hover, .controls-top:focus-within { opacity: 1; }
        .controls-top.visible { opacity: 1; }
        .control-icon { background: rgba(10,20,35,0.8); backdrop-filter: blur(12px); width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; border: 1.5px solid rgba(255,215,0,0.6); color: var(--gold); box-shadow: 0 4px 20px rgba(0,0,0,0.6); transition: all 0.3s; touch-action: manipulation; }
        .control-icon:hover { transform: scale(1.12); background: rgba(255,215,0,0.15); border-color: var(--gold); box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .dnd-active { background: rgba(90,20,20,0.85) !important; border-color: #ff6b6b !important; color: #ff6b6b !important; }
        .dashboard { width: 100%; height: 100vh; padding: 1.2vh 1.8vw; display: flex; flex-direction: column; justify-content: space-between; gap: 0.2vh; }
        .top-section { flex: 0 0 auto; display: flex; flex-direction: column; gap: 0.3vh; }
        .clock-header { text-align: center; }
        .live-clock-main { font-size: 13vh; font-weight: 900; font-family: monospace; direction: ltr; letter-spacing: 5px; text-shadow: 0 0 25px rgba(0,0,0,0.9), 0 0 18px var(--gold-glow); line-height: 1; color: var(--gold); }
        .datetime-bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0.2vh 0.8vw; gap: 1.5vw; }
        .mosque-title { font-size: 7vh; font-weight: 900; font-family: 'Amiri', 'Scheherazade New', serif; background: linear-gradient(135deg, #FFF8DC, #FFD700, #FFA500, #FFD700); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: right; grid-column: 1; line-height: 1.2; filter: drop-shadow(0 0 8px rgba(255,215,0,0.4)); }
        .date-center { text-align: center; grid-column: 2; }
        .date-text { font-size: 3.2vh; font-weight: 700; direction: rtl; text-shadow: 0 0 12px rgba(0,0,0,0.9); font-family: 'Scheherazade New', serif; }
        .hijri-text { font-size: 2.8vh; opacity: 0.92; direction: ltr; text-shadow: 0 0 12px rgba(0,0,0,0.9); cursor: pointer; font-family: monospace; transition: all 0.2s; padding: 2px 10px; border-radius: 20px; display: inline-block; }
        .hijri-text:hover { color: var(--gold); background: rgba(255,215,0,0.1); }
        .countdown-side { grid-column: 3; display: flex; flex-direction: column; align-items: flex-start; gap: 0.1vh; }
        .next-prayer-label { font-size: 2.6vh; color: var(--gold); text-shadow: 0 0 15px rgba(0,0,0,0.9), 0 0 8px var(--gold-glow); white-space: nowrap; font-family: 'Scheherazade New', serif; }
        .next-prayer-time { font-size: 6vh; font-weight: 900; font-family: monospace; direction: ltr !important; text-shadow: 0 0 25px rgba(0,0,0,0.9), 0 0 15px var(--gold-glow); color: #fff; white-space: nowrap; letter-spacing: 2px; }
        .next-prayer-time.warning { font-size: 7.5vh !important; color: var(--neon-red) !important; text-shadow: 0 0 25px rgba(0,0,0,0.9), 0 0 18px var(--neon-red) !important; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .middle-section { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; }
        .prayer-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 1.2vw; width: 100%; max-width: 1500px; margin: 0 auto; }
        .prayer-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,215,0,0.15); border-radius: 2vh; padding: 1.8vh 0.4vw; text-align: center; transition: all 0.4s; cursor: pointer; backdrop-filter: blur(4px); }
        .prayer-card:hover { background: rgba(255,215,0,0.08); }
        .prayer-card.next { box-shadow: 0 0 6vh var(--gold-glow), 0 0 2px var(--gold); border-color: rgba(255,215,0,0.6); transform: scale(1.04); background: rgba(255,215,0,0.07); }
        .prayer-card.focused { border: 3px solid var(--gold); box-shadow: 0 0 30px rgba(255,215,0,0.8); background: rgba(255,215,0,0.15); transform: scale(1.02); }
        .prayer-name { font-size: 5vh; font-weight: 900; margin-bottom: 0.4vh; color: var(--gold); text-shadow: 0 0 15px rgba(0,0,0,0.9), 0 0 8px var(--gold-glow); font-family: 'Amiri', serif; }
        .prayer-time { font-size: 6vh; font-weight: 900; font-family: monospace; direction: ltr; text-shadow: 0 0 15px rgba(0,0,0,0.9); }
        .iqama-mins { font-size: 2.8vh; opacity: 0.8; margin-top: 0.3vh; color: #aaddff; font-family: monospace; direction: ltr; text-shadow: 0 0 10px rgba(0,0,0,0.9); }
        .iqama-time { font-size: 3.2vh; opacity: 0.95; margin-top: 0.2vh; direction: ltr; text-shadow: 0 0 12px rgba(0,0,0,0.9); font-family: monospace; color: #cce8ff; }
        .bottom-section { flex: 0 0 auto; display: flex; flex-direction: column; gap: 0.2vh; margin-top: 0.1vh; }
        .verse-section { padding: 0.6vh 3vw; border-right: 0.6vh solid var(--gold); font-family: 'Amiri Quran', 'Amiri', serif; text-align: center; font-weight: 700; text-shadow: 0 0 15px rgba(0,0,0,0.9), 0 0 8px var(--gold-glow); font-size: clamp(3.5vh,5vh,6vh); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; color: #FFF8DC; }
        .hadith-ticker-wrapper { overflow: hidden; white-space: nowrap; height: 7vh; display: flex; align-items: center; background: rgba(0,0,0,0.2); border-radius: 3vh; direction: ltr; }
        .ticker-content { display: inline-block; padding-right: 100%; animation: tickerLTR 35s linear infinite; font-size: 4.5vh; text-shadow: 0 0 15px rgba(0,0,0,0.9); font-weight: 600; line-height: 1.4; white-space: nowrap; font-family: 'Scheherazade New', serif; color: #ddeeff; direction: rtl; }
        @keyframes tickerLTR { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        
        /* نافذة الإقامة المنبثقة */
        .iqama-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0c1f30;
            border: 3px solid var(--gold);
            border-radius: 4vh;
            padding: 4vh 5vw;
            z-index: 8000;
            display: none;
            flex-direction: column;
            gap: 2vh;
            backdrop-filter: blur(20px);
            min-width: min(420px, 92vw);
            text-align: center;
            box-shadow: 0 0 5vh rgba(0,0,0,0.9), 0 0 9vh var(--gold-glow);
            font-family: 'Scheherazade New', serif;
        }
        .iqama-modal.active { display: flex; }
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 7900;
            display: none;
            backdrop-filter: blur(3px);
        }
        .modal-backdrop.active { display: block; }
        
        /* باقي الأجزاء */
        .full-screen-overlay { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 3vh 4vw; overflow-y: auto; }
        .full-screen-overlay.active { display: flex; }
        .countdown-circle { width: min(62vh,78vw); height: min(62vh,78vw); border-radius: 50%; border: min(5vh,5vw) solid var(--neon-green); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.55); box-shadow: 0 0 25vh var(--neon-green), 0 0 45vh rgba(0,255,136,0.35); margin-bottom: 3vh; }
        .countdown-circle.red { border-color: var(--neon-red) !important; box-shadow: 0 0 25vh var(--neon-red), 0 0 45vh rgba(255,32,32,0.45) !important; }
        .countdown-number { font-size: min(32vh,40vw); font-weight: 900; color: var(--neon-red); text-shadow: 0 0 18vh var(--neon-red); font-family: monospace; line-height: 1; }
        .overlay-prayer-name { font-size: min(8vh,10vw); color: var(--gold); text-shadow: 0 0 18px var(--gold-glow); margin-bottom: 2.5vh; font-weight: 900; font-family: 'Amiri', serif; }
        .overlay-label { font-size: min(5vh,6vw); color: #fff; margin-top: 1.5vh; }
        .adhan-text-display { font-size: min(10vh,12vw); color: #fff; text-align: center; text-shadow: 0 0 12vh gold; background: rgba(0,0,0,0.5); padding: 5vh 7vw; border-radius: 4vh; max-width: 92%; line-height: 2; font-weight: 900; animation: glowPulse 1.5s ease-in-out infinite; font-family: 'Amiri', serif; }
        .dua-text-display { font-size: min(5.5vh,7vw); color: #FFE4A1; text-align: center; text-shadow: 0 0 7vh gold; background: rgba(0,0,0,0.6); padding: 5vh 7vw; border-radius: 4vh; max-width: 92%; line-height: 2.2; font-weight: 700; border: 2px solid var(--gold); font-family: 'Scheherazade New', serif; }
        .iqama-wait-countdown { font-size: min(12vh,14vw); font-weight: 900; color: #fff; font-family: monospace; margin-bottom: 3vh; direction: ltr; }
        .iqama-wait-countdown.warning { color: var(--neon-red) !important; text-shadow: 0 0 18vh var(--neon-red) !important; font-size: min(16vh,18vw) !important; }
        .iqama-dua-box { font-size: min(4.8vh,6vw); color: #fff; text-align: center; max-width: 92%; line-height: 2.2; padding: 4vh 5vw; border-radius: 3.5vh; border: 2px solid var(--gold); transition: opacity 0.5s; min-height: 22vh; display: flex; align-items: center; justify-content: center; font-weight: 600; font-family: 'Scheherazade New', serif; }
        .iqama-wait-label { font-size: min(3vh,4vw); color: #999; margin-top: 2.5vh; }
        .saf-text { font-size: min(13vh,16vw); font-weight: 900; color: var(--gold); text-shadow: 0 0 12vh var(--gold-glow); animation: pulseGlow 1.5s infinite; text-align: center; background: rgba(0,0,0,0.6); padding: 4vh 7vw; border-radius: 7vh; font-family: 'Amiri', serif; }
        .after-prayer-title { font-size: min(5vh,6vw); color: var(--gold); text-shadow: 0 0 18px var(--gold-glow); margin-bottom: 3.5vh; font-weight: 900; font-family: 'Amiri', serif; }
        .after-prayer-dua-box { font-size: min(5vh,6.5vw); color: #fff; text-align: center; max-width: 92%; line-height: 2.3; padding: 5vh 7vw; border-radius: 3.5vh; border: 2px solid var(--gold); transition: opacity 0.5s; min-height: 28vh; display: flex; align-items: center; justify-content: center; font-weight: 600; font-family: 'Scheherazade New', serif; }
        .azkar-title { font-size: min(6vh,7vw); color: var(--gold); text-shadow: 0 0 18px var(--gold-glow); margin-bottom: 3.5vh; font-weight: 900; font-family: 'Amiri', serif; }
        .azkar-zikr-box { font-size: min(4.8vh,6vw); color: #fff; text-align: center; max-width: 92%; line-height: 2.3; padding: 5vh 7vw; border-radius: 3.5vh; border: 2px solid var(--gold); transition: opacity 0.5s; min-height: 28vh; display: flex; align-items: center; justify-content: center; font-weight: 600; font-family: 'Scheherazade New', serif; }
        .azkar-progress { font-size: min(3vh,4vw); color: #999; margin-top: 2.5vh; }
        .black-timer { font-size: min(5vh,6vw); color: #444; margin-top: 3.5vh; font-family: monospace; direction: ltr; }
        .iqama-qaeema { font-size: min(17vh,20vw); font-weight: 900; color: var(--gold); text-shadow: 0 0 18vh var(--gold-glow); animation: pulseGlow 1s infinite; text-align: center; font-family: 'Amiri', serif; }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.88; text-shadow: 0 0 4vh var(--gold), 0 0 9vh var(--gold-glow); } 50% { opacity: 1; text-shadow: 0 0 9vh var(--gold), 0 0 18vh var(--gold-glow); } }
        @keyframes glowPulse { 0%, 100% { opacity: 0.88; text-shadow: 0 0 7vh gold; } 50% { opacity: 1; text-shadow: 0 0 13vh gold; } }
        .settings-drawer { position: fixed; top: 0; right: 0; width: 100%; max-width: 640px; height: 100%; background: rgba(8,17,30,0.97); z-index: 6000; transform: translateX(100%); transition: 0.4s; overflow-y: auto; padding: 0 2vw 3vh; border-left: 3px solid var(--gold); backdrop-filter: blur(20px); }
        .settings-drawer.open { transform: translateX(0); }
        .settings-scroll-bar { display: flex; gap: 10px; justify-content: center; align-items: center; padding: 10px 5px; position: sticky; top: 0; z-index: 10; background: rgba(8,17,30,0.97); border-bottom: 2px solid var(--gold); }
        .scroll-btn { background: #0f2030; border: 2px solid var(--gold); color: var(--gold); width: 42px; height: 42px; border-radius: 10px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .scroll-close-btn { background: #2a0a0a; border: 2px solid #ff6b6b; color: #ff6b6b; width: 42px; height: 42px; border-radius: 10px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .drawer-header { display: flex; justify-content: center; align-items: center; padding: 15px 0 5px; }
        .drawer-header h2 { color: var(--gold); font-size: 3.8vh; font-family: 'Amiri', serif; }
        .setting-block { background: #0c1f30; border-radius: 3vh; padding: 2.5vh 2vw; margin-bottom: 2.5vh; border: 1px solid #1e3a52; }
        .setting-block label { display: block; margin-bottom: 1.5vh; font-weight: 700; color: #cce0ff; font-size: 2.5vh; font-family: 'Scheherazade New', serif; }
        input, select, textarea { width: 100%; padding: 1.8vh 2vw; margin: 0.7vh 0; border-radius: 5vh; background: #0d2035 !important; color: #ffffff !important; border: 1.5px solid #2a4560; font-family: 'Scheherazade New', serif; font-size: 2.4vh; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #FFD700 !important; }
        button { width: 100%; padding: 1.8vh 2vw; margin: 0.7vh 0; border-radius: 5vh; background: var(--gold); color: #08111e; font-weight: 800; cursor: pointer; border: none; font-family: 'Scheherazade New', serif; font-size: 2.4vh; }
        .album-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .album-thumb { width: 58px; height: 58px; object-fit: cover; border-radius: 10px; border: 2px solid var(--gold); cursor: pointer; }
        .toast-message { position: fixed; bottom: 12vh; right: 3vw; background: #1e4a1f; color: #ffe9a0; padding: 2vh 3vw; border-radius: 8vh; z-index: 9000; font-size: 2.4vh; animation: fadeOutToast 3.5s forwards; font-family: 'Scheherazade New', serif; }
        @keyframes fadeOutToast { 0% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .special-event-badge { position: fixed; top: 75px; left: 14px; background: rgba(0,0,0,0.75); color: gold; padding: 1vh 2vw; border-radius: 30px; font-size: 2.4vh; border: 1px solid gold; z-index: 1000; backdrop-filter: blur(6px); }
        .theme-gold .prayer-name { color: #FFD700 !important; }
        .theme-green .prayer-name { color: #00ff88 !important; }
        .theme-blue .prayer-name { color: #4fc3f7 !important; }
        .theme-purple .prayer-name { color: #ce93d8 !important; }
        .theme-red .prayer-name { color: #ff6b6b !important; }
        .stars-layer { position: fixed; inset: 0; z-index: -4; pointer-events: none; overflow: hidden; }
        .star { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.85); animation: twinkle var(--dur,3s) ease-in-out infinite; animation-delay: var(--delay,0s); }
        @keyframes twinkle { 0%, 100% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.3); } }
        #netDot { position: fixed; bottom: 10px; right: 10px; width: 8px; height: 8px; border-radius: 50%; background: #00ff88; z-index: 900; }
        #installAppBtn { position: fixed; bottom: 20px; right: 20px; background: #FFD700; color: #0A1929; padding: 14px 22px; border-radius: 40px; font-size: 2.5vh; font-weight: 900; cursor: pointer; z-index: 9000; display: none; animation: installPulse 2s infinite; }
        @keyframes installPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .divider-gold { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), rgba(255,215,0,0.6), rgba(255,215,0,0.3), transparent); margin: 0.1vh 2vw; }
        @media (max-width: 600px) and (orientation: portrait) { .prayer-grid { grid-template-columns: repeat(3,1fr) !important; gap: 2vw !important; } .live-clock-main { font-size: 13vw; } .verse-section { font-size: 4.2vw; white-space: normal; } .ticker-content { font-size: 4.5vw; } .hadith-ticker-wrapper { height: 8vh; } }
    </style>
</head>
<body>

    <div class="stars-layer" id="starsLayer"></div>
    <div id="appCursor" class="app-cursor hide"></div>
    <video id="bgVideo" autoplay loop muted playsinline></video>
    <div id="videoOverlay"></div>

    <input type="file" id="videoFileInput" accept="video/*" style="display:none;">
    <input type="file" id="imageFileInput" accept="image/*" multiple style="display:none;">

    <div class="controls-top">
        <div class="control-icon" id="fullscreenTopBtn"><i class="fas fa-expand"></i></div>
        <div class="control-icon" id="videoTopBtn"><i class="fas fa-video"></i></div>
        <div class="control-icon" id="settingsTopBtn"><i class="fas fa-cog"></i></div>
        <div class="control-icon" id="dndToggleBtn"><i class="fas fa-bell-slash"></i></div>
    </div>

    <div id="specialEventBadge" class="special-event-badge" style="display:none;"></div>

    <div class="dashboard">
        <div class="top-section">
            <div class="clock-header"><div class="live-clock-main" id="liveClockMain">--:--:--</div></div>
            <div class="datetime-bar">
                <div class="mosque-title" id="mosqueNameDisplay">🕌 مسجد الفرقان</div>
                <div class="date-center">
                    <div class="date-text" id="gregorianDate"></div>
                    <div class="hijri-text" id="hijriDate"></div>
                </div>
                <div class="countdown-side">
                    <div class="next-prayer-label" id="nextPrayerLabel">متبقٍ لصلاة الفجر</div>
                    <div class="next-prayer-time" id="nextPrayerCountdown">--:--:--</div>
                </div>
            </div>
        </div>
        <div class="middle-section"><div class="prayer-grid" id="prayerGrid"></div></div>
        <div class="divider-gold"></div>
        <div class="bottom-section">
            <div class="verse-section" id="verseBox">﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ وَارْكَعُوا مَعَ الرَّاكِعِينَ ﴾</div>
            <div class="hadith-ticker-wrapper"><div class="ticker-content" id="hadithTicker"></div></div>

                $('resetHadith').onclick = () => { state.hadithList = [...DEFAULT_HADITHS]; const hli = $('hadithListInput'); if (hli) hli.value = state.hadithList.join('\n'); const ht = $('hadithTicker'); if (ht) ht.textContent = state.hadithList[0]; saveToStorage(); showToast('✅ تمت استعادة الأحاديث الأصلية'); };
                $('saveVerse').onclick = () => { const vi = $('verseInput'); const v = vi.value.trim(); if (v) { state.verses[0] = v; updateVerseDisplay(v); saveToStorage(); showToast('✅ تم حفظ الآية'); } };
                $('saveJumuah').onclick = () => { state.jumuahEnabled = $('jumuahEnabledCheck').checked; state.jumuahAdhan1 = $('jumuahAdhan1').value; state.jumuahAdhan2 = $('jumuahAdhan2').value; state.jumuahKhutbah = $('jumuahKhutbah').value; saveToStorage(); showToast('✅ تم حفظ إعدادات الجمعة'); };
                $('adhanSoundType').onchange = () => { state.adhanSoundType = $('adhanSoundType').value; saveToStorage(); };
                $('testAdhanSound').onclick = () => { resetSession(); startNewPrayerSession('Fajr'); startAdhanMinute('Fajr'); };
                $('muteSound').onchange = () => { state.soundEnabled = !$('muteSound').checked; saveToStorage(); };
                $('hijriPlus').onclick = () => { state.hijriOffset++; updateHijri(); saveToStorage(); checkSpecialEvents(); };
                $('hijriMinus').onclick = () => { state.hijriOffset--; updateHijri(); saveToStorage(); checkSpecialEvents(); };
                $('hijriReset').onclick = () => { state.hijriOffset = 0; hijriTapDir = 1; updateHijri(); saveToStorage(); checkSpecialEvents(); showToast('📅 تمت إعادة التاريخ الهجري'); };
                $('hijriDate').onclick = onHijriTap;
                $('exportData').onclick = () => { const b = new Blob([JSON.stringify(state)], { type:'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'masjid_settings_v17.json'; a.click(); showToast('📤 تم تصدير الإعدادات'); };
                $('importData').onclick = () => $('importFile').click();
                $('importFile').onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { Object.assign(state, JSON.parse(ev.target.result)); saveToStorage(); location.reload(); } catch(e) { alert('❌ ملف غير صالح'); } }; r.readAsText(f); };
                $('bgOpacitySlider').oninput = e => { const v = e.target.value / 100; state.bgOpacity = v; document.body.style.setProperty('--bg-opacity', v); const ov = $('opacityValue'); if (ov) ov.textContent = e.target.value + '%'; saveToStorage(); };
                $('uploadVideoBtn').onclick = uploadVideoFromDevice;
                $('stopVideoBtn').onclick = stopVideo;
                $('clearVideoBtn').onclick = clearVideo;
                $('factoryReset').onclick = () => { if (confirm('⚠️ هل تريد مسح جميع الإعدادات والفيديو؟ لا يمكن التراجع!')) { try { localStorage.clear(); } catch(e) {} openVideoDB().then(() => deleteVideoFromDB()).finally(() => location.reload()); } };
                $('imamModeToggleBtn').onclick = toggleImamMode;
                
                document.addEventListener('keydown', (e) => { const key = e.key; if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') { e.preventDefault(); handleRemoteControl(key); } else if (key === 'Enter') { e.preventDefault(); handleRemoteControl('Enter'); } else if (key === 'Escape') { e.preventDefault(); handleRemoteControl('Escape'); } });
                document.addEventListener('mousemove', (e) => { if (!isOverlayActive && remoteControlActive) moveAppCursor(e.clientX, e.clientY); });
                document.addEventListener('touchmove', (e) => { if (!isOverlayActive && remoteControlActive && e.touches[0]) moveAppCursor(e.touches[0].clientX, e.touches[0].clientY); });
                window.addEventListener('resize', () => { updateBackgroundImage(); renderPrayerGrid(); });
                window.addEventListener('orientationchange', () => { setTimeout(() => { updateBackgroundImage(); renderPrayerGrid(); }, 350); });
            }
            
            function rotateVerse() { verseIdx = (verseIdx + 1) % state.verses.length; updateVerseDisplay(state.verses[verseIdx]); }
            function rotateHadith() { hadithIdx = (hadithIdx + 1) % state.hadithList.length; const ht = $('hadithTicker'); if (ht) ht.textContent = state.hadithList[hadithIdx]; }
            
            // ------------------------------
            // تهيئة PWA و Service Worker
            // ------------------------------
            var deferredInstallPrompt = null;
            window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredInstallPrompt = e; const btn = document.getElementById('installAppBtn'); if(btn) btn.style.display = 'block'; });
            window.addEventListener('appinstalled', () => { const btn = document.getElementById('installAppBtn'); if(btn) btn.style.display = 'none'; showToast('✅ تم تثبيت التطبيق!'); });
            function installApp() { if(deferredInstallPrompt) { deferredInstallPrompt.prompt(); deferredInstallPrompt.userChoice.then((r) => { if(r.outcome==='accepted') showToast('🕌 تم تثبيت لوحة المسجد!'); deferredInstallPrompt = null; const btn = document.getElementById('installAppBtn'); if(btn) btn.style.display = 'none'; }); } }
            (function setupManifest() {
                try {
                    const manifest = { name:'لوحة المسجد الذكية', short_name:'المسجد 🕌', description:'لوحة إلكترونية ذكية لمواقيت الصلاة', start_url:'./', display:'fullscreen', background_color:'#060d18', theme_color:'#FFD700', orientation:'landscape', lang:'ar', dir:'rtl', icons:[{ src:"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="60" fill="%23060d18"/><text y="420" x="30" font-size="430">🕌</text></svg>'), sizes:'512x512', type:'image/svg+xml', purpose:'any maskable' }] };
                    const blob = new Blob([JSON.stringify(manifest)], { type:'application/json' });
                    const link = document.createElement('link');
                    link.rel = 'manifest';
                    link.href = URL.createObjectURL(blob);
                    document.head.appendChild(link);
                } catch(e) {}
                if('serviceWorker' in navigator) {
                    const sw = `const C='masjid-v25'; self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add('./').catch(()=>{})));self.skipWaiting();}); self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();}); self.addEventListener('fetch',e=>{ if(e.request.url.includes('aladhan')||e.request.url.includes('islamcan')||e.request.url.includes('fonts.g'))return; e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{ if(res&&res.status===200){const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));} return res; }).catch(()=>caches.match('./')))); });`;
                    try {
                        const b = new Blob([sw], { type:'application/javascript' });
                        navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
                    } catch(e) {}
                }
            })();
            
            // ------------------------------
            // حماية للنوم والرجوع (TV BOX)
            // ------------------------------
            (function fixTVBox() {
                async function keepAwake() { try { if ('wakeLock' in navigator) { const lock = await navigator.wakeLock.request('screen'); lock.addEventListener('release', () => setTimeout(keepAwake, 1000)); } } catch(e) {} }
                keepAwake();
                document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') keepAwake(); });
                window.addEventListener('popstate', e => { e.preventDefault(); history.pushState(null,'',location.href); });
                history.pushState(null,'',location.href);
                document.addEventListener('keydown', e => { if (e.key==='Escape') { const dr = document.getElementById('settingsDrawer'); if (dr && dr.classList.contains('open')) { dr.classList.remove('open'); e.preventDefault(); } } }, true);
                const now = new Date();
                const reload = new Date(); reload.setHours(3,0,0,0);
                if (reload <= now) reload.setDate(reload.getDate()+1);
                setTimeout(() => { const hasActive = ['__adhan__','__black__','__iqamaWait__'].some(id => document.getElementById(id)); if (!hasActive) location.reload(); }, reload - now);
                setInterval(() => { const el = document.createElement('div'); el.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0.001;z-index:-9999;'; document.body.appendChild(el); setTimeout(() => el.remove(), 50); }, 30000);
                setInterval(() => { try{localStorage.setItem('alive',Date.now());}catch(e){} }, 60000);
            })();
            
            function updateNetDot() { const d = document.getElementById('netDot'); if (!d) return; d.style.background = navigator.onLine ? '#00ff88' : '#ff4444'; d.title = navigator.onLine ? '🟢 متصل' : '🔴 غير متصل'; }
            window.addEventListener('online', updateNetDot);
            window.addEventListener('offline', updateNetDot);
            
            // ------------------------------
            // بدء التطبيق
            // ------------------------------
            async function init() {
                createStars();
                loadFromStorage();
                populateCitySelect();
                applySettingsToUI();
                bindEvents();
                await loadVideoFromStorage();
                setInterval(updateDateTime, 1000);
                setInterval(rotateVerse, 18000);
                setInterval(rotateHadith, 25000);
                setInterval(checkSchedule, 1000);
                setInterval(checkSpecialEvents, 3600000);
                updateDateTime();
                checkSpecialEvents();
                setTimeout(() => renderPrayerGrid(), 500);
                setTimeout(() => renderPrayerGrid(), 1500);
                setTimeout(() => fetchAccurateTimes(state.city), 1200);
                showToast('🕌 لوحة المسجد الذكية - جاهزة بحمد الله · v17');
                setTimeout(() => { const cursor = document.getElementById('appCursor'); if(cursor) { cursor.style.display = 'block'; cursor.style.left = window.innerWidth / 2 + 'px'; cursor.style.top = window.innerHeight / 2 + 'px'; showAppCursor(); } }, 100);
                updateNetDot();
            }
            init();
        })();
    </script>
</body>
