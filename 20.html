<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تطبيق المسجد - أوقات الصلاة والأذكار</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #0a1f12 100%);
            min-height: 100vh;
            padding: 15px;
            transition: background 0.3s ease;
        }

        /* حاوية رئيسية */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* شاشة الإعدادات */
        .settings-screen {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .settings-title {
            color: #FFD700;
            font-size: 28px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .settings-btn {
            background: #2a2a3e;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-family: inherit;
        }

        .settings-btn:hover, .settings-btn:focus {
            background: #3a3a5e;
            transform: scale(1.02);
            outline: 2px solid #FFD700;
        }

        .danger-btn {
            background: #8B0000;
        }

        .danger-btn:hover, .danger-btn:focus {
            background: #a00000;
        }

        /* الشاشة الرئيسية */
        .main-screen {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 25px;
            padding: 20px;
        }

        .date-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .gregorian-date {
            color: #ccc;
            font-size: 16px;
        }

        .hijri-date {
            color: #FFD700;
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
        }

        .mosque-name {
            color: white;
            font-size: 32px;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* العد التنازلي */
        .countdown-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .next-prayer-label {
            color: #FFD700;
            font-size: 20px;
        }

        .countdown {
            color: #FF6B6B;
            font-size: 48px;
            font-weight: bold;
            direction: ltr;
            display: inline-block;
        }

        /* أوقات الصلاة */
        .prayer-times {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .prayer-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .prayer-card.current {
            background: rgba(255, 215, 0, 0.3);
            border: 2px solid #FFD700;
        }

        .prayer-name {
            color: #FFD700;
            font-size: 16px;
            font-weight: bold;
        }

        .prayer-time {
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }

        .iqamah-time {
            color: #aaa;
            font-size: 12px;
            margin-top: 5px;
        }

        /* الذكر */
        .dhikr-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border-right: 5px solid #FFD700;
        }

        .dhikr-text {
            color: white;
            font-size: 18px;
            line-height: 1.6;
        }

        .dhikr-counter {
            color: #FFD700;
            margin-top: 10px;
            font-size: 14px;
        }

        /* إعلان المسجد */
        .announcement {
            background: rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
            color: #FFD700;
            font-size: 14px;
        }

        /* أزرار التحكم */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            background: #FFD700;
            color: #1a472a;
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover, .action-btn:focus {
            background: #FFC107;
            transform: scale(1.02);
            outline: none;
        }

        /* مودال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 25px;
            padding: 25px;
            max-width: 400px;
            width: 90%;
            color: white;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        /* رسالة منبثقة */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 2000;
            display: none;
        }

        /* توافق مع الريموت */
        button:focus {
            outline: 3px solid #FFD700;
            outline-offset: 2px;
        }

        @media (max-width: 600px) {
            .prayer-times {
                grid-template-columns: repeat(2, 1fr);
            }
            .mosque-name {
                font-size: 24px;
            }
            .countdown {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- شاشة الإعدادات -->
        <div class="settings-screen" id="settingsScreen" style="display: block;">
            <div class="settings-title">⚙️ الإعدادات</div>
            <div class="settings-grid">
                <button class="settings-btn" onclick="showLocationModal()">📍 اختيار موقع المسجد</button>
                <button class="settings-btn" onclick="showEditMosqueModal()">✏️ تحرير إسم المسجد</button>
                <button class="settings-btn" onclick="showEditAnnouncementModal()">📢 تحرير إعلانات المسجد</button>
                <button class="settings-btn" onclick="changeBackground()">🖼️ تغيير خلفية الشاشة</button>
                <button class="settings-btn" onclick="showAthanSettings()">🕌 ضبط وقت الأذان والإقامة</button>
                <button class="settings-btn" onclick="setScreenTimeout()">⏺️ ضبط إخفاء الشاشة</button>
                <button class="settings-btn" onclick="showAdhkarList()">📖 استعراض الأذكار</button>
                <button class="settings-btn" onclick="showMorningEvening()">🌅 أذكر الصباح والمساء</button>
                <button class="settings-btn" onclick="startSlideshow()">🎞️ استعراض الشرائح</button>
                <button class="settings-btn" onclick="showShortcuts()">⚡ اختصارات على الشاشة</button>
                <button class="settings-btn" onclick="showWeather()">🌤️ حالة الطقس</button>
                <button class="settings-btn" onclick="showAbout()">ℹ️ معلومات عن البرنامج</button>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="settings-btn danger-btn" onclick="resetSettings()">🔄 RESET</button>
                <button class="settings-btn" onclick="reloadApp()">🔁 RELOAD</button>
                <button class="settings-btn" onclick="contactUs()">📧 CONTACT</button>
            </div>
            <div style="text-align: center; margin-top: 20px; color: #888;">WWW.TAWKIT.NET</div>
        </div>

        <!-- الشاشة الرئيسية -->
        <div class="main-screen" id="mainScreen" style="display: none;">
            <div class="date-container">
                <div class="gregorian-date" id="gregorianDate"></div>
                <div class="hijri-date" id="hijriDate"></div>
            </div>
            <div class="mosque-name" id="mosqueName">مسجد النور</div>
            <div class="countdown-container">
                <div class="next-prayer-label" id="nextPrayerLabel">العشاء</div>
                <div class="countdown" id="countdown">00:00</div>
            </div>
            <div class="prayer-times" id="prayerTimes">
                <!-- سيتم تعبئتها بواسطة JavaScript -->
            </div>
            <div class="announcement" id="announcementText">مرحباً بكم في المسجد - نسأل الله القبول</div>
            <div class="dhikr-container" id="dhikrContainer">
                <div class="dhikr-text" id="dhikrText">الذين آمنوا وتطمئن قلوبهم بذكر الله</div>
                <div class="dhikr-counter" id="dhikrCounter">تسبيح: 0</div>
            </div>
            <div class="action-buttons">
                <button class="action-btn" onclick="nextDhikr()">📿 ذكر التالي</button>
                <button class="action-btn" onclick="showSettings()">⚙️ الإعدادات</button>
                <button class="action-btn" onclick="counterDhikr()">➕ تسبيح</button>
            </div>
        </div>
    </div>

    <!-- مودال عام -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <h3 id="modalTitle">عنوان</h3>
            <div id="modalBody"></div>
            <div class="modal-buttons">
                <button onclick="closeModal()">إلغاء</button>
                <button id="modalConfirmBtn" onclick="modalConfirm()">تأكيد</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">رسالة</div>

    <script>
        // ==================== المتغيرات العامة ====================
        let currentSettings = {
            mosqueName: "مسجد النور",
            city: "Cairo",
            country: "EG",
            calculationMethod: "5",
            backgroundColor: "linear-gradient(135deg, #0a2f1f 0%, #0a1f12 100%)",
            announcement: "مرحباً بكم في المسجد - نسأل الله القبول",
            athanAdjustment: 0,
            iqamahAdjustment: 0
        };

        let prayerTimes = {};
        let dhikrList = [
            "الذين آمنوا وتطمئن قلوبهم بذكر الله",
            "اللهم إني أسألك الجنة",
            "سبحان الله وبحمده سبحان الله العظيم",
            "لا إله إلا الله وحده لا شريك له",
            "أستغفر الله العظيم الذي لا إله إلا هو الحي القيوم وأتوب إليه",
            "حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم",
            "اللهم صل على محمد وعلى آل محمد"
        ];
        let currentDhikrIndex = 0;
        let tasbeehCount = 0;
        let slideshowInterval = null;
        let screenTimeoutInterval = null;

        // ==================== التهيئة ====================
        function loadSettings() {
            const saved = localStorage.getItem("mosqueSettings");
            if (saved) {
                currentSettings = JSON.parse(saved);
            }
            document.getElementById("mosqueName").innerText = currentSettings.mosqueName;
            document.getElementById("announcementText").innerText = currentSettings.announcement;
            document.body.style.background = currentSettings.backgroundColor;
        }

        function saveSettings() {
            localStorage.setItem("mosqueSettings", JSON.stringify(currentSettings));
        }

        function updateDateTime() {
            const now = new Date();
            const gregorian = now.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById("gregorianDate").innerHTML = gregorian;
            
            // تاريخ هجري تقريبي (لأغراض العرض)
            const hijriMonths = ['محرم', 'صفر', 'ربيع الأول', 'ربيع الآخر', 'جمادى الأولى', 'جمادى الآخرة', 'رجب', 'شعبان', 'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'];
            const hijriYear = 1447;
            const hijriMonth = hijriMonths[9]; // شوال كمثال
            document.getElementById("hijriDate").innerHTML = `الأحد ${Math.floor(Math.random() * 30) + 1} ${hijriMonth} ${hijriYear}`;
        }

        // جلب أوقات الصلاة
        async function fetchPrayerTimes() {
            const url = `https://api.aladhan.com/v1/timingsByCity?city=${currentSettings.city}&country=${currentSettings.country}&method=${currentSettings.calculationMethod}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                const timings = data.data.timings;
                prayerTimes = {
                    Fajr: timings.Fajr,
                    Dhuhr: timings.Dhuhr,
                    Asr: timings.Asr,
                    Maghrib: timings.Maghrib,
                    Isha: timings.Isha
                };
                renderPrayerTimes();
                updateCountdown();
            } catch (error) {
                console.error("خطأ في جلب أوقات الصلاة", error);
                // بيانات وهمية للاختبار
                prayerTimes = { Fajr: "05:00", Dhuhr: "12:00", Asr: "15:30", Maghrib: "18:00", Isha: "19:30" };
                renderPrayerTimes();
            }
        }

        function renderPrayerTimes() {
            const prayers = [
                { name: "الفجر", key: "Fajr", iqamah: "05:15" },
                { name: "الظهر", key: "Dhuhr", iqamah: "12:15" },
                { name: "العصر", key: "Asr", iqamah: "15:45" },
                { name: "المغرب", key: "Maghrib", iqamah: "18:10" },
                { name: "العشاء", key: "Isha", iqamah: "19:45" }
            ];
            const container = document.getElementById("prayerTimes");
            container.innerHTML = prayers.map(prayer => `
                <div class="prayer-card" id="prayer_${prayer.key}">
                    <div class="prayer-name">${prayer.name}</div>
                    <div class="prayer-time">${prayerTimes[prayer.key] || "--:--"}</div>
                    <div class="iqamah-time">الإقامة: ${prayer.iqamah}</div>
                </div>
            `).join("");
        }

        function updateCountdown() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const currentTime = currentHour * 60 + currentMinute;

            const prayersOrder = [
                { name: "الفجر", time: prayerTimes.Fajr, key: "Fajr" },
                { name: "الظهر", time: prayerTimes.Dhuhr, key: "Dhuhr" },
                { name: "العصر", time: prayerTimes.Asr, key: "Asr" },
                { name: "المغرب", time: prayerTimes.Maghrib, key: "Maghrib" },
                { name: "العشاء", time: prayerTimes.Isha, key: "Isha" }
            ];

            let nextPrayer = null;
            let minDiff = Infinity;

            for (let prayer of prayersOrder) {
                if (prayer.time) {
                    const [hour, minute] = prayer.time.split(":").map(Number);
                    const prayerTimeMinutes = hour * 60 + minute;
                    let diff = prayerTimeMinutes - currentTime;
                    if (diff < 0) diff += 24 * 60;
                    if (diff < minDiff) {
                        minDiff = diff;
                        nextPrayer = prayer;
                    }
                }
            }

            if (nextPrayer) {
                document.getElementById("nextPrayerLabel").innerHTML = nextPrayer.name;
                const hours = Math.floor(minDiff / 60);
                const minutes = minDiff % 60;
                document.getElementById("countdown").innerHTML = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            }

            // تمييز وقت الصلاة الحالي
            for (let prayer of prayersOrder) {
                const card = document.getElementById(`prayer_${prayer.key}`);
                if (card) {
                    card.classList.remove("current");
                }
            }
        }

        function nextDhikr() {
            currentDhikrIndex = (currentDhikrIndex + 1) % dhikrList.length;
            document.getElementById("dhikrText").innerHTML = dhikrList[currentDhikrIndex];
        }

        function counterDhikr() {
            tasbeehCount++;
            document.getElementById("dhikrCounter").innerHTML = `تسبيح: ${tasbeehCount}`;
            showToast(`تسبيح: ${tasbeehCount}`);
        }

        // ==================== دوال الإعدادات ====================
        function showSettings() {
            document.getElementById("settingsScreen").style.display = "block";
            document.getElementById("mainScreen").style.display = "none";
        }

        function showMainScreen() {
            document.getElementById("settingsScreen").style.display = "none";
            document.getElementById("mainScreen").style.display = "block";
            loadSettings();
            fetchPrayerTimes();
            updateDateTime();
            setInterval(() => {
                updateDateTime();
                updateCountdown();
            }, 60000);
        }

        function showLocationModal() {
            showModal("اختيار موقع المسجد", `
                <select id="citySelect">
                    <option value="Cairo">القاهرة</option>
                    <option value="Alexandria">الإسكندرية</option>
                    <option value="Makkah">مكة المكرمة</option>
                    <option value="Medina">المدينة المنورة</option>
                    <option value="Dubai">دبي</option>
                </select>
                <select id="countrySelect">
                    <option value="EG">مصر</option>
                    <option value="SA">السعودية</option>
                    <option value="AE">الإمارات</option>
                </select>
            `, () => {
                currentSettings.city = document.getElementById("citySelect").value;
                currentSettings.country = document.getElementById("countrySelect").value;
                saveSettings();
                fetchPrayerTimes();
                showToast("تم تغيير موقع المسجد");
                closeModal();
            });
        }

        function showEditMosqueModal() {
            showModal("تحرير اسم المسجد", `<input type="text" id="mosqueNameInput" value="${currentSettings.mosqueName}" placeholder="اسم المسجد">`, () => {
                currentSettings.mosqueName = document.getElementById("mosqueNameInput").value;
                document.getElementById("mosqueName").innerText = currentSettings.mosqueName;
                saveSettings();
                showToast("تم تغيير اسم المسجد");
                closeModal();
            });
        }

        function showEditAnnouncementModal() {
            showModal("تحرير إعلانات المسجد", `<textarea id="announcementInput" rows="3" style="width:100%">${currentSettings.announcement}</textarea>`, () => {
                currentSettings.announcement = document.getElementById("announcementInput").value;
                document.getElementById("announcementText").innerText = currentSettings.announcement;
                saveSettings();
                showToast("تم تغيير الإعلان");
                closeModal();
            });
        }

        function changeBackground() {
            const backgrounds = [
                "linear-gradient(135deg, #0a2f1f 0%, #0a1f12 100%)",
                "linear-gradient(135deg, #1a472a 0%, #0d2b1f 100%)",
                "linear-gradient(135deg, #2c3e50 0%, #1a252f 100%)",
                "linear-gradient(135deg, #4a2c2c 0%, #2a1a1a 100%)"
            ];
            const current = backgrounds.indexOf(currentSettings.backgroundColor);
            const next = (current + 1) % backgrounds.length;
            currentSettings.backgroundColor = backgrounds[next];
            document.body.style.background = currentSettings.backgroundColor;
            saveSettings();
            showToast("تم تغيير خلفية الشاشة");
        }

        function showAthanSettings() {
            showModal("ضبط وقت الأذان والإقامة", `
                <label>تعديل الأذان (دقائق):</label>
                <input type="number" id="athanAdjust" value="${currentSettings.athanAdjustment}">
                <label>تعديل الإقامة (دقائق):</label>
                <input type="number" id="iqamahAdjust" value="${currentSettings.iqamahAdjustment}">
            `, () => {
                currentSettings.athanAdjustment = parseInt(document.getElementById("athanAdjust").value) || 0;
                currentSettings.iqamahAdjustment = parseInt(document.getElementById("iqamahAdjust").value) || 0;
                saveSettings();
                showToast("تم ضبط أوقات الأذان والإقامة");
                closeModal();
            });
        }

        function setScreenTimeout() {
            showModal("ضبط إخفاء الشاشة", `
                <select id="timeoutSelect">
                    <option value="0">أبداً</option>
                    <option value="60">دقيقة واحدة</option>
                    <option value="300">5 دقائق</option>
                    <option value="600">10 دقائق</option>
                </select>
            `, () => {
                const seconds = parseInt(document.getElementById("timeoutSelect").value);
                if (screenTimeoutInterval) clearTimeout(screenTimeoutInterval);
                if (seconds > 0) {
                    screenTimeoutInterval = setTimeout(() => {
                        document.body.style.opacity = "0";
                        setTimeout(() => {
                            document.body.style.opacity = "1";
                        }, 3000);
                    }, seconds * 1000);
                }
                showToast(`سيتم إخفاء الشاشة بعد ${seconds} ثانية`);
                closeModal();
            });
        }

        function showAdhkarList() {
            let adhkarHtml = "<ul style='text-align:right'>";
            dhikrList.forEach((d, i) => {
                adhkarHtml += `<li style="margin:10px 0">${d}</li>`;
            });
            adhkarHtml += "</ul>";
            showModal("📖 استعراض الأذكار", adhkarHtml, () => {
                closeModal();
            });
            document.getElementById("modalConfirmBtn").innerText = "إغلاق";
        }

        function showMorningEvening() {
            const morningAdhkar = [
                "أصبحنا وأصبح الملك لله",
                "اللهم بك أصبحنا وبك أمسينا",
                "سبحان الله وبحمده"
            ];
            showModal("🌅 أذكار الصباح والمساء", morningAdhkar.map(d => `📿 ${d}`).join("<br><br>"), () => {
                closeModal();
            });
            document.getElementById("modalConfirmBtn").innerText = "إغلاق";
        }

        function startSlideshow() {
            const images = [
                "🕋 الكعبة المشرفة",
                "🕌 المسجد النبوي",
                "⭐ نجوم السماء",
                "🌙 هلال رمضان",
                "📖 آيات قرآنية"
            ];
            let index = 0;
            if (slideshowInterval) clearInterval(slideshowInterval);
            slideshowInterval = setInterval(() => {
                document.getElementById("dhikrText").innerHTML = images[index % images.length];
                index++;
            }, 3000);
            showToast("بدء عرض الشرائح");
        }

        function showShortcuts() {
            showModal("⚡ اختصارات الشاشة", `
                <button class="settings-btn" onclick="document.getElementById('dhikrText').scrollIntoView()">الذهاب للأذكار</button>
                <button class="settings-btn" onclick="window.scrollTo(0,0)">أعلى الصفحة</button>
                <button class="settings-btn" onclick="counterDhikr()">تسبيح سريع</button>
            `, () => {
                closeModal();
            });
        }

        async function showWeather() {
            try {
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=30.0444&longitude=31.2357&current_weather=true");
                const data = await response.json();
                const temp = data.current_weather.temperature;
                showToast(`🌡️ درجة الحرارة: ${temp}°C`);
            } catch (error) {
                showToast("🌤️ 25°C - غائم جزئياً");
            }
        }

        function showAbout() {
            showModal("ℹ️ معلومات عن البرنامج", `
                <strong>تطبيق المسجد الذكي</strong><br>
                الإصدار: 2.0<br>
                المطور: Tawkit.NET<br>
                جميع الحقوق محفوظة © 2026<br>
                <br>
                <strong>المميزات:</strong><br>
                ✓ أوقات الصلاة الدقيقة<br>
                ✓ أذكار الصباح والمساء<br>
                ✓ تذكير بالأذان<br>
                ✓ شاشة تعمل على TV Box<br>
                ✓ إعدادات كاملة
            `, () => {
                closeModal();
            });
            document.getElementById("modalConfirmBtn").innerText = "إغلاق";
        }

        function resetSettings() {
            if (confirm("هل أنت متأكد من إعادة ضبط جميع الإعدادات؟")) {
                localStorage.clear();
                location.reload();
            }
        }

        function reloadApp() {
            location.reload();
        }

        function contactUs() {
            window.location.href = "mailto:support@tawkit.net";
        }

        // ==================== دوال مساعدة ====================
        let modalCallback = null;
        function showModal(title, body, onConfirm) {
            document.getElementById("modalTitle").innerHTML = title;
            document.getElementById("modalBody").innerHTML = body;
            document.getElementById("modal").style.display = "flex";
            modalCallback = onConfirm;
            document.getElementById("modalConfirmBtn").innerHTML = "تأكيد";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
            modalCallback = null;
        }

        function modalConfirm() {
            if (modalCallback) modalCallback();
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerHTML = message;
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 2000);
        }

        // تشغيل التطبيق
        loadSettings();
        showMainScreen();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
