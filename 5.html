<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosque Ultra Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow:hidden;
}

header{
background:#0b3d2e;
padding:12px;
text-align:center;
font-size:22px;
}

#times{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
padding:10px;
}

.box{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

#next{
text-align:center;
font-size:20px;
margin-top:10px;
}

#countdown{
text-align:center;
font-size:32px;
color:#00ff99;
margin-top:10px;
}

#ticker{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:8px;
white-space:nowrap;
overflow:hidden;
}

#ticker span{
display:inline-block;
animation:move 20s linear infinite;
}

@keyframes move{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

#settings{
position:fixed;
top:10px;
left:10px;
background:#00aa88;
padding:8px;
border-radius:8px;
cursor:pointer;
}

#panel{
position:fixed;
top:0;
right:-280px;
width:280px;
height:100%;
background:#222;
padding:10px;
transition:0.3s;
}

#panel.open{right:0;}

input,button{
width:100%;
padding:8px;
margin-top:5px;
}
</style>
</head>

<body>

<header>🕌 Mosque Ultra Pro</header>

<div id="settings">⚙️</div>

<div id="panel">
<h3>الإعدادات</h3>
<input id="city" placeholder="المدينة" value="Nador">
<button onclick="load()">تحديث</button>
</div>

<div id="next">الصلاة الجاية: <span id="nextName"></span></div>
<div id="countdown">--:--:--</div>

<div id="times"></div>

<div id="ticker">
<span>اذكر الله • الصلاة خير من النوم • سبحان الله وبحمده • </span>
</div>

<script>

let times={};

async function load(){
let city=document.getElementById("city").value;

// API حقيقي لأوقات الصلاة
let res=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Morocco&method=2`);
let data=await res.json();

times=data.data.timings;

document.getElementById("times").innerHTML=`
<div class="box">الفجر ${times.Fajr}</div>
<div class="box">الشروق ${times.Sunrise}</div>
<div class="box">الظهر ${times.Dhuhr}</div>
<div class="box">العصر ${times.Asr}</div>
<div class="box">المغرب ${times.Maghrib}</div>
<div class="box">العشاء ${times.Isha}</div>
`;

startNext();
}

function startNext(){
let now=new Date();
let current=now.getHours()*60+now.getMinutes();

let list=[
["الفجر",times.Fajr],
["الظهر",times.Dhuhr],
["العصر",times.Asr],
["المغرب",times.Maghrib],
["العشاء",times.Isha]
];

for(let i=0;i<list.length;i++){
let t=list[i][1].split(":");
let mins=parseInt(t[0])*60+parseInt(t[1]);

if(mins>current){
document.getElementById("nextName").innerText=list[i][0];
countdown(mins-current);
return;
}
}
}

function countdown(sec){
setInterval(()=>{
let h=Math.floor(sec/3600);
let m=Math.floor((sec%3600)/60);
let s=sec%60;

document.getElementById("countdown").innerText=
`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

sec--;
},1000);
}

// settings
document.getElementById("settings").onclick=()=>{
document.getElementById("panel").classList.add("open");
}

load();

</script>

</body>
</html>
