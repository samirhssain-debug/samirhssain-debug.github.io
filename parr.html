<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>شاشة المسجد v4.4 - مسجد مولاي بوشتى</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@400;700&family=Tajawal:wght@400;700&family=Almarai:wght@400;700&family=Changa:wght@400;700&display=swap');

        :root {
            --main-color: #00ffff;
            --bg-color: #001a1a;
            --text-color: #ffffff;
            --warning-color: #ffff00;
            --font-family: 'Cairo', sans-serif;
            --font-size-scale: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            background-attachment: fixed !important;
            font-size: calc(16px * var(--font-size-scale));
        }

        .container {
            height: 100dvh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            overflow: hidden;
        }

        body.theme-white .container {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ===== 15 ثيم بألوان خلفية متناسقة ===== */
        body.theme-mosque {
            --main-color: #FFD700; 
            --bg-color: #1A3A5F;
            --border-style: solid; 
            --border-radius: 15px;
            --glow: 0 0 20px #FFD700; 
            --font-weight: 700; 
            --font-family: 'Cairo', sans-serif;
            background-image: 
                radial-gradient(circle, #ffffff 1px, transparent 1px),
                radial-gradient(circle, #ffffff 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }
        body.theme-green {
            --main-color: #00ff00; 
            --bg-color: #001a00;
            --border-style: solid; --border-radius: 10px;
            --glow: 0 0 15px #00ff00; --font-weight: 700; --font-family: 'Cairo', sans-serif;
        }
        body.theme-gold {
            --main-color: #ffd700; 
            --bg-color: #1a1400;
            --border-style: double; --border-radius: 0px;
            --glow: 0 0 20px #ffd700; --font-weight: 900; --font-family: 'Amiri', serif;
        }
        body.theme-blue {
            --main-color: #00bfff; 
            --bg-color: #001a26;
            --border-style: dashed; --border-radius: 20px;
            --glow: 0 0 15px #00bfff; --font-weight: 700; --font-family: 'Tajawal', sans-serif;
        }
        body.theme-white {
            --main-color: #000000; 
            --bg-color: #f5f5f5;
            --border-style: solid; --border-radius: 5px;
            --glow: none; --font-weight: 700; --font-family: 'Almarai', sans-serif;
        }
        body.theme-red {
            --main-color: #ff3333; 
            --bg-color: #1a0000;
            --border-style: solid; --border-radius: 15px;
            --glow: 0 0 18px #ff3333; --font-weight: 900; --font-family: 'Changa', sans-serif;
        }
        body.theme-purple {
            --main-color: #a020f0; 
            --bg-color: #0f001a;
            --border-style: dotted; --border-radius: 25px;
            --glow: 0 0 15px #a020f0; --font-weight: 700; --font-family: 'Cairo', sans-serif;
        }
        body.theme-orange {
            --main-color: #ff8c00; 
            --bg-color: #1a0d00;
            --border-style: solid; --border-radius: 8px;
            --glow: 0 0 20px #ff8c00; --font-weight: 900; --font-family: 'Amiri', serif;
        }
        body.theme-pink {
            --main-color: #ff69b4; 
            --bg-color: #1a0010;
            --border-style: dashed; --border-radius: 30px;
            --glow: 0 0 15px #ff69b4; --font-weight: 700; --font-family: 'Tajawal', sans-serif;
        }
        body.theme-cyan {
            --main-color: #00ffff; 
            --bg-color: #001a1a;
            --border-style: double; --border-radius: 12px;
            --glow: 0 0 25px #00ffff; --font-weight: 900; --font-family: 'Almarai', sans-serif;
        }
        body.theme-silver {
            --main-color: #c0c0c0; 
            --bg-color: #1a1a1a;
            --border-style: solid; --border-radius: 3px;
            --glow: 0 0 10px #c0c0c0; --font-weight: 700; --font-family: 'Changa', sans-serif;
        }
        body.theme-brown {
            --main-color: #D2691E; 
            --bg-color: #1a0d00;
            --border-style: solid; --border-radius: 10px;
            --glow: 0 0 15px #D2691E; --font-weight: 700; --font-family: 'Cairo', sans-serif;
        }
        body.theme-teal {
            --main-color: #00CED1; 
            --bg-color: #001a1a;
            --border-style: double; --border-radius: 18px;
            --glow: 0 0 20px #00CED1; --font-weight: 900; --font-family: 'Amiri', serif;
        }
        body.theme-lime {
            --main-color: #32CD32; 
            --bg-color: #0a1a00;
            --border-style: dashed; --border-radius: 22px;
            --glow: 0 0 18px #32CD32; --font-weight: 700; --font-family: 'Tajawal', sans-serif;
        }
        body.theme-indigo {
            --main-color: #9370DB; 
            --bg-color: #0a001a;
            --border-style: solid; --border-radius: 8px;
            --glow: 0 0 15px #9370DB; --font-weight: 900; --font-family: 'Almarai', sans-serif;
        }
        body.theme-maroon {
            --main-color: #DC143C; 
            --bg-color: #1a0000;
            --border-style: double; --border-radius: 15px;
            --glow: 0 0 20px #DC143C; --font-weight: 700; --font-family: 'Changa', sans-serif;
        }

        /* شريط الأحاديث الفوق */
        .hadith-ticker {
            font-size: clamp(24px, 4vh * var(--font-size-scale), 60px);
            color: var(--main-color);
            background: rgba(0,0,0,0.6);
            padding: 1.2vh 0;
            margin-top: 1vh;
            white-space: nowrap;
            overflow: hidden;
            border-bottom: 3px var(--border-style) var(--main-color);
            box-shadow: var(--glow);
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 50s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* الهيدر 3 أعمدة */
        .header {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 1vh 2vw;
            gap: 1vw;
            flex-shrink: 0;
        }

        .side-info {
            font-size: clamp(28px, 4.5vh * var(--font-size-scale), 70px);
            color: var(--main-color);
            font-weight: var(--font-weight);
            text-shadow: var(--glow);
            line-height: 1.2;
        }
        .side-right { text-align: right; }
        .side-left { text-align: left; }

        .center-info { text-align: center; }

        .date-combined {
            font-size: clamp(22px, 4vh * var(--font-size-scale), 55px);
            color: var(--main-color);
            font-weight: var(--font-weight);
            margin-bottom: 0.5vh;
            text-shadow: var(--glow);
            line-height: 1.2;
        }

        .mosque-name {
            font-size: clamp(35px, 6.5vh * var(--font-size-scale), 90px);
            color: var(--main-color);
            font-weight: var(--font-weight);
            margin: 0.5vh 0;
            text-shadow: var(--glow);
            line-height: 1.1;
        }

        .clock {
            font-size: clamp(70px, 13vh * var(--font-size-scale), 180px);
            color: var(--main-color);
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: var(--glow);
            line-height: 1;
            transition: all 0.3s ease;
        }

        /* المحتوى */
        .content-wrapper {
            flex: 1;
            padding: 0 2vw;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            min-height: 0;
        }

        .content-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 3px var(--border-style) var(--main-color);
            border-radius: var(--border-radius);
            box-shadow: var(--glow);
            padding: 2vh;
            min-height: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(3px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .verse-text {
            font-size: clamp(30px, 5.5vh * var(--font-size-scale), 80px);
            color: var(--main-color);
            font-weight: var(--font-weight);
            line-height: 1.5;
            text-shadow: var(--glow);
        }

        /* جدول الصلوات */
        .prayers {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1vw;
            flex-shrink: 0;
            min-height: 0;
        }

        .prayer-box {
            border: 3px var(--border-style) var(--main-color);
            border-radius: var(--border-radius);
            box-shadow: var(--glow);
            padding: 1.5vh 0.5vw;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.5vh;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(3px);
        }

        .prayer-box.next-prayer {
            background: var(--warning-color);
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--warning-color);
        }

        .prayer-box.next-prayer * {
            color: #000!important;
            text-shadow: none !important;
        }

        .prayer-name {
            font-size: clamp(20px, 3.8vh * var(--font-size-scale), 50px);
            font-weight: 900;
            line-height: 1.2;
        }

        .prayer-time {
            font-size: clamp(18px, 3.5vh * var(--font-size-scale), 45px);
            font-weight: 700;
            line-height: 1.2;
        }

        .prayer-iqama {
            font-size: clamp(14px, 2.8vh * var(--font-size-scale), 35px);
            opacity: 0.9;
            line-height: 1.2;
        }

        /* شريط الإعلانات */
        .announce-ticker {
            font-size: clamp(24px, 4vh * var(--font-size-scale), 60px);
            color: var(--main-color);
            background: rgba(0,0,0,0.6);
            padding: 1.2vh 0;
            margin-bottom: 1vh;
            white-space: nowrap;
            overflow: hidden;
            border-top: 3px var(--border-style) var(--main-color);
            box-shadow: var(--glow);
            flex-shrink: 0;
        }

        /* شاشة الصلاة والأذكار */
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .countdown-overlay.show { display: flex; }

        .countdown-text {
            font-size: clamp(40px, 7vh * var(--font-size-scale), 100px);
            color: var(--main-color);
            margin-bottom: 3vh;
        }

        .countdown-number {
            font-size: clamp(180px, 35vh * var(--font-size-scale), 400px);
            color: var(--main-color);
            font-weight: 900;
            line-height: 1;
        }

        .prayer-active-text {
            font-size: clamp(60px, 10vh * var(--font-size-scale), 140px);
            color: var(--main-color);
            font-weight: 900;
        }

        .adhkar-text {
            font-size: clamp(28px, 4.5vh * var(--font-size-scale), 65px);
            color: var(--main-color);
            text-align: center;
            padding: 0 5vw;
            line-height: 1.8;
        }

        /* عداد دائري للأذان والإقامة */
        .circle-countdown {
            width: clamp(300px, 50vh, 600px);
            height: clamp(300px, 50vh, 600px);
            border: 20px solid #00ff00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            margin-bottom: 3vh;
            box-shadow: 0 0 40px #00ff00;
        }

        .circle-number {
            font-size: clamp(120px, 20vh * var(--font-size-scale), 250px);
            color: #ff0000;
            font-weight: 900;
            line-height: 1;
        }

        .adhan-notification {
            font-size: clamp(70px, 12vh * var(--font-size-scale), 160px);
            color: var(--main-color);
            font-weight: 900;
            text-shadow: 0 0 30px var(--main-color);
        }

        /* نافذة القفل */
        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .lock-overlay.show { display: flex; }

        .lock-box {
            background: #1a1a1a;
            border: 3px solid var(--main-color);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }

        .lock-box input {
            width: 200px;
            padding: 10px;
            font-size: 3vh;
            text-align: center;
            margin: 15px 0;
            font-family: var(--font-family);
        }

        /* أزرار التحكم */
        .control-buttons {
            position: fixed;
            top: 5px;
            left: 5px;
            z-index: 999;
            display: flex;
            gap: 5px;
        }

        .control-btn {
            background: var(--main-color);
            color: #000;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            font-family: var(--font-family);
            font-weight: 700;
            cursor: pointer;
            font-size: clamp(12px, 1.8vh, 20px);
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        .control-btn:hover { opacity: 1; transform: scale(1.05); }

        .control-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border: 2px solid var(--main-color);
            border-radius: 15px;
            padding: 20px;
            z-index: 1000;
            width: 90vw;
            max-width: 700px;
            display: none;
            max-height: 90vh;
            overflow-y: auto;
        }

        .control-panel.show { display: block; }

        .control-panel h3 {
            color: var(--main-color);
            margin: 15px 0 10px 0;
            text-align: center;
            border-bottom: 1px solid var(--main-color);
            padding-bottom: 5px;
        }

        .control-group { margin-bottom: 12px; }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-color);
        }

        .control-group input,.control-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--main-color);
            background: #000;
            color: var(--text-color);
            border-radius: 5px;
            font-family: var(--font-family);
        }

        .iqama-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .font-size-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .font-size-control button {
            background: var(--main-color);
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            font-size: 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
        }

        .font-size-display {
            flex: 1;
            text-align: center;
            font-size: 18px;
            color: var(--main-color);
        }

        .btn {
            background: var(--main-color);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-family: var(--font-family);
        }

        .btn-secondary { background: #333; color: var(--text-color); }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        .overlay.show { display: block; }

        /* صورة المسجد - حل مشكل الحجم */
        #mosqueImagePreview {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
    </style>
</head>
<body class="theme-cyan">
    <!-- باقي الكود نفسو... -->
</body>
</html>
