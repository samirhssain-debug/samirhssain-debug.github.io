<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>تطبيق المسجد المتكامل - النسخة النهائية الكاملة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@400;700&family=Tajawal:wght@400;700&family=Almarai:wght@400;700&family=Changa:wght@400;700&family=Reem+Kufi:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a2f2a;
            color: #ffffff;
            min-height: 100vh;
            padding: 16px;
            position: relative;
            font-size: 18px;
            cursor: default; /* الفأرة تظهر دائماً */
            overflow-x: hidden;
        }

        /* خلفية ديناميكية تدعم 4K */
        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            z-index: -3;
            transition: background-image 0.5s ease;
        }

        body.has-mosque-bg #dynamic-bg {
            background: var(--mosque-bg, #0a2f2a) center/cover no-repeat;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(1px);
            z-index: -2;
        }

        .app-container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 18px 22px;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            transition: all 0.3s;
            word-wrap: break-word;
            white-space: normal;
        }

        body.image-mode .card {
            background: rgba(0, 0, 0, 0.35);
            border-color: transparent;
        }

        /* شريط التاريخ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 24px;
        }
        .gregorian-date {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .hijri-date {
            background: #2c5f2daa;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            direction: ltr;
        }

        /* اسم المسجد + الساعة */
        .mosque-clock {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 24px;
        }
        .mosque-name {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .digital-clock {
            font-family: monospace;
            font-size: 2.3rem;
            font-weight: 700;
            background: #00000066;
            padding: 6px 18px;
            border-radius: 50px;
            letter-spacing: 2px;
            direction: ltr;
        }

        /* شبكة الصلوات */
        .prayers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin-bottom: 16px;
        }
        .prayer-item {
            background: rgba(255, 255, 245, 0.1);
            border-radius: 24px;
            padding: 14px 6px;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
        }
        .prayer-item.next-prayer {
            background: #ffd700cc;
            color: #000;
            transform: scale(1.02);
            box-shadow: 0 0 18px gold;
        }
        .prayer-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .prayer-time {
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: 600;
            direction: ltr;
        }
        .iqama-minutes {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 6px;
        }

        /* الآية الثابتة - ستتغير تلقائياً بين 20 آية */
        .ayah-box {
            text-align: center;
            font-size: 1.25rem;
            line-height: 1.7;
            font-family: 'Amiri', serif;
            animation: gentlePulse 12s infinite;
        }
        @keyframes gentlePulse {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 2px gold; }
            50% { opacity: 1; text-shadow: 0 0 8px gold; }
        }

        /* شريط الأحاديث - 20 حديثاً */
        .hadith-slider {
            background: #00000066;
            border-radius: 60px;
            padding: 14px 20px;
            text-align: center;
            font-size: 1rem;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            white-space: nowrap;
        }
        .hadith-slider .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 18s linear infinite;
            white-space: nowrap;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* زر الإعدادات */
        .settings-fab {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: #ffb347;
            width: 58px;
            height: 58px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 200;
            font-size: 30px;
            border: none;
            color: #1e2a2e;
            transition: 0.2s;
        }
        .settings-fab:hover { transform: scale(1.05); background: #ffa01e; }

        /* شاشات التغطية */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #FFD700;
        }
        .fullscreen-overlay.show { display: flex; }
        .circle-countdown {
            width: 55vh;
            height: 55vh;
            border: 15px solid #00ff00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.85);
            margin-bottom: 4vh;
        }
        .circle-number {
            font-size: calc(22vh);
            color: #ff3333;
            font-weight: 900;
            font-family: monospace;
            direction: ltr;
        }
        .adhan-text-line {
            font-size: calc(7vh);
            margin: 2vh 0;
        }
        .prayer-active-text {
            font-size: calc(12vh);
            font-weight: 900;
            text-shadow: 0 0 20px gold;
        }
        .adhkar-text {
            font-size: calc(4.5vh);
            padding: 0 10vw;
            line-height: 1.9;
            white-space: normal;
        }

        /* المودالات */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.open {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #1e293b;
            width: 95%;
            max-width: 680px;
            border-radius: 48px;
            padding: 28px;
            color: white;
            max-height: 85vh;
            overflow-y: auto;
            font-size: 1rem;
        }
        .modal-content h3 {
            font-size: 1.7rem;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #ffb347;
            display: inline-block;
            width: auto;
            padding: 0 20px;
        }
        .settings-group {
            margin-bottom: 22px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        .settings-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            border: none;
            background: #0f172a;
            color: white;
            margin-top: 5px;
            font-family: monospace;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: #ffb347;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .theme-balls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .theme-ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: 0.1s;
        }
        .theme-ball:hover { transform: scale(1.05); }
        .toast {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #2c5f2d;
            color: #ffecb3;
            padding: 12px 20px;
            border-radius: 60px;
            z-index: 3000;
            animation: fadeOut 4s forwards;
            font-size: 1rem;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0);}
            70% { opacity: 1;}
            100% { opacity: 0; visibility: hidden; transform: translateY(-20px);}
        }

        @media (max-width: 750px) {
            .prayers-grid { grid-template-columns: repeat(3, 1fr); }
            .mosque-name { font-size: 1.6rem; }
            .digital-clock { font-size: 1.7rem; }
            .gregorian-date { font-size: 1rem; }
            .hijri-date { font-size: 0.9rem; }
            .top-bar { flex-direction: column; align-items: center; text-align: center; }
        }
        @media (max-width: 500px) {
            .prayers-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-content { width: 98%; padding: 18px; }
            .theme-ball { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
<div id="dynamic-bg"></div>
<div class="overlay"></div>

<div class="app-container">
    <div class="top-bar">
        <span class="gregorian-date" id="gregorianDate">الخميس 17 أبريل 2026</span>
        <span class="hijri-date" id="hijriDate">26 ربيع الآخر 1447</span>
    </div>

    <div class="mosque-clock">
        <span class="mosque-name" id="mosqueName">مسجد النور</span>
        <span class="digital-clock" id="liveClock">--:--:--</span>
    </div>

    <div class="prayers-grid" id="prayersGrid"></div>

    <div class="card ayah-box" id="ayahBox">
        ﴿ إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ ﴾
    </div>

    <div class="card hadith-slider" id="hadithSlider">
        <div class="ticker-content" id="hadithTicker">قال رسول الله ﷺ: "خيركم من تعلم القرآن وعلمه"</div>
    </div>
</div>

<button class="settings-fab" id="settingsBtn">⚙️</button>

<!-- شاشات التغطية -->
<div id="fullscreenOverlay" class="fullscreen-overlay">
    <div id="circleCountdown" class="circle-countdown" style="display:none;">
        <div class="circle-number" id="circleNumber"></div>
    </div>
    <div id="countdownLabel" class="adhan-text-line" style="display:none;"></div>
    <div id="adhanLines" style="display:none;"></div>
    <div id="prayerActiveText" class="prayer-active-text" style="display:none;">... الصلاة قائمة ...</div>
    <div id="adhkarText" class="adhkar-text" style="display:none;"></div>
</div>

<!-- مودال الرقم السري -->
<div id="passwordModal" class="modal-overlay">
    <div class="modal-content">
        <h3>🔐 الإعدادات</h3>
        <p>أدخل الرقم السري</p>
        <input type="password" id="passwordInput" placeholder="****" maxlength="6" inputmode="numeric">
        <button id="unlockBtn">فتح</button>
        <button id="closePasswordBtn" style="background:#475569;">إلغاء</button>
    </div>
</div>

<!-- لوحة الإعدادات الكاملة -->
<div id="settingsPanel" class="modal-overlay">
    <div class="modal-content">
        <h3>⚙️ التحكم الكامل</h3>
        <div class="settings-group">
            <label>🔐 تغيير الرقم السري (الافتراضي 0000)</label>
            <input type="password" id="newPassword" placeholder="أرقام فقط">
            <button id="changePasswordBtn">تغيير</button>
        </div>
        <div class="settings-group">
            <label>🕌 اسم المسجد</label>
            <input type="text" id="mosqueNameInput" placeholder="اسم المسجد">
            <button id="saveMosqueNameBtn">حفظ</button>
        </div>
        <div class="settings-group">
            <label>📅 أوقات الصلاة (الأذان ودقائق الإقامة)</label>
            <div id="prayerTimesEditor"></div>
            <button id="saveTimesBtn">حفظ الأوقات</button>
            <button id="fetchApiBtn" style="background:#2c5f2d;">🌐 جلب الأوقات من الإنترنت (المغرب)</button>
        </div>
        <div class="settings-group">
            <label>🎨 الألوان (15 ثيماً) - يمكنك أيضاً تغيير الثيم بالضغط على صلاة الظهر أو الفجر</label>
            <div class="theme-balls" id="themeBallsContainer"></div>
        </div>
        <div class="settings-group">
            <label>🖼️ وضع صورة المسجد (يلغي ألوان الثيم)</label>
            <button id="imageModeToggle">تفعيل / إلغاء</button>
        </div>
        <div class="settings-group">
            <label>📸 تحميل صورة خلفية عالية الجودة (4K)</label>
            <input type="file" id="uploadBgImage" accept="image/*">
            <button id="resetBgBtn">إزالة الصورة والعودة للون العادي</button>
            <label>درجة الشفافية:</label>
            <input type="range" id="bgOpacitySlider" min="0" max="100" step="5" value="15">
        </div>
        <div class="settings-group">
            <label>📖 نص الآية الثابتة (يمكنك أيضاً تغييرها من القائمة)</label>
            <textarea id="ayahText" rows="2"></textarea>
            <button id="saveAyahBtn">حفظ</button>
        </div>
        <div class="settings-group">
            <label>📜 قائمة الأحاديث (كل حديث في سطر - 20 حديثاً)</label>
            <textarea id="hadithListText" rows="5"></textarea>
            <button id="saveHadithBtn">حفظ الأحاديث</button>
            <label>سرعة شريط الأحاديث (ثانية):</label>
            <input type="number" id="hadithSpeed" min="5" max="60" step="5" value="18">
        </div>
        <div class="settings-group">
            <label>⏱️ سرعة تغيير الآية (ثانية):</label>
            <input type="number" id="ayaSpeed" min="3" max="30" step="1" value="12">
        </div>
        <div class="settings-group">
            <label>📏 حجم الخط ونوعه:</label>
            <div style="display:flex; gap:10px;">
                <button id="fontMinus">A-</button>
                <span id="fontSizeDisplay" style="flex:1; text-align:center;">100%</span>
                <button id="fontPlus">A+</button>
            </div>
            <select id="fontSelect">
                <option value="Cairo">قاهرة (Cairo)</option>
                <option value="Amiri">أميري (Amiri)</option>
                <option value="Tajawal">تاجوال (Tajawal)</option>
                <option value="Almarai">المراعي (Almarai)</option>
                <option value="Reem Kufi">ريم كوفي (Reem Kufi)</option>
                <option value="Scheherazade New">شهرزاد (Scheherazade)</option>
            </select>
        </div>
        <div class="settings-group">
            <label>🔧 تعديلات يدوية (دقائق لكل صلاة)</label>
            <div class="adjustments-grid" id="individualAdjustments"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button id="addHourBtn">+ ساعة</button>
                <button id="subHourBtn">- ساعة</button>
                <button id="resetAdjustBtn">إعادة تعيين</button>
            </div>
        </div>
        <div class="settings-group">
            <label>⏰ تنبيه قبل الفجر بـ (دقيقة):</label>
            <input type="number" id="earlyAdhanMinutes" value="12">
            <button id="enableEarlySoundBtn">تفعيل / إلغاء الصوت</button>
        </div>
        <div class="settings-group">
            <label>📅 ضبط التاريخ الهجري (إزاحة بالأيام)</label>
            <div style="display:flex; gap:10px;">
                <button id="hijriPlus">+ يوم</button>
                <span id="hijriOffsetDisplay" style="flex:1; text-align:center;">0</span>
                <button id="hijriMinus">- يوم</button>
                <button id="hijriReset">إعادة تعيين</button>
            </div>
        </div>
        <div class="settings-group">
            <label>🕌 إعدادات صلاة الجمعة</label>
            <button id="toggleJumuahBtn">تفعيل / إلغاء الجمعة</button>
            <label>أذان الجمعة الأول:</label>
            <input type="time" id="jumuahAdhan1" value="12:30">
            <label>وقت الخطبة:</label>
            <input type="time" id="jumuahKhutbah" value="12:45">
        </div>
        <div class="settings-group">
            <label>⏱️ المدد:</label>
            <label>مدة الأذان (ثانية):</label>
            <input type="number" id="adhanDuration" value="3" min="1" max="10">
            <label>مدة الصلاة (دقيقة):</label>
            <input type="number" id="prayerDuration" value="10" min="5" max="20">
            <label>مدة عرض الأذكار (دقيقة):</label>
            <input type="number" id="adhkarDuration" value="2" min="1" max="10">
        </div>
        <div class="settings-group">
            <label>📖 أذكار الصباح والمساء (نصوص مخصصة)</label>
            <button id="morningAzkarBtn">☀️ أذكار الصباح</button>
            <button id="eveningAzkarBtn">🌙 أذكار المساء</button>
            <textarea id="customMorningAzkar" rows="2" placeholder="أذكار الصباح..."></textarea>
            <textarea id="customEveningAzkar" rows="2" placeholder="أذكار المساء..."></textarea>
            <button id="saveAzkarBtn">حفظ الأذكار</button>
        </div>
        <div class="settings-group">
            <label>🔔 التذكير بالأذان والإقامة</label>
            <button id="enableNotificationBtn">تفعيل التنبيهات</button>
            <label>تذكير قبل الأذان (دقائق):</label>
            <input type="number" id="reminderMinutes" value="5">
            <button id="saveReminderSettings">حفظ</button>
        </div>
        <button id="closeSettings">إغلاق</button>
    </div>
</div>

<script>
    // =======================================================
    // 1. البيانات الأساسية (20 آية و 20 حديثاً)
    // =======================================================
    let versesList = [
        "﴿ إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ ۚ يَا أَيُّهَا الَّذِينَ آمَنُوا صَلُّوا عَلَيْهِ وَسَلِّمُوا تَسْلِيمًا ﴾ [الأحزاب: 56]",
        "﴿ وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ وَارْكَعُوا مَعَ الرَّاكِعِينَ ﴾ [البقرة: 43]",
        "﴿ إِنَّ الصَّلَاةَ تَنْهَىٰ عَنِ الْفَحْشَاءِ وَالْمُنكَرِ ﴾ [العنكبوت: 45]",
        "﴿ حَافِظُوا عَلَى الصَّلَوَاتِ وَالصَّلَاةِ الْوُسْطَىٰ وَقُومُوا لِلَّهِ قَانِتِينَ ﴾ [البقرة: 238]",
        "﴿ وَاسْتَعِينُوا بِالصَّبْرِ وَالصَّلَاةِ ۚ وَإِنَّهَا لَكَبِيرَةٌ إِلَّا عَلَى الْخَاشِعِينَ ﴾ [البقرة: 45]",
        "﴿ قَدْ أَفْلَحَ الْمُؤْمِنُونَ • الَّذِينَ هُمْ فِي صَلَاتِهِمْ خَاشِعُونَ ﴾ [المؤمنون: 1-2]",
        "﴿ إِنَّ الصَّلَاةَ كَانَتْ عَلَى الْمُؤْمِنِينَ كِتَابًا مَّوْقُوتًا ﴾ [النساء: 103]",
        "﴿ رَبِّ اجْعَلْنِي مُقِيمَ الصَّلَاةِ وَمِن ذُرِّيَّتِي ۚ رَبَّنَا وَتَقَبَّلْ دُعَاءِ ﴾ [إبراهيم: 40]",
        "﴿ يَا أَيُّهَا الَّذِينَ آمَنُوا ارْكَعُوا وَاسْجُدُوا وَاعْبُدُوا رَبَّكُمْ وَافْعَلُوا الْخَيْرَ لَعَلَّكُمْ تُفْلِحُونَ ﴾ [الحج: 77]",
        "﴿ فَتَعَالَى اللَّهُ الْمَلِكُ الْحَقُّ ۗ وَلَا تَعْجَلْ بِالْقُرْآنِ مِن قَبْلِ أَن يُقْضَىٰ إِلَيْكَ وَحْيُهُ ﴾ [طه: 114]",
        "﴿ الَّذِينَ آمَنُوا وَتَطْمَئِنُّ قُلُوبُهُم بِذِكْرِ اللَّهِ ۗ أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ ﴾ [الرعد: 28]",
        "﴿ وَمَا خَلَقْتُ الْجِنَّ وَالْإِنسَ إِلَّا لِيَعْبُدُونِ ﴾ [الذاريات: 56]",
        "﴿ فَاذْكُرُونِي أَذْكُرْكُمْ وَاشْكُرُوا لِي وَلَا تَكْفُرُونِ ﴾ [البقرة: 152]",
        "﴿ إِنَّمَا الْمُؤْمِنُونَ الَّذِينَ إِذَا ذُكِرَ اللَّهُ وَجِلَتْ قُلُوبُهُمْ ﴾ [الأنفال: 2]",
        "﴿ وَإِلَٰهُكُمْ إِلَٰهٌ وَاحِدٌ ۖ لَّا إِلَٰهَ إِلَّا هُوَ الرَّحْمَٰنُ الرَّحِيمُ ﴾ [البقرة: 163]",
        "﴿ فَسَبِّحْ بِحَمْدِ رَبِّكَ وَاسْتَغْفِرْهُ ۚ إِنَّهُ كَانَ تَوَّابًا ﴾ [النصر: 3]",
        "﴿ إِنَّ اللَّهَ مَعَ الصَّابِرِينَ ﴾ [البقرة: 153]",
        "﴿ وَقُل رَّبِّ زِدْنِي عِلْمًا ﴾ [طه: 114]",
        "﴿ وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا ﴾ [الطلاق: 2]",

    // تحميل الإعدادات المحفوظة
    function loadSettings() {
        if (localStorage.getItem("fontSizeScale")) settings.fontSizeScale = parseFloat(localStorage.getItem("fontSizeScale"));
        if (localStorage.getItem("bgOpacity")) settings.bgOpacity = parseFloat(localStorage.getItem("bgOpacity"));
        if (localStorage.getItem("ayaSpeed")) settings.ayaSpeed = parseInt(localStorage.getItem("ayaSpeed"));
        if (localStorage.getItem("hadithSpeed")) settings.hadithSpeed = parseInt(localStorage.getItem("hadithSpeed"));
        if (localStorage.getItem("theme")) settings.theme = localStorage.getItem("theme");
        if (localStorage.getItem("fontFamily")) settings.fontFamily = localStorage.getItem("fontFamily");
        if (localStorage.getItem("jumuahEnabled") === "true") settings.jumuahEnabled = true;
        if (localStorage.getItem("jumuahAdhan1")) settings.jumuahAdhan1 = localStorage.getItem("jumuahAdhan1");
        if (localStorage.getItem("jumuahKhutbah")) settings.jumuahKhutbah = localStorage.getItem("jumuahKhutbah");
        if (localStorage.getItem("adhanDuration")) settings.adhanDuration = parseInt(localStorage.getItem("adhanDuration"));
        if (localStorage.getItem("prayerDuration")) settings.prayerDuration = parseInt(localStorage.getItem("prayerDuration"));
        if (localStorage.getItem("adhkarDuration")) settings.adhkarDuration = parseInt(localStorage.getItem("adhkarDuration"));
        if (localStorage.getItem("earlyAdhanMinutes")) settings.earlyAdhanMinutes = parseInt(localStorage.getItem("earlyAdhanMinutes"));
        if (localStorage.getItem("enableEarlyAdhanSound") === "true") settings.enableEarlyAdhanSound = true;
        if (localStorage.getItem("hijriOffset")) settings.hijriOffset = parseInt(localStorage.getItem("hijriOffset"));
        if (localStorage.getItem("manualAdjustments")) settings.manualAdjustments = JSON.parse(localStorage.getItem("manualAdjustments"));
        if (localStorage.getItem("pro_prayer_data")) prayerData = JSON.parse(localStorage.getItem("pro_prayer_data"));
        if (localStorage.getItem("pro_mosque_name")) document.getElementById("mosqueName").innerText = localStorage.getItem("pro_mosque_name");
        
        // تطبيق الإعدادات على الواجهة
        document.documentElement.style.fontSize = (settings.fontSizeScale * 18) + "px";
        document.getElementById("fontSizeDisplay").innerText = Math.round(settings.fontSizeScale * 100) + "%";
        document.getElementById("bgOpacitySlider").value = settings.bgOpacity * 100;
        document.documentElement.style.setProperty("--bg-opacity", settings.bgOpacity);
        document.getElementById("ayaSpeed").value = settings.ayaSpeed;
        document.getElementById("hadithSpeed").value = settings.hadithSpeed;
        document.getElementById("fontSelect").value = settings.fontFamily;
        document.getElementById("earlyAdhanMinutes").value = settings.earlyAdhanMinutes;
        document.getElementById("reminderMinutes").value = 5;
        document.getElementById("hijriOffsetDisplay").innerText = settings.hijriOffset;
        document.getElementById("jumuahAdhan1").value = settings.jumuahAdhan1;
        document.getElementById("jumuahKhutbah").value = settings.jumuahKhutbah;
        document.getElementById("adhanDuration").value = settings.adhanDuration;

    // تطبيق الثيمات
    const themes = {
        gold: { main: "#FFD700", bg: "#0a2f2a", name: "ذهبي" },
        green: { main: "#00ff00", bg: "#0a2f2a", name: "أخضر" },
        blue: { main: "#00bfff", bg: "#0a2f2a", name: "أزرق" },
        red: { main: "#ff3333", bg: "#0a2f2a", name: "أحمر" },
        purple: { main: "#a020f0", bg: "#0a2f2a", name: "بنفسجي" }
    };
    function applyTheme(themeKey) {
        if (document.body.classList.contains("image-mode")) return;
        let t = themes[themeKey] || themes.gold;
        document.documentElement.style.setProperty("--main-color", t.main);
        document.body.style.background = t.bg;
        document.getElementById("dynamic-bg").style.background = t.bg;
        localStorage.setItem("theme", themeKey);
    }
    function toggleImageMode(enable) {
        if (enable) {
            document.body.classList.add("image-mode");
            localStorage.setItem("pro_image_mode", "true");
            document.querySelectorAll(".card").forEach(c => c.style.background = "rgba(0,0,0,0.35)");
        } else {
            document.body.classList.remove("image-mode");
            localStorage.setItem("pro_image_mode", "false");
            applyTheme(settings.theme);
        }
    }

    // تبديل الثيمات بالنقر على صلاة الظهر والفجر
    function attachPrayerClickEvents() {
        let dhuhrEl = document.getElementById("prayer-الظهر");
        let fajrEl = document.getElementById("prayer-الفجر");
        if (dhuhrEl) {
            dhuhrEl.onclick = () => { if(!document.body.classList.contains("image-mode")) applyTheme("gold"); else alert("ألغِ وضع الصورة أولاً"); };
        }
        if (fajrEl) {
            fajrEl.onclick = () => { if(!document.body.classList.contains("image-mode")) applyTheme("green"); else alert("ألغِ وضع الصورة أولاً"); };
        }
    }

    // عرض أوقات الصلاة
    function renderPrayersGrid() {
        const grid = document.getElementById("prayersGrid");
        grid.innerHTML = "";
        const order = ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"];
        for (let name of order) {
            const p = prayerData[name];
            const div = document.createElement("div");
            div.className = "prayer-item";
            div.id = `prayer-${name}`;
            div.innerHTML = `
                <div class="prayer-name">${name}</div>
                <div class="prayer-time">${p.adhan}</div>
                <div class="iqama-minutes">إقامة ${p.iqamahMinutes} دقيقة</div>
            `;
            grid.appendChild(div);
        }
        attachPrayerClickEvents();
        // تحديث محرر الإعدادات
        const editor = document.getElementById("prayerTimesEditor");
        if (editor) {
            editor.innerHTML = "";
            for (let name in prayerData) {
                const p = prayerData[name];
                const div = document.createElement("div");
                div.style.marginBottom = "10px";
                div.innerHTML = `
                    <label>${name} - الأذان</label>
                    <input type="time" data-prayer="${name}" data-type="adhan" value="${p.adhan}">
                    <label>${name} - دقائق الإقامة</label>
                    <input type="number" data-prayer="${name}" data-type="iqamahMinutes" value="${p.iqamahMinutes}" min="0" max="60">
                `;
                editor.appendChild(div);
            }
        }
    }

    // دوال مساعدة
    function showToast(msg) {
        let t = document.createElement("div");
        t.className = "toast";
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }

    function savePrayerData() {
        localStorage.setItem("pro_prayer_data", JSON.stringify(prayerData));
        renderPrayersGrid();
        showToast("تم حفظ أوقات الصلاة");
    }

    function applyManualAdjustments() {
        for (let name in settings.manualAdjustments) {
            let adj = settings.manualAdjustments[name];
            if (adj !== 0 && prayerData[name]) {
                let [h, m] = prayerData[name].adhan.split(':').map(Number);
                let total = h * 60 + m + adj;
                total = (total + 1440) % 1440;
                prayerData[name].adhan = `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
            }
        }
        renderPrayersGrid();
    }

    function renderIndividualAdjustments() {
        const cont = document.getElementById("individualAdjustments");
        if (!cont) return;
        cont.innerHTML = "";
        for (let name of ["الفجر", "الظهر", "العصر", "المغرب", "العشاء"]) {
            let val = settings.manualAdjustments[name] || 0;
            let div = document.createElement("div");
            div.innerHTML = `<label>${name}</label><input type="number" id="adj_${name}" value="${val}" step="1">`;
            cont.appendChild(div);
            document.getElementById(`adj_${name}`).onchange = (e) => {
                settings.manualAdjustments[name] = parseInt(e.target.value) || 0;
                localStorage.setItem("manualAdjustments", JSON.stringify(settings.manualAdjustments));
                applyManualAdjustments();
            };
        }
    }

    // الساعة والتاريخ
    function updateDateTime() {
        let now = new Date();
        let timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
        document.getElementById("liveClock").innerText = timeStr;
        
        // التاريخ الميلادي (ثابت + إزاحة)
        let gregDate = new Date();
        let gregDay = gregDate.getDate();
        let gregMonth = gregDate.getMonth() + 1;
        let gregYear = gregDate.getFullYear();
        let months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
        let weekdays = ["الأحد", "الاتنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        let weekdayName = weekdays[gregDate.getDay()];
        document.getElementById("gregorianDate").innerText = `${weekdayName} ${gregDay} ${months[gregMonth-1]} ${gregYear}`;
        
        // التاريخ الهجري مع الإزاحة
        let hijriDate = new Date();
        hijriDate.setDate(hijriDate.getDate() + settings.hijriOffset);
        let hijriStr = hijriDate.toLocaleDateString('ar-SA-u-ca-islamic-umalqura', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById("hijriDate").innerText = hijriStr;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // الآيات والأحاديث المتناوبة
    let verseIndex = 0;
    let hadithIndex = 0;
    function rotateVerse() {
        verseIndex = (verseIndex + 1) % versesList.length;
        document.getElementById("ayahBox").innerHTML = versesList[verseIndex];
    }
    function rotateHadith() {
        hadithIndex = (hadithIndex + 1) % hadithsList.length;
        document.getElementById("hadithTicker").innerText = hadithsList[hadithIndex];
    }
    setInterval(rotateVerse, settings.ayaSpeed * 1000);
    setInterval(rotateHadith, settings.hadithSpeed * 1000);
    document.getElementById("ayahBox").innerHTML = versesList[0];
    document.getElementById("hadithTicker").innerHTML = hadithsList[0];

    // التذكير (نسخة مبسطة لكن كاملة)
    let reminderInterval;
    let notificationsGranted = false;
    function checkPrayerTimes() {
        let now = new Date();
        let nowMin = now.getHours() * 60 + now.getMinutes();
        for (let name in prayerData) {
            let [h, m] = prayerData[name].adhan.split(':').map(Number);
            let adhanMin = h * 60 + m;
            let iqamahMin = adhanMin + prayerData[name].iqamahMinutes;
            if (nowMin === adhanMin && notificationsGranted) {
                new Notification(`أذان ${name}`, { body: "حان الآن وقت الصلاة" });
                showToast(`🔔 أذان ${name}`);
            }
            if (nowMin === iqamahMin && notificationsGranted) {
                new Notification(`إقامة ${name}`, { body: "أقيموا الصلاة" });
                showToast(`🕌 إقامة ${name}`);
            }
        }
    }
    function startReminder() { if(reminderInterval) clearInterval(reminderInterval); reminderInterval = setInterval(checkPrayerTimes, 30000); }
    function enableNotifications() {
        if ("Notification" in window) {
            Notification.requestPermission().then(perm => { notificationsGranted = (perm === "granted"); if(notificationsGranted) showToast("التنبيهات مفعلة"); });
        }
    }
    startReminder();

    // ربط الأزرار (اختصار)

        inputs.forEach(inp => {
            let prayer = inp.dataset.prayer;

            if (prayer && type && inp.value) {
                if (type === "adhan") prayerData[prayer].adhan = inp.value;
                else if (type === "iqamahMinutes") prayerData[prayer].iqamahMinutes = parseInt(inp.value);
            }
        });
        savePrayerData();
    };

    document.getElementById("bgOpacitySlider").oninput = (e) => { let val = e.target.value / 100; settings.bgOpacity = val; document.documentElement.style.setProperty("--bg-opacity", val); localStorage.setItem("bgOpacity", val); };

        let file = e.target.files[0];

                localStorage.setItem("customBg", ev.target.result);
                document.body.classList.add("has-mosque-bg");
                document.documentElement.style.setProperty("--mosque-bg", `url(${ev.target.result})`);

            reader.readAsDataURL(file);
        }
    };
    document.getElementById("resetBgBtn").onclick = () => {
        localStorage.removeItem("customBg");
        document.body.classList.remove("has-mosque-bg");
        showToast("تم إزالة الصورة");
    };
    document.getElementById("imageModeToggle").onclick = () => toggleImageMode(!document.body.classList.contains("image-mode"));
    document.getElementById("addHourBtn").onclick = () => { for(let n in settings.manualAdjustments) settings.manualAdjustments[n] += 60; localStorage.setItem("manualAdjustments", JSON.stringify(settings.manualAdjustments)); applyManualAdjustments(); renderIndividualAdjustments(); };
    document.getElementById("subHourBtn").onclick = () => { for(let n in settings.manualAdjustments) settings.manualAdjustments[n] -= 60; localStorage.setItem("manualAdjustments", JSON.stringify(settings.manualAdjustments)); applyManualAdjustments(); renderIndividualAdjustments(); };
    document.getElementById("resetAdjustBtn").onclick = () => { for(let n in settings.manualAdjustments) settings.manualAdjustments[n] = 0; localStorage.setItem("manualAdjustments", JSON.stringify(settings.manualAdjustments)); applyManualAdjustments(); renderIndividualAdjustments(); };
    document.getElementById("hijriPlus").onclick = () => { settings.hijriOffset++; localStorage.setItem("hijriOffset", settings.hijriOffset); document.getElementById("hijriOffsetDisplay").innerText = settings.hijriOffset; updateDateTime(); };
    document.getElementById("hijriMinus").onclick = () => { settings.hijriOffset--; localStorage.setItem("hijriOffset", settings.hijriOffset); document.getElementById("hijriOffsetDisplay").innerText = settings.hijriOffset; updateDateTime(); };
    document.getElementById("hijriReset").onclick = () => { settings.hijriOffset = 0; localStorage.setItem("hijriOffset", 0); document.getElementById("hijriOffsetDisplay").innerText = "0"; updateDateTime(); };
    document.getElementById("saveReminderSettings").onclick = () => { let mins = parseInt(document.getElementById("reminderMinutes").value); if(mins) { reminderBeforeMinutes = mins; localStorage.setItem("pro_reminder_minutes", mins); showToast("تم حفظ التذكير"); } };
    document.getElementById("morningAzkarBtn").onclick = () => alert("☀️ أذكار الصباح: سبحان الله وبحمده، لا إله إلا الله...");
    document.getElementById("eveningAzkarBtn").onclick = () => alert("🌙 أذكار المساء: أعوذ بكلمات الله التامات...");
    document.getElementById("saveAzkarBtn").onclick = () => { showToast("تم حفظ الأذكار"); };
    document.getElementById("fetchApiBtn").onclick = () => { alert("سيتم جلب الأوقات من الإنترنت قريباً"); };
    document.getElementById("saveAyahBtn").onclick = () => { let txt = document.getElementById("ayahText").value; if(txt) { versesList[0] = txt; document.getElementById("ayahBox").innerHTML = txt; showToast("تم حفظ الآية"); } };
    document.getElementById("saveHadithBtn").onclick = () => { let lines = document.getElementById("hadithListText").value.split("\n").filter(l=>l.trim()); if(lines.length) { hadithsList = lines; document.getElementById("hadithTicker").innerHTML = hadithsList[0]; showToast("تم حفظ الأحاديث"); } };
    document.getElementById("changePasswordBtn").onclick = () => { let newPass = document.getElementById("newPassword").value; if(newPass && /^\d+$/.test(newPass)) { password = newPass; localStorage.setItem("pro_password", password); showToast("تم تغيير الرقم السري"); } else alert("أدخل أرقاماً فقط"); };
    document.getElementById("closeSettings").onclick = () => document.getElementById("settingsPanel").classList.remove("open");
    document.getElementById("closePasswordBtn").onclick = () => document.getElementById("passwordModal").classList.remove("open");
    document.getElementById("unlockBtn").onclick = () => { let entered = document.getElementById("passwordInput").value; if(entered === (localStorage.getItem("pro_password")||"0000")) { document.getElementById("passwordModal").classList.remove("open"); document.getElementById("settingsPanel").classList.add("open"); } else alert("الرقم السري غير صحيح"); };
    document.getElementById("settingsBtn").onclick = () => document.getElementById("passwordModal").classList.add("open");

    // إنشاء أزرار الثيمات
    const themeContainer = document.getElementById("themeBallsContainer");
    for (let key in themes) {
        let ball = document.createElement("div");
        ball.className = "theme-ball";
        ball.style.backgroundColor = themes[key].main;
        ball.onclick = () => { if(!document.body.classList.contains("image-mode")) applyTheme(key); else alert("ألغِ وضع الصورة أولاً"); };
        themeContainer.appendChild(ball);
    }

    loadSettings();
    renderPrayersGrid();
    applyManualAdjustments();
    renderIndividualAdjustments();
</script>
</body>
</html>
