<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>شاشة المسجد - مع شاشة الساعة بعد الصلاة</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Traditional Arabic', 'Segoe UI', 'Arial', sans-serif;
      background: #0a2f2a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* الحاوية الرئيسية */
    .container {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d3b2e 0%, #051f18 100%);
      padding: 20px;
      position: relative;
      transition: 0.3s;
    }

    /* شاشة العد التنازلي الضخمة (آخر دقيقة) */
    .fullscreen-countdown {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      background: radial-gradient(circle at center, #ff0000, #660000);
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: pulseRed 0.5s infinite alternate;
    }

    .fullscreen-countdown.active {
      display: flex;
    }

    @keyframes pulseRed {
      0% { background: radial-gradient(circle at center, #ff0000, #880000); }
      100% { background: radial-gradient(circle at center, #ff4444, #aa0000); }
    }

    .fullscreen-time {
      font-size: 25vw;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 30px #ffaa00, 0 0 60px #ff0000;
      font-family: monospace;
      letter-spacing: 10px;
      direction: ltr;
    }

    .fullscreen-label {
      font-size: 5vw;
      color: #ffdd44;
      margin-top: 20px;
      font-weight: bold;
    }

    /* ========== شاشة الساعة بعد الصلاة ========== */
    .post-prayer-clock {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a2e2a, #03100c);
      z-index: 10000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .post-prayer-clock.active {
      display: flex;
    }

    .post-prayer-clock .clock-big {
      font-size: 20vw;
      font-weight: 900;
      font-family: monospace;
      color: #ffd700;
      text-shadow: 0 0 30px #ffaa00;
      letter-spacing: 15px;
      background: rgba(0,0,0,0.5);
      padding: 30px 60px;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      border: 3px solid #ffd700;
      direction: ltr;
    }

    .post-prayer-clock .date-big {
      font-size: 3rem;
      color: #fff3cf;
      margin-top: 30px;
      font-weight: bold;
    }

    .post-prayer-clock .prayer-name-big {
      font-size: 4rem;
      color: #ffd966;
      margin-bottom: 30px;
      font-weight: bold;
    }

    /* ========== شاشة الأذكار ========== */
    .adhkar-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a472a, #0a1f15);
      z-index: 10001;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .adhkar-screen.active {
      display: flex;
    }

    .adhkar-title {
      font-size: 4rem;
      color: #ffd700;
      margin-bottom: 40px;
      font-weight: bold;
    }

    .adhkar-content {
      font-size: 2.5rem;
      line-height: 1.8;
      color: #ffffff;
      max-width: 90%;
      font-weight: bold;
      background: rgba(0,0,0,0.4);
      padding: 40px;
      border-radius: 40px;
      backdrop-filter: blur(8px);
      margin-bottom: 40px;
    }

    .adhkar-timer {
      font-size: 2rem;
      color: #ffd966;
      font-weight: bold;
    }

    /* باقي التنسيقات */
    .mosque-header {
      text-align: center;
      margin-bottom: 15px;
    }

    .mosque-name {
      font-size: 2.2rem;
      font-weight: bold;
      color: #ffd966;
      background: rgba(0,0,0,0.5);
      display: inline-block;
      padding: 8px 30px;
      border-radius: 50px;
      backdrop-filter: blur(5px);
    }

    .hadith-area {
      background: rgba(255,215,0,0.15);
      border: 2px solid #ffd700;
      border-radius: 15px;
      padding: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .hadith-scroll {
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff3c9;
      white-space: nowrap;
      animation: scrollText 60s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .jumuah-card {
      background: rgba(0,0,0,0.6);
      border: 2px solid #ffd700;
      border-radius: 20px;
      padding: 12px 20px;
      text-align: center;
      min-width: 130px;
    }

    .jumuah-time {
      font-size: 1.8rem;
      font-weight: bold;
      direction: ltr;
      color: #ffd700;
    }

    .clock-card {
      flex: 1;
      text-align: center;
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 12px;
    }

    .clock {
      font-size: 3.5rem;
      font-weight: bold;
      direction: ltr;
      font-family: monospace;
      letter-spacing: 5px;
    }

    .countdown-circle {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: 6px solid #00cc44;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: move;
      box-shadow: 0 0 30px rgba(0,255,0,0.4);
      transition: all 0.2s;
      position: relative;
    }

    .countdown-circle.urgent {
      border-color: #ff0000;
      box-shadow: 0 0 40px #ff0000;
      animation: borderPulse 0.8s infinite;
    }

    @keyframes borderPulse {
      0%,100% { box-shadow: 0 0 20px #ff0000; border-width: 6px; }
      50% { box-shadow: 0 0 60px #ff0000; border-width: 10px; }
    }

    .countdown-time {
      font-size: 3.8rem;
      font-weight: 900;
      direction: ltr;
      font-family: monospace;
      color: #ffffff;
      text-shadow: 0 0 8px #00ff00;
    }

    .countdown-label {
      font-size: 1.2rem;
      color: #ffd966;
      margin-top: 5px;
      font-weight: bold;
    }

    .prayers-grid {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .prayer-card {
      flex: 1;
      background: rgba(0,0,0,0.5);
      border-radius: 18px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .prayer-card.active {
      background: rgba(255,215,0,0.25);
      border: 2px solid #ffd700;
      transform: scale(1.02);
    }

    .prayer-name {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .prayer-time {
      font-size: 1.3rem;
      direction: ltr;
      font-family: monospace;
      font-weight: bold;
    }

    .iqama-time {
      font-size: 0.9rem;
      color: #ffd966;
    }

    .date-area {
      text-align: center;
      margin: 15px 0;
      font-size: 1rem;
      color: #ddd;
    }

    .settings-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffd700;
      border-radius: 50px;
      padding: 10px 20px;
      cursor: pointer;
      z-index: 100;
      font-weight: bold;
      color: #ffd700;
    }

    .quran-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #ffd700;
      border-radius: 50px;
      padding: 10px 20px;
      cursor: pointer;
      z-index: 100;
      font-weight: bold;
      color: #ffd700;
    }

    .settings-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      height: 100%;
      background: #1a1a1a;
      z-index: 20000;
      transition: 0.3s;
      padding: 20px;
      overflow-y: auto;
      border-left: 3px solid #ffd700;
      box-shadow: -5px 0 30px rgba(0,0,0,0.8);
    }

    .settings-panel.open {
      right: 0;
    }

    .settings-panel h3 {
      color: #ffd700;
      margin-bottom: 20px;
      text-align: center;
    }

    .setting-group {
      margin-bottom: 20px;
      border-bottom: 1px solid #444;
      padding-bottom: 15px;
    }

    .setting-group label {
      display: block;
      color: #ffd966;
      margin: 8px 0 4px;
      font-size: 0.9rem;
    }

    .setting-group input, .setting-group select {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      background: #333;
      color: white;
      border: 1px solid #ffd700;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .checkbox-row input {
      width: 20px;
      height: 20px;
    }

    .save-btn {
      background: #ffd700;
      color: #000;
      padding: 12px;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      width: 100%;
      margin-top: 15px;
      cursor: pointer;
    }

    .close-settings {
      position: absolute;
      top: 10px;
      left: 10px;
      background: red;
      color: white;
      border: none;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .countdown-circle { width: 160px; height: 160px; }
      .countdown-time { font-size: 2.5rem; }
      .clock { font-size: 2rem; }
      .prayer-name { font-size: 1rem; }
      .prayer-time { font-size: 0.9rem; }
      .mosque-name { font-size: 1.3rem; }
      .settings-panel { width: 100%; right: -100%; }
      .adhkar-content { font-size: 1.2rem; padding: 20px; }
      .adhkar-title { font-size: 2rem; }
    }

    @media (min-width: 1200px) {
      .countdown-circle { width: 280px; height: 280px; }
      .countdown-time { font-size: 5rem; }
      .clock { font-size: 5rem; }
      .prayer-name { font-size: 2rem; }
      .prayer-time { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="mosque-header">
    <div class="mosque-name" id="mosqueName">🕌 مسجد النور</div>
  </div>

  <div class="hadith-area">
    <div class="hadith-scroll" id="hadithTicker"></div>
  </div>

  <div class="info-row">
    <div class="jumuah-card">
      <div class="jumuah-time" id="jumuahTime">13:00</div>
      <div style="font-size:0.8rem;">صلاة الجمعة</div>
      <div id="jumuahCountdown" style="font-size:0.7rem; color:#ffd700;"></div>
    </div>
    <div class="clock-card">
      <div class="clock" id="clock">00:00:00</div>
    </div>
    <div class="countdown-circle" id="countdownCircle">
      <div class="countdown-time" id="countdownTime">00:00:00</div>
      <div class="countdown-label" id="countdownLabel">المتبقي</div>
    </div>
  </div>

  <div class="date-area" id="date"></div>

  <div class="prayers-grid" id="prayersGrid"></div>
</div>

<!-- شاشة آخر دقيقة (ملء الشاشة بالأحمر) -->
<div class="fullscreen-countdown" id="fullscreenCountdown">
  <div class="fullscreen-time" id="fullscreenTime">00:00</div>
  <div class="fullscreen-label">المتبقي على الصلاة</div>
</div>

<!-- شاشة الساعة بعد الصلاة (جديدة) -->
<div class="post-prayer-clock" id="postPrayerClock">
  <div class="prayer-name-big" id="postPrayerName">صلاة الفجر</div>
  <div class="clock-big" id="postPrayerClockTime">00:00:00</div>
  <div class="date-big" id="postPrayerDate"></div>
</div>

<!-- شاشة الأذكار -->
<div class="adhkar-screen" id="adhkarScreen">
  <div class="adhkar-title" id="adhkarTitle">أذكار الصباح</div>
  <div class="adhkar-content" id="adhkarContent"></div>
  <div class="adhkar-timer" id="adhkarTimer">المتبقي: 05:00</div>
</div>

<button class="settings-btn" onclick="toggleSettings()">⚙️ إعدادات</button>
<button class="quran-btn" onclick="toggleQuran()">🎵 تشغيل القرآن</button>

<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" onclick="toggleSettings()">✖</button>
  <h3>⚙️ إعدادات الشاشة</h3>
  
  <div class="setting-group">
    <label>اسم المسجد</label>
    <input type="text" id="mosqueNameInput" value="مسجد النور">
    <label>لون اسم المسجد</label>
    <input type="color" id="nameColor" value="#ffd966">
  </div>

  <div class="setting-group">
    <label>🕌 إعدادات ما بعد الصلاة</label>
    <div class="checkbox-row">
      <input type="checkbox" id="enablePostPrayerClock" checked>
      <label>تفعيل شاشة الساعة بعد الصلاة</label>
    </div>
    <label>مدة شاشة الساعة (ثانية)</label>
    <input type="number" id="postPrayerDuration" value="10" min="3" max="60">
    
    <div class="checkbox-row">
      <input type="checkbox" id="enableAdhkarAfter" checked>
      <label>تفعيل الأذكار بعد الساعة</label>
    </div>
    <label>مدة عرض الأذكار (ثانية)</label>
    <input type="number" id="adhkarDurationSetting" value="20" min="5" max="120">
  </div>

  <div class="setting-group">
    <label>مواقيت الصلاة (أذان)</label>
    <input type="time" id="fajrTime" value="05:10"> <span>الفجر</span>
    <input type="time" id="dhuhrTime" value="13:30"> <span>الظهر</span>
    <input type="time" id="asrTime" value="16:40"> <span>العصر</span>
    <input type="time" id="maghribTime" value="19:10"> <span>المغرب</span>
    <input type="time" id="ishaTime" value="20:30"> <span>العشاء</span>
    
    <label>فروقات الإقامة (دقائق)</label>
    <input type="number" id="fajrIqama" value="10" min="0"> الفجر
    <input type="number" id="dhuhrIqama" value="10"> الظهر
    <input type="number" id="asrIqama" value="10"> العصر
    <input type="number" id="maghribIqama" value="10"> المغرب
    <input type="number" id="ishaIqama" value="10"> العشاء
    
    <label>صلاة الجمعة</label>
    <input type="time" id="jumuahTimeInput" value="13:00">
  </div>

  <div class="setting-group">
    <label>المدينة لجلب المواقيت</label>
    <input type="text" id="cityInput" value="Taza">
    <input type="text" id="countryInput" value="Morocco">
    <button onclick="fetchPrayerTimes()" style="margin-top:10px;">🌐 جلب المواقيت تلقائياً</button>
  </div>

  <div class="setting-group">
    <label>خلفية الشاشة (رابط صورة)</label>
    <input type="text" id="bgUrl" placeholder="https://...">
    <input type="file" id="bgFile" accept="image/*">
  </div>

  <button class="save-btn" onclick="saveSettings()">💾 حفظ جميع الإعدادات</button>
</div>

<audio id="quranAudio" loop>
  <source src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/1.mp3" type="audio/mpeg">
</audio>

<script>
  // ========== البيانات ==========
  let prayerTimes = { fajr: "05:10", dhuhr: "13:30", asr: "16:40", maghrib: "19:10", isha: "20:30" };
  let iqamaOffsets = { fajr: 10, dhuhr: 10, asr: 10, maghrib: 10, isha: 10 };
  let jumuahTime = "13:00";
  
  // إعدادات ما بعد الصلاة
  let enablePostPrayerClock = true;
  let postPrayerDuration = 10; // ثواني
  let enableAdhkarAfter = true;
  let adhkarDurationSetting = 20; // ثواني
  
  let fullscreenInterval = null;
  let adhanTriggered = {};
  let currentPrayerName = "";
  
  // الأذكار
  const adhkarSabah = [
    "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ",
    "اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ",
    "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، عَدَدَ خَلْقِهِ",
    "رَضِيتُ بِاللَّهِ رَبًّا، وَبِالإِسْلاَمِ دِينًا، وَبِمُحَمَّدٍ نَبِيًّا",
    "اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ"
  ];
  
  const adhkarMasaa = [
    "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ",
    "اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ",
    "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ",
    "اللَّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلا أَنْتَ",
    "رَضِيتُ بِاللَّهِ رَبًّا، وَبِالإِسْلاَمِ دِينًا"
  ];
  
  const hadithList = [
    "قال رسول الله ﷺ: إنما الأعمال بالنيات",
    "قال رسول الله ﷺ: خيركم من تعلم القرآن وعلمه",
    "قال رسول الله ﷺ: المسلم من سلم المسلمون من لسانه ويده",
    "قال رسول الله ﷺ: لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه"
  ];
  
  document.getElementById("hadithTicker").innerHTML = hadithList.join(" • ") + " • ";
  
  // ========== دوال مساعدة ==========
  function formatTime12(time) {
    if (!time) return "--:--";
    let [h, m] = time.split(":").map(Number);
    let period = h >= 12 ? "م" : "ص";
    let hour12 = h % 12 || 12;
    return `${hour12}:${String(m).padStart(2,'0')} ${period}`;
  }
  
  function calculateIqamaTime(prayerTime, minutesAdd) {
    let [h, m] = prayerTime.split(":").map(Number);
    let total = h * 60 + m + minutesAdd;
    let nh = Math.floor(total / 60) % 24;
    let nm = total % 60;
    return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  }
  
  function renderPrayersTable() {
    const grid = document.getElementById("prayersGrid");
    const prayers = [
      { name: "الفجر", key: "fajr", time: prayerTimes.fajr, iqama: iqamaOffsets.fajr },
      { name: "الظهر", key: "dhuhr", time: prayerTimes.dhuhr, iqama: iqamaOffsets.dhuhr },
      { name: "العصر", key: "asr", time: prayerTimes.asr, iqama: iqamaOffsets.asr },
      { name: "المغرب", key: "maghrib", time: prayerTimes.maghrib, iqama: iqamaOffsets.maghrib },
      { name: "العشاء", key: "isha", time: prayerTimes.isha, iqama: iqamaOffsets.isha }
    ];
    grid.innerHTML = "";
    prayers.forEach(p => {
      const iqamaTime = calculateIqamaTime(p.time, p.iqama);
      const card = document.createElement("div");
      card.className = "prayer-card";
      card.setAttribute("data-prayer", p.key);
      card.innerHTML = `
        <div class="prayer-name">${p.name}</div>
        <div class="prayer-time">${formatTime12(p.time)}</div>
        <div class="iqama-time">الإقامة ${formatTime12(iqamaTime)}</div>
      `;
      grid.appendChild(card);
    });
  }
  
  // ========== عرض شاشة الساعة بعد الصلاة ==========
  function showPostPrayerClock(prayerName) {
    if (!enablePostPrayerClock) {
      // إذا كانت شاشة الساعة معطلة، ننتقل مباشرة للأذكار
      if (enableAdhkarAfter) {
        showAdhkarScreen();
      } else {
        document.querySelector(".container").style.opacity = "1";
      }
      return;
    }
    
    const clockScreen = document.getElementById("postPrayerClock");
    document.querySelector(".container").style.opacity = "0.3";
    clockScreen.classList.add("active");
    document.getElementById("postPrayerName").innerHTML = `صلاة ${prayerName}`;
    
    // تحديث الساعة والتاريخ بشكل لحظي
    const updateClockDisplay = () => {
      const now = new Date();
      const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      document.getElementById("postPrayerClockTime").innerHTML = timeStr;
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById("postPrayerDate").innerHTML = now.toLocaleDateString('ar-EG', options);
    };
    updateClockDisplay();
    const clockInterval = setInterval(updateClockDisplay, 1000);
    
    // إخفاء الشاشة بعد المدة المحددة
    setTimeout(() => {
      clearInterval(clockInterval);
      clockScreen.classList.remove("active");
      
      if (enableAdhkarAfter) {
        showAdhkarScreen();
      } else {
        document.querySelector(".container").style.opacity = "1";
      }
    }, postPrayerDuration * 1000);
  }
  
  // ========== عرض شاشة الأذكار ==========
  let adhkarIntervalRef = null;
  let adhkarTimerRef = null;
  
  function showAdhkarScreen() {
    const adhkarScreen = document.getElementById("adhkarScreen");
    const now = new Date();
    const hour = now.getHours();
    let isMorning = (hour >= 5 && hour < 12);
    let adhkarList = isMorning ? adhkarSabah : adhkarMasaa;
    let title = isMorning ? "🌅 أذكار الصباح" : "🌙 أذكار المساء";
    
    document.getElementById("adhkarTitle").innerHTML = title;
    let index = 0;
    document.getElementById("adhkarContent").innerHTML = adhkarList[index];
    
    adhkarScreen.classList.add("active");
    document.querySelector(".container").style.opacity = "0.3";
    
    // تغيير الذكر كل 8 ثواني
    if (adhkarIntervalRef) clearInterval(adhkarIntervalRef);
    adhkarIntervalRef = setInterval(() => {
      index = (index + 1) % adhkarList.length;
      document.getElementById("adhkarContent").innerHTML = adhkarList[index];
    }, 8000);
    
    // مؤقت العد التنازلي
    let secondsLeft = adhkarDurationSetting;
    const updateTimer = () => {
      let mins = Math.floor(secondsLeft / 60);
      let secs = secondsLeft % 60;
      document.getElementById("adhkarTimer").innerHTML = `المتبقي: ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      secondsLeft--;
      if (secondsLeft < 0) {
        clearInterval(adhkarTimerRef);
        clearInterval(adhkarIntervalRef);
        adhkarScreen.classList.remove("active");
        document.querySelector(".container").style.opacity = "1";
      }
    };
    if (adhkarTimerRef) clearInterval(adhkarTimerRef);
    updateTimer();
    adhkarTimerRef = setInterval(updateTimer, 1000);
  }
  
  // ========== عند انتهاء وقت الصلاة (بعد الأذان) ==========
  function onPrayerTimeReached(prayerName) {
    // إخفاء أي شاشات مفتوحة
    document.getElementById("fullscreenCountdown").classList.remove("active");
    if (fullscreenInterval) clearInterval(fullscreenInterval);
    
    // عرض شاشة الساعة ثم الأذكار
    showPostPrayerClock(prayerName);
  }
  
  // ========== تحديث العد التنازلي الرئيسي ==========
  function updateMainCountdown(now) {
    const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
    const prayersOrder = [
      { name: "الفجر", time: prayerTimes.fajr, key: "fajr" },
      { name: "الظهر", time: prayerTimes.dhuhr, key: "dhuhr" },
      { name: "العصر", time: prayerTimes.asr, key: "asr" },
      { name: "المغرب", time: prayerTimes.maghrib, key: "maghrib" },
      { name: "العشاء", time: prayerTimes.isha, key: "isha" }
    ];
    
    let nextPrayer = null;
    let nextSec = 0;
    
    for (let p of prayersOrder) {
      let [h, m] = p.time.split(":").map(Number);
      let prayerSec = h * 3600 + m * 60;
      if (currentSec < prayerSec) {
        nextPrayer = p;
        nextSec = prayerSec - currentSec;
        break;
      }
    }
    
    if (!nextPrayer) {
      nextPrayer = prayersOrder[0];
      let [h, m] = nextPrayer.time.split(":").map(Number);
      nextSec = (h * 3600 + m * 60 + 86400) - currentSec;
    }
    
    const hoursLeft = Math.floor(nextSec / 3600);
    const minutesLeft = Math.floor((nextSec % 3600) / 60);
    const secondsLeft = nextSec % 60;
    const timeString = `${String(hoursLeft).padStart(2,'0')}:${String(minutesLeft).padStart(2,'0')}:${String(secondsLeft).padStart(2,'0')}`;
    
    document.getElementById("countdownTime").innerHTML = timeString;
    document.getElementById("countdownLabel").innerHTML = `المتبقي على ${nextPrayer.name}`;
    
    // تمييز الصلاة النشطة
    document.querySelectorAll(".prayer-card").forEach(card => {
      card.classList.remove("active");
      if (card.getAttribute("data-prayer") === nextPrayer.key) {
        card.classList.add("active");
      }
    });
    
    const circle = document.getElementById("countdownCircle");
    const fullscreenDiv = document.getElementById("fullscreenCountdown");
    
    // آخر دقيقة (60 ثانية أو أقل) وليس قد انتهى تماماً
    if (nextSec <= 60 && nextSec > 0) {
      circle.classList.add("urgent");
      if (!fullscreenDiv.classList.contains("active")) {
        fullscreenDiv.classList.add("active");
        document.getElementById("fullscreenTime").innerHTML = `${String(Math.floor(nextSec / 60)).padStart(2,'0')}:${String(secondsLeft).padStart(2,'0')}`;
        if (fullscreenInterval) clearInterval(fullscreenInterval);
        fullscreenInterval = setInterval(() => {
          const nowFs = new Date();
          const currentFs = nowFs.getHours() * 3600 + nowFs.getMinutes() * 60 + nowFs.getSeconds();
          let diff = nextSec - (currentFs - (currentSec));
          if (diff <= 0) {
            fullscreenDiv.classList.remove("active");
            clearInterval(fullscreenInterval);
            circle.classList.remove("urgent");
            // عند الوصول إلى الصفر: نطلق حدث وصول الوقت
            onPrayerTimeReached(nextPrayer.name);
          } else {
            let mins = Math.floor(diff / 60);
            let secs = diff % 60;
            document.getElementById("fullscreenTime").innerHTML = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
          }
        }, 200);
      } else {
        let mins = Math.floor(nextSec / 60);
        let secs = nextSec % 60;
        document.getElementById("fullscreenTime").innerHTML = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      }
    } else {
      circle.classList.remove("urgent");
      if (fullscreenDiv.classList.contains("active")) {
        fullscreenDiv.classList.remove("active");
        if (fullscreenInterval) clearInterval(fullscreenInterval);
      }
    }
  }
  
  function updateClockAndCountdown() {
    const now = new Date();
    document.getElementById("clock").innerHTML = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const gregorian = now.toLocaleDateString('ar-EG', options);
    const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', options).format(now);
    document.getElementById("date").innerHTML = `${gregorian} / ${hijri}`;
    
    updateMainCountdown(now);
    updateJumuahCountdown(now);
    checkAdhanTime(now);
  }
  
  function updateJumuahCountdown(now) {
    if (now.getDay() !== 5) {
      document.getElementById("jumuahCountdown").innerHTML = "";
      return;
    }
    let [jh, jm] = jumuahTime.split(":").map(Number);
    let jumuahSec = jh * 3600 + jm * 60;
    let currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
    let diff = jumuahSec - currentSec;
    if (diff > 0) {
      let hours = Math.floor(diff / 3600);
      let minutes = Math.floor((diff % 3600) / 60);
      document.getElementById("jumuahCountdown").innerHTML = `⏰ المتبقي: ${hours}:${String(minutes).padStart(2,'0')}`;
    } else {
      document.getElementById("jumuahCountdown").innerHTML = "";
    }
  }
  
  function checkAdhanTime(now) {
    let currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    if (now.getSeconds() !== 0) return;
    
    const prayers = {
      "الفجر": prayerTimes.fajr,
      "الظهر": prayerTimes.dhuhr,
      "العصر": prayerTimes.asr,
      "المغرب": prayerTimes.maghrib,
      "العشاء": prayerTimes.isha
    };
    
    for (let [name, time] of Object.entries(prayers)) {
      if (time === currentTime && !adhanTriggered[name]) {
        adhanTriggered[name] = true;
        setTimeout(() => { delete adhanTriggered[name]; }, 61000);
        break;
      }
    }
  }
  
  // ========== جلب المواقيت ==========
  function fetchPrayerTimes() {
    const city = document.getElementById("cityInput").value;
    const country = document.getElementById("countryInput").value;
    fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=5`)
      .then(r => r.json())
      .then(data => {
        if (data.code === 200) {
          const t = data.data.timings;
          prayerTimes.fajr = t.Fajr.substring(0,5);
          prayerTimes.dhuhr = t.Dhuhr.substring(0,5);
          prayerTimes.asr = t.Asr.substring(0,5);
          prayerTimes.maghrib = t.Maghrib.substring(0,5);
          prayerTimes.isha = t.Isha.substring(0,5);
          saveSettings();
          renderPrayersTable();
        } else alert("خطأ في جلب المواقيت");
      })
      .catch(e => alert("فشل الاتصال"));
  }
  
  // ========== حفظ الإعدادات ==========
  function saveSettings() {
    prayerTimes = {
      fajr: document.getElementById("fajrTime").value,
      dhuhr: document.getElementById("dhuhrTime").value,
      asr: document.getElementById("asrTime").value,
      maghrib: document.getElementById("maghribTime").value,
      isha: document.getElementById("ishaTime").value
    };
    iqamaOffsets = {
      fajr: parseInt(document.getElementById("fajrIqama").value) || 0,
      dhuhr: parseInt(document.getElementById("dhuhrIqama").value) || 0,
      asr: parseInt(document.getElementById("asrIqama").value) || 0,
      maghrib: parseInt(document.getElementById("maghribIqama").value) || 0,
      isha: parseInt(document.getElementById("ishaIqama").value) || 0
    };
    jumuahTime = document.getElementById("jumuahTimeInput").value;
    
    enablePostPrayerClock = document.getElementById("enablePostPrayerClock").checked;
    postPrayerDuration = parseInt(document.getElementById("postPrayerDuration").value) || 10;
    enableAdhkarAfter = document.getElementById("enableAdhkarAfter").checked;
    adhkarDurationSetting = parseInt(document.getElementById("adhkarDurationSetting").value) || 20;
    
    const mosqueName = document.getElementById("mosqueNameInput").value;
    const nameColor = document.getElementById("nameColor").value;
    document.getElementById("mosqueName").innerHTML = `🕌 ${mosqueName}`;
    document.getElementById("mosqueName").style.color = nameColor;
    
    const bgUrl = document.getElementById("bgUrl").value;
    if (bgUrl) {
      document.querySelector(".container").style.backgroundImage = `url(${bgUrl})`;
      document.querySelector(".container").style.backgroundSize = "cover";
    }
    
    const allSettings = { prayerTimes, iqamaOffsets, jumuahTime, mosqueName, nameColor, bgUrl, enablePostPrayerClock, postPrayerDuration, enableAdhkarAfter, adhkarDurationSetting };
    localStorage.setItem("mosqueSettings", JSON.stringify(allSettings));
    renderPrayersTable();
    alert("تم حفظ الإعدادات");
  }
  
  function loadSettings() {
    const saved = localStorage.getItem("mosqueSettings");
    if (saved) {
      const s = JSON.parse(saved);
      if (s.prayerTimes) prayerTimes = s.prayerTimes;
      if (s.iqamaOffsets) iqamaOffsets = s.iqamaOffsets;
      if (s.jumuahTime) jumuahTime = s.jumuahTime;
      if (s.mosqueName) document.getElementById("mosqueNameInput").value = s.mosqueName;
      if (s.nameColor) document.getElementById("nameColor").value = s.nameColor;
      if (s.bgUrl) document.getElementById("bgUrl").value = s.bgUrl;
      if (s.enablePostPrayerClock !== undefined) enablePostPrayerClock = s.enablePostPrayerClock;
      if (s.postPrayerDuration) postPrayerDuration = s.postPrayerDuration;
      if (s.enableAdhkarAfter !== undefined) enableAdhkarAfter = s.enableAdhkarAfter;
      if (s.adhkarDurationSetting) adhkarDurationSetting = s.adhkarDurationSetting;
    }
    document.getElementById("enablePostPrayerClock").checked = enablePostPrayerClock;
    document.getElementById("postPrayerDuration").value = postPrayerDuration;
    document.getElementById("enableAdhkarAfter").checked = enableAdhkarAfter;
    document.getElementById("adhkarDurationSetting").value = adhkarDurationSetting;
    
    document.getElementById("fajrTime").value = prayerTimes.fajr;
    document.getElementById("dhuhrTime").value = prayerTimes.dhuhr;
    document.getElementById("asrTime").value = prayerTimes.asr;
    document.getElementById("maghribTime").value = prayerTimes.maghrib;
    document.getElementById("ishaTime").value = prayerTimes.isha;
    document.getElementById("jumuahTimeInput").value = jumuahTime;
    document.getElementById("fajrIqama").value = iqamaOffsets.fajr;
    document.getElementById("dhuhrIqama").value = iqamaOffsets.dhuhr;
    document.getElementById("asrIqama").value = iqamaOffsets.asr;
    document.getElementById("maghribIqama").value = iqamaOffsets.maghrib;
    document.getElementById("ishaIqama").value = iqamaOffsets.isha;
    renderPrayersTable();
  }
  
  document.getElementById("bgFile").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.querySelector(".container").style.backgroundImage = `url(${ev.target.result})`;
        document.querySelector(".container").style.backgroundSize = "cover";
      };
      reader.readAsDataURL(file);
    }
  });
  
  let quranPlaying = false;
  function toggleQuran() {
    const audio = document.getElementById("quranAudio");
    if (quranPlaying) {
      audio.pause();
      quranPlaying = false;
      document.querySelector(".quran-btn").innerHTML = "🎵 تشغيل القرآن";
    } else {
      audio.play().catch(e => console.log("التشغيل بحاجة تفاعل"));
      quranPlaying = true;
      document.querySelector(".quran-btn").innerHTML = "⏸ إيقاف القرآن";
    }
  }
  
  function toggleSettings() {
    document.getElementById("settingsPanel").classList.toggle("open");
  }
  
  // سحب الدائرة
  const circle = document.getElementById("countdownCircle");
  let isDragging = false, startX, startY, startLeft, startTop;
  circle.addEventListener("mousedown", startDrag);
  circle.addEventListener("touchstart", (e) => startDrag(e.touches[0]));
  function startDrag(e) {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    const rect = circle.getBoundingClientRect();
    startLeft = rect.left;
    startTop = rect.top;
    circle.style.position = "fixed";
    circle.style.left = startLeft + "px";
    circle.style.top = startTop + "px";
    document.addEventListener("mousemove", onDrag);
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchmove", (e) => onDrag(e.touches[0]));
    document.addEventListener("touchend", stopDrag);
  }
  function onDrag(e) {
    if (!isDragging) return;
    circle.style.left = (startLeft + (e.clientX - startX)) + "px";
    circle.style.top = (startTop + (e.clientY - startY)) + "px";
  }
  function stopDrag() {
    isDragging = false;
    document.removeEventListener("mousemove", onDrag);
    document.removeEventListener("mouseup", stopDrag);
  }
  
  setInterval(updateClockAndCountdown, 200);
  updateClockAndCountdown();
  loadSettings();
</script>
</body>
</html>
