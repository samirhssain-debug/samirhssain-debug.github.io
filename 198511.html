<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>شاشة المسجد - خلفيات إسلامية نقية</title>
  <style>
    :root {
      --mosque-name-color: #ffefb9;
      --circle-color: #00ffaa;
    }
    * {
      user-select: none;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Traditional Arabic', 'Arial', sans-serif;
      font-weight: 900;
      color: white;
      min-height: 100vh;
      background: #0a2a1f;
      background-image: url('https://www.transparenttextures.com/patterns/arabesque.png'), 
                        linear-gradient(145deg, #0a2a1f 0%, #03100a 100%);
      background-blend-mode: overlay;
      background-size: auto, cover;
      transition: all 0.3s;
    }
    /* خلفية احتياطية نقية بدون أي صور بشر */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 25px;
      gap: 12px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    /* إخفاء شريط التمرير عند الحاجة */
    .container::-webkit-scrollbar { width: 5px; }
    
    /* ========== أنماط رئيسية واضحة ========== */
    .top {
      text-align: center;
      font-size: 38px;
      font-weight: 900;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      padding: 14px;
      border-radius: 50px;
      border: 1px solid #ffd966;
      letter-spacing: 2px;
    }
    .hadith-ticker {
      background: rgba(0,0,0,0.55);
      border-radius: 40px;
      border: 1px solid #ffd700;
      padding: 10px 0;
      overflow: hidden;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .hadith-text {
      display: inline-block;
      padding-left: 100%;
      animation: scrollHadith 95s linear infinite;
      font-size: 26px;
      font-weight: 900;
    }
    @keyframes scrollHadith {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .jumuah-box {
      background: rgba(0,0,0,0.6);
      border: 2px solid #ffd700;
      border-radius: 20px;
      padding: 12px 18px;
      text-align: center;
      min-width: 130px;
      backdrop-filter: blur(8px);
    }
    .jumuah-time {
      font-size: 28px;
      font-weight: 900;
      direction: ltr;
      color: #ffd966;
    }
    .jumuah-label {
      font-size: 16px;
      color: #ffd966;
    }
    .clock {
      text-align: center;
      font-size: 72px;
      font-weight: 900;
      direction: ltr;
      background: rgba(0,0,0,0.4);
      padding: 10px 20px;
      border-radius: 60px;
      font-family: monospace;
      letter-spacing: 3px;
    }
    .countdown-circle {
      width: 140px;
      height: 140px;
      border: 5px solid var(--circle-color);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      box-shadow: 0 0 20px var(--circle-color);
      transition: all 0.2s;
      cursor: grab;
    }
    .countdown-circle.urgent {
      animation: pulseRed 1s infinite;
      border-color: #ff3333;
    }
    @keyframes pulseRed {
      0% { box-shadow: 0 0 5px red; border-color: #ff3333; }
      100% { box-shadow: 0 0 30px red; border-color: #ff8888; }
    }
    .countdown-time {
      font-size: 28px;
      font-weight: 900;
      direction: ltr;
    }
    .countdown-label {
      font-size: 14px;
      color: #ffd966;
      margin-top: 5px;
    }
    .date {
      text-align: center;
      font-size: 22px;
      background: rgba(0,0,0,0.4);
      border-radius: 30px;
      padding: 8px;
      margin: 5px 0;
    }
    .times {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
    }
    .prayer-box {
      flex: 1;
      text-align: center;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 14px 5px;
      border-radius: 24px;
      border: 1px solid rgba(255,215,0,0.4);
      transition: all 0.2s;
    }
    .prayer-box.active {
      background: rgba(255,215,0,0.25);
      border: 2px solid #ffd700;
      box-shadow: 0 0 12px gold;
    }
    .prayer-name {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 6px;
    }
    .prayer-time {
      font-size: 22px;
      direction: ltr;
      font-weight: bold;
    }
    .prayer-iqama {
      font-size: 18px;
      color: #ffd966;
      margin-top: 5px;
    }
    .adhkar {
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      padding: 15px;
      background: rgba(0,0,0,0.55);
      border-radius: 40px;
      backdrop-filter: blur(8px);
      border-right: 6px solid #ffd700;
      margin-top: 8px;
    }
    /* أزرار الإعدادات ولوحة التحكم */
    .settings-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.75);
      border: 2px solid #ffd700;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 200;
      backdrop-filter: blur(6px);
    }
    .settings-panel {
      position: fixed;
      top: 80px;
      left: 20px;
      background: rgba(0,0,0,0.95);
      border: 2px solid #ffd700;
      border-radius: 28px;
      width: 380px;
      max-height: 80vh;
      z-index: 201;
      display: none;
      flex-direction: column;
      backdrop-filter: blur(12px);
      overflow: hidden;
      direction: rtl;
    }
    .settings-panel.show { display: flex; }
    .settings-header {
      display: flex;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid #ffd700;
    }
    .settings-content {
      overflow-y: auto;
      padding: 15px;
    }
    .setting-item {
      margin-bottom: 12px;
    }
    .setting-item label {
      display: block;
      color: #ffd966;
      font-size: 14px;
    }
    .setting-item input, .setting-item select {
      width: 100%;
      padding: 8px;
      border-radius: 16px;
      background: #1e2a24;
      color: white;
      border: 1px solid #ffd700;
    }
    .btn-save, .btn-auto {
      width: 100%;
      padding: 10px;
      background: #ffd700;
      color: black;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      margin-top: 12px;
      cursor: pointer;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }
    /* قائمة الخلفيات النقية (بدون صور نساء) */
    .gallery-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0;
    }
    .gallery-item {
      width: 65px;
      height: 55px;
      border-radius: 14px;
      background-size: cover;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .gallery-item.selected, .gallery-item:hover {
      border-color: #ffd700;
    }
    /* وضع الصلاة والأذكار */
    .prayer-mode, .adhkar-mode {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #030f0a;
      z-index: 1000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .prayer-mode.active, .adhkar-mode.active { display: flex; }
    .prayer-mode-title {
      font-size: 80px;
      color: #ffd966;
    }
    .prayer-mode-countdown {
      font-size: 100px;
      direction: ltr;
      color: #00ffaa;
    }
    .skip-adhkar-btn {
      background: #ffd700;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 30px;
      cursor: pointer;
    }
    /* تحسين للشاشات الصغيرة */
    @media (max-width: 700px) {
      .container { padding: 12px; gap: 10px; }
      .clock { font-size: 40px; }
      .prayer-name { font-size: 18px; }
      .prayer-time { font-size: 14px; }
      .prayer-iqama { font-size: 11px; }
      .countdown-circle { width: 85px; height: 85px; }
      .countdown-time { font-size: 16px; }
      .top { font-size: 22px; }
      .hadith-text { font-size: 16px; animation-duration: 70s; }
      .jumuah-time { font-size: 18px; }
      .date { font-size: 14px; }
      .settings-panel { width: 90%; left: 5%; }
    }
  </style>
</head>
<body>
<div class="overlay"></div>
<div class="settings-btn" onclick="toggleSettings()">⚙️</div>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-header"><h3>⚙️ إعدادات المسجد</h3><span onclick="toggleSettings()" style="cursor:pointer;">✖️</span></div>
  <div class="settings-content">
    <h4>🕌 خلفيات إسلامية نقية (بدون صور بشر)</h4>
    <div class="gallery-preview" id="galleryPreview"></div>
    <div class="setting-item">
      <label>اسم المسجد</label>
      <input type="text" id="mosqueNameInput" value="مسجد النور">
    </div>
    <div class="setting-item">
      <label>لون النص الرئيسي</label>
      <input type="color" id="colorInput" value="#ffefb9">
    </div>
    <div class="checkbox-item">
      <input type="checkbox" id="autoChangeBg"> <label>تغيير الخلفية تلقائياً كل 30 ثانية</label>
    </div>
    <div class="setting-item">
      <label>نوع الأذكار</label>
      <select id="adhkarTypeSelect">
        <option value="auto">تلقائي (صباح/مساء)</option>
        <option value="sabah">أذكار الصباح</option>
        <option value="masaa">أذكار المساء</option>
      </select>
    </div>
    <div class="setting-item">
      <label>مدة الأذكار (دقائق)</label>
      <input type="number" id="adhkarDuration" value="5">
    </div>
    <div class="setting-item">
      <label>المدينة</label>
      <input type="text" id="cityInput" value="Taza">
    </div>
    <div class="setting-item">
      <label>الدولة</label>
      <input type="text" id="countryInput" value="Morocco">
    </div>
    <button class="btn-auto" onclick="fetchPrayerTimes()">🌐 جلب مواقيت الصلاة</button>
    <div class="setting-item"><label>الفجر</label><input type="time" id="fajrTime" value="05:10"></div>
    <div class="setting-item"><label>إقامة الفجر + دقائق</label><input type="number" id="fajrIqama" value="10"></div>
    <div class="setting-item"><label>الظهر</label><input type="time" id="dhuhrTime" value="13:30"></div>
    <div class="setting-item"><label>إقامة الظهر</label><input type="number" id="dhuhrIqama" value="10"></div>
    <div class="setting-item"><label>العصر</label><input type="time" id="asrTime" value="16:40"></div>
    <div class="setting-item"><label>إقامة العصر</label><input type="number" id="asrIqama" value="10"></div>
    <div class="setting-item"><label>المغرب</label><input type="time" id="maghribTime" value="19:10"></div>
    <div class="setting-item"><label>إقامة المغرب</label><input type="number" id="maghribIqama" value="5"></div>
    <div class="setting-item"><label>العشاء</label><input type="time" id="ishaTime" value="20:30"></div>
    <div class="setting-item"><label>إقامة العشاء</label><input type="number" id="ishaIqama" value="10"></div>
    <div class="setting-item"><label>صلاة الجمعة</label><input type="time" id="jumuahTimeInput" value="13:00"></div>
    <button class="btn-save" onclick="saveAllSettings()">💾 حفظ الإعدادات</button>
  </div>
</div>

<div class="container" id="mainContainer">
  <div class="top" id="mosqueName">🕌 مسجد النور</div>
  <div class="hadith-ticker"><div class="hadith-text" id="hadithTicker"></div></div>
  <div class="time-row">
    <div class="jumuah-box"><div class="jumuah-time" id="jumuahTime">13:00</div><div class="jumuah-label">صلاة الجمعة</div><div id="jumuahCountdown" style="font-size:14px;"></div></div>
    <div class="clock" id="clock">00:00:00</div>
    <div class="countdown-circle" id="countdownCircle"><div class="countdown-time" id="countdownTime">00:00:00</div><div class="countdown-label" id="countdownLabel">المتبقي</div></div>
  </div>
  <div class="date" id="date"></div>
  <div class="times">
    <div class="prayer-box" data-name="الفجر"><div class="prayer-name">الفجر</div><div class="prayer-time" id="fajrDisplay">05:10</div><div class="prayer-iqama" id="fajrIqamaDisplay"></div></div>
    <div class="prayer-box" data-name="الظهر"><div class="prayer-name">الظهر</div><div class="prayer-time" id="dhuhrDisplay">13:30</div><div class="prayer-iqama" id="dhuhrIqamaDisplay"></div></div>
    <div class="prayer-box" data-name="العصر"><div class="prayer-name">العصر</div><div class="prayer-time" id="asrDisplay">16:40</div><div class="prayer-iqama" id="asrIqamaDisplay"></div></div>
    <div class="prayer-box" data-name="المغرب"><div class="prayer-name">المغرب</div><div class="prayer-time" id="maghribDisplay">19:10</div><div class="prayer-iqama" id="maghribIqamaDisplay"></div></div>
    <div class="prayer-box" data-name="العشاء"><div class="prayer-name">العشاء</div><div class="prayer-time" id="ishaDisplay">20:30</div><div class="prayer-iqama" id="ishaIqamaDisplay"></div></div>
  </div>
  <div class="adhkar" id="adhkar">📿 سبحان الله والحمد لله ولا إله إلا الله والله أكبر</div>
</div>

<div class="prayer-mode" id="prayerMode"><div class="prayer-mode-title" id="prayerModeTitle"></div><div class="prayer-mode-countdown" id="prayerModeCountdown"></div><div class="skip-adhkar-btn" onclick="skipPrayerMode()">إنهاء</div></div>
<div class="adhkar-mode" id="adhkarMode"><div class="prayer-mode-title" id="adhkarModeTitle">أذكار</div><div class="adhkar-mode-content" id="adhkarModeContent" style="font-size:30px; margin:20px;"></div><div class="skip-adhkar-btn" onclick="skipAdhkar()">إغلاق</div></div>

<script>
  // ========== خلفيات نقية تماماً (بدون أي صور نساء أو أشخاص) ==========
  const pureIslamicBackgrounds = [
    { name: "زخارف ذهبية", url: "https://www.transparenttextures.com/patterns/arabesque.png" },
    { name: "قبة خضراء", url: "https://cdn.pixabay.com/photo/2016/11/29/03/53/mosque-1867189_1280.jpg" },
    { name: "مسجد أزرق", url: "https://cdn.pixabay.com/photo/2020/05/31/16/30/mosque-5244052_1280.jpg" },
    { name: "ليلة هادئة", url: "https://cdn.pixabay.com/photo/2018/03/24/17/09/moon-3256562_1280.jpg" },
    { name: "خط عربي", url: "https://cdn.pixabay.com/photo/2017/06/08/22/38/islamic-2385170_1280.jpg" },
    { name: "فسيفساء خضراء", url: "https://cdn.pixabay.com/photo/2016/01/20/16/34/mosaic-1152134_1280.jpg" }
  ];
  let currentBgIndex = 0;
  let autoBgInterval = null;
  let prayerTimer = null, adhkarTimer = null, adhkarContentInterval = null;
  let adhanTriggered = {};
  let prayerActive = false;
  let adhkarList = [];
  
  const hadithArr = [
    "قال رسول الله ﷺ: المسلم من سلم المسلمون من لسانه ويده",
    "قال رسول الله ﷺ: من حسن إسلام المرء تركه ما لا يعنيه",
    "قال الله تعالى: إن الله خلقنا من أمة محمد ﷺ"
  ];
  document.getElementById("hadithTicker").innerHTML = hadithArr.join(" • ") + " • ";
  
  const sabahAdhkar = ["اللهم بك أصبحنا", "سبحان الله وبحمده", "لا إله إلا الله وحده لا شريك له"];
  const masaaAdhkar = ["اللهم بك أمسينا", "أستغفر الله", "آية الكرسي"];
  
  function updateGallery() {
    const gallery = document.getElementById("galleryPreview");
    gallery.innerHTML = "";
    pureIslamicBackgrounds.forEach((bg, idx) => {
      let div = document.createElement("div");
      div.className = "gallery-item";
      div.style.backgroundImage = `url(${bg.url})`;
      div.style.backgroundSize = "cover";
      div.onclick = () => setBackground(bg.url);
      gallery.appendChild(div);
    });
  }
  function setBackground(url) {
    document.body.style.backgroundImage = `url(${url})`;
    document.body.style.backgroundSize = "cover";
    localStorage.setItem("lastBg", url);
  }
  function randomBg() {
    let idx = Math.floor(Math.random() * pureIslamicBackgrounds.length);
    setBackground(pureIslamicBackgrounds[idx].url);
  }
  function startAutoBg() { if(autoBgInterval) clearInterval(autoBgInterval); autoBgInterval = setInterval(randomBg, 30000); }
  function stopAutoBg() { if(autoBgInterval) clearInterval(autoBgInterval); autoBgInterval = null; }
  
  function formatTime12(t) { if(!t) return "--:--"; let [h,m]=t.split(':'); let hour=parseInt(h); let ap=hour>=12?"مساءً":"صباحاً"; let h12=hour%12||12; return `${h12}:${m} ${ap}`; }
  function calcIqama(time, offset) { if(!time) return "00:00"; let [h,m]=time.split(':').map(Number); let total = h*60+m+parseInt(offset||0); let nh=Math.floor(total/60)%24; let nm=total%60; return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`; }
  function updateIqamaDisplay() {
    ["fajr","dhuhr","asr","maghrib","isha"].forEach(p => {
      let t = document.getElementById(`${p}Time`).value;
      let off = document.getElementById(`${p}Iqama`).value;
      let iq = calcIqama(t, off);
      document.getElementById(`${p}IqamaDisplay`).innerHTML = `إقامة ${formatTime12(iq)}`;
      document.getElementById(`${p}Display`).innerHTML = formatTime12(t);
    });
  }
  
  function updateClockAndCountdown() {
    let now = new Date();
    let hh = String(now.getHours()).padStart(2,'0');
    let mm = String(now.getMinutes()).padStart(2,'0');
    let ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById("clock").innerHTML = `${hh}:${mm}:${ss}`;
    let options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    let dateStr = now.toLocaleDateString('ar-MA', options);
    document.getElementById("date").innerHTML = dateStr;
    if(!prayerActive) updateNextPrayer(now);
    updateJumuah(now);
  }
  
  function updateNextPrayer(now) {
    let prayers = {
      'الفجر': document.getElementById('fajrTime').value,
      'الظهر': document.getElementById('dhuhrTime').value,
      'العصر': document.getElementById('asrTime').value,
      'المغرب': document.getElementById('maghribTime').value,
      'العشاء': document.getElementById('ishaTime').value
    };
    let currentSec = now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
    let next = null, nextSec = null;
    for(let [name, t] of Object.entries(prayers)) {
      if(!t) continue;
      let [h,m]=t.split(':').map(Number);
      let prayerSec = h*3600+m*60;
      if(currentSec < prayerSec) { next = name; nextSec = prayerSec - currentSec; break; }
    }
    if(!next) { next = 'الفجر'; let [h,m]=prayers['الفجر'].split(':').map(Number); let prayerSec = h*3600+m*60+86400; nextSec = prayerSec - currentSec; }
    let hrs = Math.floor(nextSec/3600);
    let mins = Math.floor((nextSec%3600)/60);
    let secs = nextSec%60;
    document.getElementById("countdownTime").innerHTML = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    document.getElementById("countdownLabel").innerHTML = `المتبقي على ${next}`;
    document.querySelectorAll('.prayer-box').forEach(b => b.classList.remove('active'));
    let activeBox = Array.from(document.querySelectorAll('.prayer-box')).find(b => b.dataset.name === next);
    if(activeBox) activeBox.classList.add('active');
    if(nextSec <= 300) document.getElementById('countdownCircle').classList.add('urgent');
    else document.getElementById('countdownCircle').classList.remove('urgent');
    
    // فتح الأذان
    let currentTimeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    for(let [name, t] of Object.entries(prayers)) {
      if(t === currentTimeStr && !adhanTriggered[name] && now.getSeconds() < 2) {
        triggerAdhan(name);
        adhanTriggered[name]=true;
        setTimeout(()=>delete adhanTriggered[name], 65000);
      }
    }
  }
  
  function triggerAdhan(prayer) {
    document.getElementById("prayerModeTitle").innerHTML = `صلاة ${prayer}`;
    document.getElementById("prayerMode").classList.add("active");
    prayerActive = true;
    document.getElementById("mainContainer").style.opacity = "0.3";
    let iqamaOffset = parseInt(document.getElementById(`${prayer === 'الفجر'?'fajr':prayer === 'الظهر'?'dhuhr':prayer === 'العصر'?'asr':prayer === 'المغرب'?'maghrib':'isha'}Iqama`).value) || 10;
    let leftSec = iqamaOffset * 60;
    if(prayerTimer) clearInterval(prayerTimer);
    prayerTimer = setInterval(() => {
      let mins = Math.floor(leftSec/60);
      let secs = leftSec%60;
      document.getElementById("prayerModeCountdown").innerHTML = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      leftSec--;
      if(leftSec < 0) { clearInterval(prayerTimer); finishPrayerMode(); }
    }, 1000);
  }
  function finishPrayerMode() {
    prayerActive = false;
    document.getElementById("prayerMode").classList.remove("active");
    document.getElementById("mainContainer").style.opacity = "1";
    startAdhkarMode();
  }
  function skipPrayerMode() { clearInterval(prayerTimer); finishPrayerMode(); }
  function startAdhkarMode() {
    let type = document.getElementById('adhkarTypeSelect').value;
    if(type === 'sabah') adhkarList = sabahAdhkar;
    else if(type === 'masaa') adhkarList = masaaAdhkar;
    else {
      let hourNow = new Date().getHours();
      adhkarList = (hourNow >= 5 && hourNow < 12) ? sabahAdhkar : masaaAdhkar;
    }
    let idx = 0;
    document.getElementById("adhkarModeContent").innerHTML = adhkarList[idx];
    document.getElementById("adhkarMode").classList.add("active");
    if(adhkarContentInterval) clearInterval(adhkarContentInterval);
    adhkarContentInterval = setInterval(() => { idx = (idx+1)%adhkarList.length; document.getElementById("adhkarModeContent").innerHTML = adhkarList[idx]; }, 8000);
    let duration = parseInt(document.getElementById('adhkarDuration').value)*60;
    if(adhkarTimer) clearInterval(adhkarTimer);
    adhkarTimer = setTimeout(() => { skipAdhkar(); }, duration*1000);
  }
  function skipAdhkar() { clearInterval(adhkarContentInterval); clearTimeout(adhkarTimer); document.getElementById("adhkarMode").classList.remove("active"); }
  
  function updateJumuah(now) {
    let jTime = document.getElementById('jumuahTimeInput').value;
    if(!jTime) return;
    let [jh,jm]=jTime.split(':').map(Number);
    let nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
    let jumuahSec=jh*3600+jm*60;
    let diff=jumuahSec-nowSec;
    if(now.getDay()===5 && diff>0) {
      let hours=Math.floor(diff/3600); let mins=Math.floor((diff%3600)/60);
      document.getElementById('jumuahCountdown').innerHTML = `⏰ متبقي ${hours}:${String(mins).padStart(2,'0')}`;
    } else document.getElementById('jumuahCountdown').innerHTML = '';
  }
  
  function fetchPrayerTimes() {
    let city=document.getElementById('cityInput').value, country=document.getElementById('countryInput').value;
    fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=5`).then(r=>r.json()).then(d=>{
      if(d.code===200) {
        let t=d.data.timings;
        document.getElementById('fajrTime').value = t.Fajr.slice(0,5);
        document.getElementById('dhuhrTime').value = t.Dhuhr.slice(0,5);
        document.getElementById('asrTime').value = t.Asr.slice(0,5);
        document.getElementById('maghribTime').value = t.Maghrib.slice(0,5);
        document.getElementById('ishaTime').value = t.Isha.slice(0,5);
        updateIqamaDisplay();
        saveAllSettings();
      }
    }).catch(()=>alert("خطأ في الاتصال"));
  }
  
  function saveAllSettings() {
    let settings = {
      mosqueName: document.getElementById('mosqueNameInput').value,
      color: document.getElementById('colorInput').value,
      city: document.getElementById('cityInput').value,
      country: document.getElementById('countryInput').value,
      fajr: document.getElementById('fajrTime').value, dhuhr: document.getElementById('dhuhrTime').value,
      asr: document.getElementById('asrTime').value, maghrib: document.getElementById('maghribTime').value,
      isha: document.getElementById('ishaTime').value,
      fajrIqama: document.getElementById('fajrIqama').value, dhuhrIqama: document.getElementById('dhuhrIqama').value,
      asrIqama: document.getElementById('asrIqama').value, maghribIqama: document.getElementById('maghribIqama').value,
      ishaIqama: document.getElementById('ishaIqama').value, jumuah: document.getElementById('jumuahTimeInput').value,
      adhkarType: document.getElementById('adhkarTypeSelect').value, adhkarDuration: document.getElementById('adhkarDuration').value,
      autoBg: document.getElementById('autoChangeBg').checked
    };
    localStorage.setItem('mosqueConfig', JSON.stringify(settings));
    document.getElementById('mosqueName').innerHTML = `🕌 ${settings.mosqueName}`;
    document.documentElement.style.setProperty('--mosque-name-color', settings.color);
    document.getElementById('colorInput').value = settings.color;
    updateIqamaDisplay();
    if(settings.autoBg) startAutoBg(); else stopAutoBg();
    alert("تم حفظ الإعدادات والخلفيات خالية من أي صور غير لائقة");
  }
  function loadSettings() {
    let saved = localStorage.getItem('mosqueConfig');
    if(saved) {
      let s = JSON.parse(saved);
      if(s.mosqueName) document.getElementById('mosqueNameInput').value = s.mosqueName;
      if(s.color) document.getElementById('colorInput').value = s.color;
      if(s.city) document.getElementById('cityInput').value = s.city;
      if(s.country) document.getElementById('countryInput').value = s.country;
      if(s.fajr) document.getElementById('fajrTime').value = s.fajr;
      if(s.dhuhr) document.getElementById('dhuhrTime').value = s.dhuhr;
      if(s.asr) document.getElementById('asrTime').value = s.asr;
      if(s.maghrib) document.getElementById('maghribTime').value = s.maghrib;
      if(s.isha) document.getElementById('ishaTime').value = s.isha;
      if(s.fajrIqama) document.getElementById('fajrIqama').value = s.fajrIqama;
      if(s.dhuhrIqama) document.getElementById('dhuhrIqama').value = s.dhuhrIqama;
      if(s.asrIqama) document.getElementById('asrIqama').value = s.asrIqama;
      if(s.maghribIqama) document.getElementById('maghribIqama').value = s.maghribIqama;
      if(s.ishaIqama) document.getElementById('ishaIqama').value = s.ishaIqama;
      if(s.jumuah) document.getElementById('jumuahTimeInput').value = s.jumuah;
      if(s.adhkarType) document.getElementById('adhkarTypeSelect').value = s.adhkarType;
      if(s.adhkarDuration) document.getElementById('adhkarDuration').value = s.adhkarDuration;
      if(s.autoBg) { document.getElementById('autoChangeBg').checked = true; startAutoBg(); }
    }
    updateIqamaDisplay();
    let lastBg = localStorage.getItem('lastBg');
    if(lastBg) setBackground(lastBg);
    else randomBg();
  }
  
  function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('show'); }
  document.getElementById('autoChangeBg').addEventListener('change', (e) => { if(e.target.checked) startAutoBg(); else stopAutoBg(); });
  setInterval(updateClockAndCountdown, 1000);
  updateGallery();
  loadSettings();
  updateClockAndCountdown();
</script>
</body>
</html>
