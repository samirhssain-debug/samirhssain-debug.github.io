<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>شاشة المسجد</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    height: 100vh;
    overflow: hidden;
    background: url('https://images.unsplash.com/photo-1542816417-0983c9c9ad53') no-repeat center center/cover;
}

/* تغميق الخلفية */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.60);
    top: 0;
    left: 0;
}

/* الشريط العلوي */
.top-bar {
    position: relative;
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    font-size: 20px;
    background: rgba(0,0,0,0.4);
}

/* الساعة */
.clock {
    font-size: 70px;
    margin-top: 25px;
    font-weight: bold;
}

/* التاريخ */
.date {
    font-size: 22px;
    margin-top: 10px;
    opacity: 0.9;
}

/* الصلاة القادمة */
.prayer-box {
    margin-top: 15px;
    font-size: 26px;
    color: #ffd700;
}

/* مواقيت الصلاة */
.times {
    margin-top: 40px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    padding: 0 20px;
}

.time-box {
    background: rgba(255,255,255,0.15);
    padding: 20px 10px;
    border-radius: 14px;
    font-size: 22px;
    font-weight: bold;
}

.time-box small {
    display: block;
    margin-top: 10px;
    font-size: 16px;
    color: #ffd700;
}

/* الأذكار */
.adhkar {
    position: absolute;
    bottom: 20px;
    width: 100%;
    font-size: 24px;
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="top-bar">
    <div id="dateTop"></div>
    <div>شاشة المسجد</div>
</div>

<div class="clock" id="clock">00:00:00</div>

<div class="date" id="date"></div>

<div class="prayer-box" id="nextPrayer">
الصلاة القادمة: --
</div>

<!-- 🕌 مواقيت الصلاة -->
<div class="times">

    <div class="time-box">
        الفجر<br>05:10
        <small>الإقامة: 05:20</small>
    </div>

    <div class="time-box">
        الظهر<br>12:30
        <small>الإقامة: 12:40</small>
    </div>

    <div class="time-box">
        العصر<br>15:45
        <small>الإقامة: 15:55</small>
    </div>

    <div class="time-box">
        المغرب<br>18:10
        <small>الإقامة: 18:20</small>
    </div>

    <div class="time-box">
        العشاء<br>19:30
        <small>الإقامة: 19:40</small>
    </div>

</div>

<!-- الأذكار -->
<div class="adhkar" id="adhkar">
سبحان الله • الحمد لله • لا إله إلا الله • الله أكبر
</div>

<script>

// ⏰ الساعة
function updateClock() {
    let now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString('ar-MA');
}
setInterval(updateClock, 1000);
updateClock();

// 📅 التاريخ
let d = new Date();
document.getElementById("date").innerHTML =
    d.toLocaleDateString('ar-MA');

document.getElementById("dateTop").innerHTML =
    d.toLocaleDateString('ar-MA');

// 🕌 الصلاة القادمة (مثال ثابت)
document.getElementById("nextPrayer").innerText =
    "الصلاة القادمة: المغرب 18:10";

// 📿 أذكار متغيرة
let adhkarList = [
    "سبحان الله",
    "الحمد لله",
    "لا إله إلا الله",
    "الله أكبر",
    "أستغفر الله"
];

let i = 0;
setInterval(() => {
    document.getElementById("adhkar").innerHTML = adhkarList[i];
    i = (i + 1) % adhkarList.length;
}, 4000);

</script>

</body>
</html>
