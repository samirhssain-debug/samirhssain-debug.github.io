<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مسجد النور - لوحة رقمية تفاعلية متكاملة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --primary-color: #0a4d3a;
            --secondary-color: #d4af37;
            --accent-color1: #e67e22;
            --accent-color2: #3498db;
            --accent-color3: #9b59b6;
            --text-light: #ffffff;
            --text-dark: #1a2a1f;
            --card-bg: rgba(0, 0, 0, 0.55);
            --prayer-card-bg: rgba(0, 0, 0, 0.55);
            --prayer-text-color: #ffffff;
            --prayer-border-radius: 30px;
            --prayer-card-size: 130px;
            --show-iqama: block;
            --ticker-speed: 25s;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.3s ease;
            color: var(--text-light);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            backdrop-filter: blur(8px);
            border: 1px solid var(--secondary-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.05);
        }
        .menu-btn span {
            width: 24px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .menu-btn:hover span {
            background: black;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.4));
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }

        .mosque-name {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, rgba(212,175,55,0.3), rgba(212,175,55,0.1));
            padding: 8px 20px;
            border-radius: 50px;
            border-right: 3px solid var(--secondary-color);
        }

        .datetime {
            text-align: left;
            font-family: monospace;
        }

        .live-clock {
            font-size: 1.8rem;
            font-weight: bold;
            direction: ltr;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 40px;
            overflow-y: auto;
        }

        .prayers-section {
            margin-bottom: 25px;
        }

        .prayer-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .prayer-card {
            background: var(--prayer-card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--prayer-border-radius);
            padding: 15px 25px;
            text-align: center;
            min-width: var(--prayer-card-size);
            border: 1px solid rgba(212,175,55,0.4);
            transition: all 0.2s;
            color: var(--prayer-text-color);
        }
        .prayer-card:nth-child(1) { border-top: 3px solid var(--accent-color1); }
        .prayer-card:nth-child(2) { border-top: 3px solid var(--accent-color2); }
        .prayer-card:nth-child(3) { border-top: 3px solid var(--accent-color3); }
        .prayer-card:nth-child(4) { border-top: 3px solid var(--secondary-color); }
        .prayer-card:nth-child(5) { border-top: 3px solid var(--accent-color1); }
        
        .prayer-card.active-prayer {
            background: linear-gradient(135deg, rgba(212,175,55,0.9), rgba(212,175,55,0.7));
            color: var(--text-dark);
            text-shadow: none;
            transform: scale(1.02);
            border: 2px solid #ffd700;
        }
        .prayer-name {
            font-size: 1.6rem;
            font-weight: bold;
        }
        .adhan-time {
            font-size: 2rem;
            font-family: monospace;
            font-weight: bold;
            direction: ltr;
        }
        .iqama-time {
            font-size: 1rem;
            opacity: 0.85;
            margin-top: 5px;
            display: var(--show-iqama);
        }

        .countdowns-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .countdown-box {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            border-radius: 60px;
            padding: 12px 30px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            border-right: 4px solid var(--secondary-color);
        }
        .takbeer-box {
            background: linear-gradient(135deg, rgba(139,69,19,0.9), rgba(139,69,19,0.7));
            border-radius: 60px;
            padding: 12px 30px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            border-right: 4px solid #ff6600;
        }
        .ticker-section {
            margin: 15px 0;
        }
        .ticker-container {
            background: linear-gradient(90deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            border-radius: 50px;
            padding: 12px 20px;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-text {
            display: inline-block;
            font-size: 1.4rem;
            animation: scrollText var(--ticker-speed, 25s) linear infinite;
        }
        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .dua-section {
            margin: 15px 0;
        }
        .dua-rotator {
            font-size: 1.8rem;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            padding: 20px;
            border-radius: 60px;
            text-align: center;
            transition: all 0.3s;
        }
        .time-dhikr {
            font-size: 1.4rem;
            background: linear-gradient(135deg, rgba(0,100,0,0.7), rgba(0,100,0,0.5));
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin-top: 10px;
        }

        .settings-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #1e3a2a, #0a2f1a);
            padding: 20px;
            border-radius: 25px;
            z-index: 200;
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 340px;
            max-height: 85vh;
            border: 2px solid var(--secondary-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        .settings-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .scroll-arrow {
            background: rgba(212,175,55,0.3);
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .scroll-arrow:hover {
            background: var(--secondary-color);
            color: black;
        }
        .settings-panel label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .settings-panel input, .settings-panel select {
            padding: 8px;
            border-radius: 20px;
            border: none;
        }
        .btn {
            background: linear-gradient(135deg, #2c5530, #1a3a1a);
            border: none;
            color: white;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        .btn:hover {
            background: linear-gradient(135deg, var(--secondary-color), #b8960c);
            color: black;
        }
        .city-search-input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            text-align: right;
        }
        .gps-status {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 5px;
        }
        @media (max-width: 800px) {
            .top-bar { padding: 10px 20px; }
            .prayer-card { min-width: 100px; padding: 8px 12px; }
            .prayer-name { font-size: 1.1rem; }
            .adhan-time { font-size: 1.3rem; }
            .settings-panel { width: 300px; left: 10px; right: 10px; }
            .menu-btn { top: 10px; right: 10px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
<div class="dashboard" id="dashboard">
    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="top-bar">
        <div class="mosque-name" id="mosqueName">🕌 مسجد النور</div>
        <div class="datetime">
            <div id="gregorianDate"></div>
            <div id="hijriDate" style="font-size:0.9rem;"></div>
            <div class="live-clock" id="liveClock"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="prayers-section">
            <div class="prayer-grid" id="prayerGrid"></div>
        </div>

        <div class="countdowns-section">
            <div class="countdown-box" id="nextPrayerCountdown">⏳ متبقي للصلاة: --</div>
            <div class="takbeer-box" id="takbeerCountdown" style="display:none;">📢 تكبيرات قبل الأذان: --</div>
            <div class="countdown-box" id="iqamaCountdown" style="display:none;">🕌 متبقي للإقامة: --</div>
        </div>

        <div class="ticker-section">
            <div class="ticker-container" id="tickerContainer">
                <div class="ticker-text" id="hadithTicker">قال رسول الله صلى الله عليه وسلم: إنما بعثت لأتمم مكارم الأخلاق</div>
            </div>
        </div>

        <div class="dua-section">
            <div class="dua-rotator" id="duaRotator">🤲 سبحان الله وبحمده</div>
        </div>

        <div class="time-dhikr" id="timeDhikr">🌿 أذكار الصباح: سبحان الله العظيم</div>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
        <button class="scroll-arrow" id="scrollUpBtn">↑</button>
        <h3 style="color:gold;">⚙️ الإعدادات المتقدمة</h3>
        <button class="scroll-arrow" id="scrollDownBtn">↓</button>
    </div>
    
    <label>🔍 اختار مدينتك:</label>
    <input type="text" id="citySearch" list="citiesList" placeholder="مثال: الناظور" class="city-search-input">
    <datalist id="citiesList">
        <option>الدار البيضاء</option><option>الرباط</option><option>فاس</option><option>مراكش</option>
        <option>طنجة</option><option>أكادير</option><option>وجدة</option><option>مكناس</option>
        <option>تطوان</option><option>القنيطرة</option><option>الناظور</option><option>بركان</option>
        <option>تاوريرت</option><option>جرادة</option><option>الحسيمة</option><option>زايو</option>
        <option>العروي</option><option>سلوان</option><option>بني أنصار</option><option>أزغنغان</option>
    </datalist>
    <button class="btn" id="fetchPrayersBtn">✅ جلب مواقيت هاد المدينة</button>
    <div id="gpsStatus" class="gps-status"></div>

    <label>🔊 مستوى الصوت (وهمي/تنبيهات):</label>
    <button id="volumeUpBtn" class="btn">رفع الصوت ▲</button>
    <button id="volumeDownBtn" class="btn">خفض الصوت ▼</button>
    
    <label>🕐 وضع الأوقات:</label>
    <select id="timeModeSelect">
        <option value="auto">تلقائي (API)</option>
        <option value="manual">يدوي</option>
    </select>

    <div id="manualTimesSection" style="display:none;">
        <h4>📅 أوقات يدوية</h4>
        <label>الفجر: <input type="time" id="fajrAdhan" value="05:20"></label>
        <label>إقامة الفجر: <input type="time" id="fajrIqama" value="05:40"></label>
        <label>الظهر: <input type="time" id="dhuhrAdhan" value="13:00"></label>
        <label>إقامة الظهر: <input type="time" id="dhuhrIqama" value="13:15"></label>
        <label>العصر: <input type="time" id="asrAdhan" value="16:30"></label>
        <label>إقامة العصر: <input type="time" id="asrIqama" value="16:45"></label>
        <label>المغرب: <input type="time" id="maghribAdhan" value="18:45"></label>
        <label>إقامة المغرب: <input type="time" id="maghribIqama" value="19:00"></label>
        <label>العشاء: <input type="time" id="ishaAdhan" value="20:15"></label>
        <label>إقامة العشاء: <input type="time" id="ishaIqama" value="20:30"></label>
        <button id="saveManualTimesBtn" class="btn">💾 حفظ الأوقات</button>
    </div>

    <h4 style="color:gold;">🎨 تخصيص البطاقات</h4>
    <label>🎨 لون خلفية البطاقات:</label>
    <input type="color" id="prayerCardBg" value="#0000008C">
    <label>✏️ لون النص:</label>
    <input type="color" id="prayerTextColor" value="#ffffff">
    <label>🔘 شكل الحواف:</label>
    <select id="prayerBorderRadius">
        <option value="15px">مربعة</option>
        <option value="30px" selected>دائرية</option>
        <option value="50px">مستديرة جداً</option>
    </select>
    <label>📏 حجم البطاقات:</label>
    <select id="prayerCardSize">
        <option value="100px">صغير</option>
        <option value="130px" selected>متوسط</option>
        <option value="160px">كبير</option>
    </select>
    <label>📢 إظهار إقامة الصلاة:</label>
    <select id="showIqamaToggle">
        <option value="block">نعم</option>
        <option value="none">لا</option>
    </select>

    <label>🎨 اللون الرئيسي:</label>
    <input type="color" id="themeColor" value="#0a4d3a">

    <label>🖼️ خلفية (لون):</label>
    <input type="color" id="bgColorPicker" value="#0a2f2a">
    <label>🖼️ خلفية (صورة من جهازك):</label>
    <input type="file" id="bgImageUpload" accept="image/*">

    <label>📜 سرعة الشريط (ثانية):</label>
    <input type="range" id="tickerSpeed" min="10" max="50" value="25">

    <label>🔄 سرعة الأدعية (ثانية):</label>
    <input type="range" id="duaSpeed" min="1" max="5" step="0.5" value="2">

    <label>📿 مدة أذكار ما بعد الصلاة (دقائق):</label>
    <input type="number" id="dhikrMinutes" value="2" min="1" max="30">

    <label>🔔 تفعيل الإعلانات الصوتية:</label>
    <select id="announcementsToggle">
        <option value="all">الكل مفعل</option>
        <option value="azan_only">الأذان فقط</option>
        <option value="prayer_only">الإقامة فقط</option>
    </select>

    <label>🌞 وضع النهار:</label>
    <button id="dayModeBtn" class="btn">☀️ تفعيل وضع النهار</button>
    <label>🌙 وضع الليل:</label>
    <button id="nightModeBtn" class="btn">🌙 تفعيل وضع الليل</button>

    <button id="closeSettings" class="btn">❌ إغلاق الإعدادات</button>
</div>

<script>
    // قاعدة بيانات مدن المغرب
    const MOROCCO_CITIES = {
        "الناظور": { lat: 35.1686, lon: -2.9285 }, "الدار البيضاء": { lat: 33.5731, lon: -7.5898 },
        "الرباط": { lat: 34.0209, lon: -6.8416 }, "فاس": { lat: 34.0181, lon: -5.0078 },
        "مراكش": { lat: 31.6295, lon: -7.9811 }, "طنجة": { lat: 35.7595, lon: -5.8340 },
        "أكادير": { lat: 30.4278, lon: -9.5981 }, "وجدة": { lat: 34.6814, lon: -1.9086 },
        "تطوان": { lat: 35.5785, lon: -5.3684 }, "بركان": { lat: 34.9191, lon: -2.3217 }
    };

    let prayerTimes = {
        الفجر: { adhan: "05:20", iqama: "05:40" },
        الظهر: { adhan: "13:00", iqama: "13:15" },
        العصر: { adhan: "16:30", iqama: "16:45" },
        المغرب: { adhan: "18:45", iqama: "19:00" },
        العشاء: { adhan: "20:15", iqama: "20:30" }
    };
    
    let soundEnabled = true;
    let volumeLevel = 70;
    let isAutoMode = true;
    let currentCityName = "";
    let announcedAdhan = {};   // تتبع الأذان المُعلن لكل صلاة
    let announcedIqama = {};   // تتبع الإقامة المُعلنة
    let lastAnnouncementDate = "";
    let postPrayerDhikrActive = false;
    let dhikrTimer = null;

    const hadithList = [
        "قال رسول الله ﷺ: من صلى عليَّ مرة صلى الله عليه بها عشراً",
        "قال النبي ﷺ: الدعاء هو العبادة",
        "خيركم من تعلم القرآن وعلمه",
        "لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه",
        "إنما الأعمال بالنيات",
        "المؤمن للمؤمن كالبنيان يشد بعضه بعضاً"
    ];
    const duaList = [
        "🤲 ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة",
        "🤲 سبحان الله والحمد لله ولا إله إلا الله والله أكبر",
        "🤲 اللهم اغفر لي وارحمني واهدني",
        "🤲 حسبي الله لا إله إلا هو عليه توكلت",
        "🤲 اللهم صل على محمد وعلى آل محمد",
        "🤲 اللهم إني أسألك العفو والعافية"
    ];
    
    let hadithIndex = 0, duaIndex = 0;
    let duaInterval;

    // النطق باستخدام SpeechSynthesis
    function speakText(text) {
        if (!soundEnabled) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ar-SA';
        utterance.rate = 0.9;
        utterance.volume = volumeLevel / 100;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    function checkAndAnnounce() {
        const now = new Date();
        const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const announceMode = document.getElementById('announcementsToggle').value;
        
        for (let [name, times] of Object.entries(prayerTimes)) {
            // الأذان
            if (currentTime === times.adhan && !announcedAdhan[name]) {
                if (announceMode === 'all' || announceMode === 'azan_only') {
                    let msg = `أذان ${name}`;
                    if (name === 'الفجر') msg += "، الصلاة خير من النوم";
                    speakText(msg);
                    announcedAdhan[name] = true;
                    // إعادة ضبط إعلان الإقامة للصلاة الحالية
                    announcedIqama[name] = false;
                }
            }
            // الإقامة
            if (currentTime === times.iqama && !announcedIqama[name]) {
                if (announceMode === 'all' || announceMode === 'prayer_only') {
                    speakText(`قد قامت الصلاة ${name}`);
                    announcedIqama[name] = true;
                    // تفعيل أذكار ما بعد الصلاة
                    startPostPrayerDhikr();
                }
            }
            // إعادة تعيين حالة الأذان عند تجاوز وقت الإقامة
            const iqamaTime = times.iqama;
            if (currentTime > iqamaTime && announcedAdhan[name]) {
                announcedAdhan[name] = false;
            }
        }
    }

    function startPostPrayerDhikr() {
        const dhikrMins = parseInt(document.getElementById('dhikrMinutes').value) || 2;
        if (postPrayerDhikrActive) return;
        postPrayerDhikrActive = true;
        const dhikrMsg = "📿 أذكار ما بعد الصلاة: سبحان الله 33 مرة، الحمد لله 33 مرة، الله أكبر 34 مرة";
        document.getElementById('timeDhikr').innerHTML = dhikrMsg;
        if (dhikrTimer) clearTimeout(dhikrTimer);
        dhikrTimer = setTimeout(() => {
            postPrayerDhikrActive = false;
            updateTimeDhikrByHour();
        }, dhikrMins * 60 * 1000);
    }

    function updateTimeDhikrByHour() {
        const hour = new Date().getHours();
        const el = document.getElementById('timeDhikr');
        if (hour >= 6 && hour < 12) el.innerHTML = "🌅 أذكار الصباح: سبحان الله وبحمده عدد خلقه";
        else if (hour >= 18 || hour < 5) el.innerHTML = "🌙 أذكار المساء: أعوذ بكلمات الله التامات من شر ما خلق";
        else el.innerHTML = "🕌 سبحان الله والحمد لله";
    }

    async function getPrayersByCityName() {
        const cityName = document.getElementById('citySearch').value.trim();
        const statusDiv = document.getElementById('gpsStatus');
        if (!cityName) { statusDiv.innerHTML = '⚠️ أدخل اسم المدينة'; return; }
        statusDiv.innerHTML = `⏳ جاري جلب مواقيت ${cityName}...`;
        if (MOROCCO_CITIES[cityName]) {
            const coords = MOROCCO_CITIES[cityName];
            try {
                const response = await fetch(`https://api.aladhan.com/v1/timings?latitude=${coords.lat}&longitude=${coords.lon}&method=2`);
                const data = await response.json();
                if (data.code === 200) {
                    applyTimings(data.data.timings, cityName);
                    statusDiv.innerHTML = `✅ تم جلب مواقيت ${cityName}`;
                    setTimeout(() => statusDiv.innerHTML = '', 3000);
                    return;
                }
            } catch(e) { console.log(e); }
        }
        try {
            const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(cityName)}&country=Morocco&method=2`);
            const data = await response.json();
            if (data.code === 200) {
                applyTimings(data.data.timings, cityName);
                statusDiv.innerHTML = `✅ تم جلب مواقيت ${cityName}`;
            } else { statusDiv.innerHTML = `❌ المدينة غير موجودة`; }
        } catch(err) { statusDiv.innerHTML = '❌ خطأ في الاتصال'; }
    }

    function applyTimings(timings, cityName) {
        const prayersMap = { Fajr: 'الفجر', Dhuhr: 'الظهر', Asr: 'العصر', Maghrib: 'المغرب', Isha: 'العشاء' };
        for (let [en, ar] of Object.entries(prayersMap)) {
            if (timings[en]) {
                let adhan = timings[en].substring(0,5);
                let [hour, minute] = adhan.split(':').map(Number);
                let iqamaHour = hour, iqamaMinute = minute + 15;
                if (iqamaMinute >= 60) { iqamaHour += 1; iqamaMinute -= 60; }
                if (iqamaHour >= 24) iqamaHour -= 24;
                let iqama = `${iqamaHour.toString().padStart(2,'0')}:${iqamaMinute.toString().padStart(2,'0')}`;
                prayerTimes[ar] = { adhan, iqama };
            }
        }
        renderPrayerTimes();
        document.getElementById('mosqueName').innerHTML = `🕌 مسجد ${cityName}`;
        currentCityName = cityName;
        localStorage.setItem('selectedCityName', cityName);
        isAutoMode = true;
        document.getElementById('timeModeSelect').value = 'auto';
        document.getElementById('manualTimesSection').style.display = 'none';
        // إعادة ضبط الإعلانات
        announcedAdhan = {};
        announcedIqama = {};
    }

    function renderPrayerTimes() {
        const grid = document.getElementById('prayerGrid');
        if (!grid) return;
        grid.innerHTML = "";
        const now = new Date();
        const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        for (let [name, times] of Object.entries(prayerTimes)) {
            const card = document.createElement('div');
            card.className = 'prayer-card';
            if (currentTime >= times.adhan && currentTime < times.iqama) card.classList.add('active-prayer');
            card.innerHTML = `<div class="prayer-name">${name}</div><div class="adhan-time">${times.adhan}</div><div class="iqama-time">إقامة ${times.iqama}</div>`;
            grid.appendChild(card);
        }
    }

    function getNextPrayerInfo() {
        const now = new Date();
        let next = null, nextName = "", nextIqama = null;
        for (let [name, times] of Object.entries(prayerTimes)) {
            const [hAdhan, mAdhan] = times.adhan.split(':').map(Number);
            const [hIqama, mIqama] = times.iqama.split(':').map(Number);
            let adhanDate = new Date(); adhanDate.setHours(hAdhan, mAdhan, 0, 0);
            let iqamaDate = new Date(); iqamaDate.setHours(hIqama, mIqama, 0, 0);
            if (adhanDate > now) { if (!next || adhanDate < next) { next = adhanDate; nextName = name; nextIqama = iqamaDate; } }
        }
        if (!next) {
            const first = Object.entries(prayerTimes)[0];
            const [h,m] = first[1].adhan.split(':').map(Number);
            next = new Date(); next.setDate(next.getDate()+1); next.setHours(h,m,0,0);
            nextName = first[0];
            const [hi, mi] = first[1].iqama.split(':').map(Number);
            nextIqama = new Date(next); nextIqama.setHours(hi, mi, 0, 0);
        }
        return { next, nextName, nextIqama };
    }

    function updateCountdowns() {
        const now = new Date();
        const { next, nextName, nextIqama } = getNextPrayerInfo();
        const diffAdhan = Math.floor((next - now) / 1000);
        const takbeerBox = document.getElementById('takbeerCountdown');
        const iqamaBox = document.getElementById('iqamaCountdown');
        
        if (diffAdhan <= 0) document.getElementById('nextPrayerCountdown').innerHTML = `🔔 وقت صلاة ${nextName} الآن 🔔`;
        else {
            const mins = Math.floor(diffAdhan / 60);
            const secs = diffAdhan % 60;
            document.getElementById('nextPrayerCountdown').innerHTML = `⏳ متبقي لصلاة ${nextName}: ${mins} دقيقة ${secs} ثانية`;
        }
        
        // تكبيرات قبل الأذان بـ 5 دقائق
        if (diffAdhan <= 300 && diffAdhan > 0) {
            takbeerBox.style.display = "flex";
            const takbeerRem = diffAdhan;
            const minsT = Math.floor(takbeerRem / 60);
            const secsT = takbeerRem % 60;
            takbeerBox.innerHTML = `📢 تكبيرات قبل الأذان: ${minsT}:${secsT.toString().padStart(2,'0')}`;
        } else takbeerBox.style.display = "none";
        
        // الإقامة: إذا الوقت الحالي بين الأذان والإقامة
        let iqamaRemaining = 0;
        let showIqama = false;
        for (let [name, times] of Object.entries(prayerTimes)) {
            const [ah, am] = times.adhan.split(':').map(Number);
            const [ih, im] = times.iqama.split(':').map(Number);
            const adhanTime = new Date(); adhanTime.setHours(ah, am, 0, 0);
            const iqamaTime = new Date(); iqamaTime.setHours(ih, im, 0, 0);
            if (now >= adhanTime && now < iqamaTime) {
                iqamaRemaining = Math.floor((iqamaTime - now) / 1000);
                showIqama = true;
                break;
            }
        }
        if (showIqama && iqamaRemaining > 0) {
            iqamaBox.style.display = "flex";
            const minsI = Math.floor(iqamaRemaining / 60);
            const secsI = iqamaRemaining % 60;
            iqamaBox.innerHTML = `🕌 متبقي للإقامة: ${minsI} دقيقة ${secsI} ثانية`;
        } else iqamaBox.style.display = "none";
    }

    function updateDateTime() {
        const now = new Date();
        const day = now.getDate();
        const month = now.toLocaleString('ar', { month: 'long' });
        const year = now.getFullYear();
        document.getElementById('gregorianDate').innerHTML = `📅 ${day} ${month} ${year}`;
        const hours = now.getHours().toString().padStart(2,'0');
        const minutes = now.getMinutes().toString().padStart(2,'0');
        const seconds = now.getSeconds().toString().padStart(2,'0');
        document.getElementById('liveClock').innerHTML = `${hours}:${minutes}:${seconds}`;
        try {
            const hijri = new Intl.DateTimeFormat('ar-TN-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(now);
            document.getElementById('hijriDate').innerHTML = `📖 ${hijri} هـ`;
        } catch(e) {}
        updateTimeDhikrByHour();
    }

    function adjustVolume(delta) {
        volumeLevel = Math.min(100, Math.max(0, volumeLevel + delta));
        alert(`🔊 مستوى الصوت: ${volumeLevel}%`);
    }

    function applyPrayerCardStyle() {
        document.documentElement.style.setProperty('--prayer-card-bg', document.getElementById('prayerCardBg').value);
        document.documentElement.style.setProperty('--prayer-text-color', document.getElementById('prayerTextColor').value);
        document.documentElement.style.setProperty('--prayer-border-radius', document.getElementById('prayerBorderRadius').value);
        document.documentElement.style.setProperty('--prayer-card-size', document.getElementById('prayerCardSize').value);
        document.documentElement.style.setProperty('--show-iqama', document.getElementById('showIqamaToggle').value);
        renderPrayerTimes();
    }

    function applyTheme() {
        document.documentElement.style.setProperty('--primary-color', document.getElementById('themeColor').value);
    }

    function applyBackground() {
        const color = document.getElementById('bgColorPicker').value;
        const file = document.getElementById('bgImageUpload').files[0];
        const dashboard = document.getElementById('dashboard');
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { dashboard.style.backgroundImage = `url('${e.target.result}')`; dashboard.style.backgroundColor = color; };
            reader.readAsDataURL(file);
        } else { dashboard.style.backgroundImage = 'none'; dashboard.style.backgroundColor = color; }
    }

    function setDayMode() { 
        const d = document.getElementById('dashboard');
        d.style.backgroundImage = "linear-gradient(135deg, #fdf5e6, #f0e6d0)";
        d.style.backgroundColor = "#fdf5e6";
        d.style.color = "#2c3e2b";
        d.style.textShadow = "none";
        localStorage.setItem('themeMode', 'day');
    }
    function setNightMode() { 
        const d = document.getElementById('dashboard');
        d.style.backgroundImage = "";
        d.style.backgroundColor = "#0a2f2a";
        d.style.color = "white";
        d.style.textShadow = "2px 2px 8px rgba(0,0,0,0.7)";
        localStorage.setItem('themeMode', 'night');
    }

    function updateTickerSpeed() {
        const speed = document.getElementById('tickerSpeed').value;
        document.documentElement.style.setProperty('--ticker-speed', `${speed}s`);
        localStorage.setItem('tickerSpeed', speed);
    }
    function updateDuaSpeed() {
        const speed = parseFloat(document.getElementById('duaSpeed').value);
        if (duaInterval) clearInterval(duaInterval);
        duaInterval = setInterval(() => {
            duaIndex = (duaIndex + 1) % duaList.length;
            document.getElementById('duaRotator').innerHTML = duaList[duaIndex];
        }, speed * 1000);
    }
    function toggleTimeMode() {
        const mode = document.getElementById('timeModeSelect').value;
        isAutoMode = mode === 'auto';
        document.getElementById('manualTimesSection').style.display = isAutoMode ? 'none' : 'block';
        if (!isAutoMode) {
            const saved = localStorage.getItem('manualPrayerTimes');
            if (saved) {
                const t = JSON.parse(saved);
                if(t.fajrAdhan) document.getElementById('fajrAdhan').value = t.fajrAdhan;
                if(t.fajrIqama) document.getElementById('fajrIqama').value = t.fajrIqama;
                if(t.dhuhrAdhan) document.getElementById('dhuhrAdhan').value = t.dhuhrAdhan;
                if(t.dhuhrIqama) document.getElementById('dhuhrIqama').value = t.dhuhrIqama;
                if(t.asrAdhan) document.getElementById('asrAdhan').value = t.asrAdhan;
                if(t.asrIqama) document.getElementById('asrIqama').value = t.asrIqama;
                if(t.maghribAdhan) document.getElementById('maghribAdhan').value = t.maghribAdhan;
                if(t.maghribIqama) document.getElementById('maghribIqama').value = t.maghribIqama;
                if(t.ishaAdhan) document.getElementById('ishaAdhan').value = t.ishaAdhan;
                if(t.ishaIqama) document.getElementById('ishaIqama').value = t.ishaIqama;
            }
        }
    }
    function saveManualTimes() {
        prayerTimes = {
            الفجر: { adhan: document.getElementById('fajrAdhan').value, iqama: document.getElementById('fajrIqama').value },
            الظهر: { adhan: document.getElementById('dhuhrAdhan').value, iqama: document.getElementById('dhuhrIqama').value },
            العصر: { adhan: document.getElementById('asrAdhan').value, iqama: document.getElementById('asrIqama').value },
            المغرب: { adhan: document.getElementById('maghribAdhan').value, iqama: document.getElementById('maghribIqama').value },
            العشاء: { adhan: document.getElementById('ishaAdhan').value, iqama: document.getElementById('ishaIqama').value }
        };
        localStorage.setItem('manualPrayerTimes', JSON.stringify(prayerTimes));
        renderPrayerTimes();
        alert("✅ تم حفظ الأوقات اليدوية");
        announcedAdhan = {}; announcedIqama = {};
    }

    function initEventListeners() {
        document.getElementById('menuBtn').onclick = () => document.getElementById('settingsPanel').style.display = 'flex';
        document.getElementById('closeSettings').onclick = () => document.getElementById('settingsPanel').style.display = 'none';
        document.getElementById('fetchPrayersBtn').onclick = getPrayersByCityName;
        document.getElementById('volumeUpBtn').onclick = () => adjustVolume(10);
        document.getElementById('volumeDownBtn').onclick = () => adjustVolume(-10);
        document.getElementById('dayModeBtn').onclick = setDayMode;
        document.getElementById('nightModeBtn').onclick = setNightMode;
        document.getElementById('themeColor').onchange = applyTheme;
        document.getElementById('bgColorPicker').onchange = applyBackground;
        document.getElementById('bgImageUpload').onchange = applyBackground;
        document.getElementById('tickerSpeed').onchange = updateTickerSpeed;
        document.getElementById('duaSpeed').onchange = updateDuaSpeed;
        document.getElementById('timeModeSelect').onchange = toggleTimeMode;
        document.getElementById('saveManualTimesBtn').onclick = saveManualTimes;
        document.getElementById('scrollUpBtn').onclick = () => document.getElementById('settingsPanel').scrollBy({ top: -150, behavior: 'smooth' });
        document.getElementById('scrollDownBtn').onclick = () => document.getElementById('settingsPanel').scrollBy({ top: 150, behavior: 'smooth' });
        document.getElementById('prayerCardBg').onchange = applyPrayerCardStyle;
        document.getElementById('prayerTextColor').onchange = applyPrayerCardStyle;
        document.getElementById('prayerBorderRadius').onchange = applyPrayerCardStyle;
        document.getElementById('prayerCardSize').onchange = applyPrayerCardStyle;
        document.getElementById('showIqamaToggle').onchange = applyPrayerCardStyle;
        document.getElementById('citySearch').addEventListener('keypress', (e) => { if(e.key === 'Enter') getPrayersByCityName(); });
    }

    function loadSavedCity() {
        const savedCity = localStorage.getItem('selectedCityName');
        if(savedCity) { document.getElementById('citySearch').value = savedCity; setTimeout(getPrayersByCityName, 500); }
        const theme = localStorage.getItem('themeMode');
        if(theme === 'day') setDayMode(); else if(theme === 'night') setNightMode();
        const speed = localStorage.getItem('tickerSpeed');
        if(speed) { document.getElementById('tickerSpeed').value = speed; document.documentElement.style.setProperty('--ticker-speed', `${speed}s`); }
        const manualTimes = localStorage.getItem('manualPrayerTimes');
        if(manualTimes) { 
            let mt = JSON.parse(manualTimes);
            if(mt.fajrAdhan) prayerTimes = mt;
            renderPrayerTimes();
        }
    }

    // تشغيل
    initEventListeners();
    loadSavedCity();
    setInterval(() => { updateDateTime(); updateCountdowns(); renderPrayerTimes(); checkAndAnnounce(); }, 1000);
    setInterval(() => { hadithIndex = (hadithIndex+1)%hadithList.length; document.getElementById('hadithTicker').innerHTML = hadithList[hadithIndex]; }, 8000);
    updateDuaSpeed();
    applyTheme();
    updateTickerSpeed();
    renderPrayerTimes();
    updateDateTime();
</script>
</body>
</html>
