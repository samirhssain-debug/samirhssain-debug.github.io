<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>لوحة المسجد الذكية · النسخة النقية النهائية</title>
    <!-- أيقونات وخطوط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #D4AF37;
            --primary-glow: rgba(212, 175, 55, 0.5);
            --bg-color: #0A1929;
            --text: #F5F9FF;
            --font-main: 'Cairo', sans-serif;
            --font-arabic: 'Amiri', serif;
            --transition: all 0.3s ease;
        }
        body {
            font-family: var(--font-main);
            background: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            padding: 2vh 2vw;
            margin: 0;
            transition: background 0.5s;
            cursor: default;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            font-size: 1.8vh;
        }
        /* طبقة الشفافية فوق الخلفية فقط */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }
        body.idle-cursor {
            cursor: none;
        }
        /* الحاوية الرئيسية شفافة بالكامل بدون أي تأثير زجاجي */
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            background: transparent;
            border-radius: 6vh;
            padding: 3vh 3vw;
            box-shadow: none;
            border: none;
        }
        /* --- عداد الصلاة في الأعلى --- */
        .countdown-header {
            text-align: center;
            margin-bottom: 3vh;
        }
        .next-prayer-label {
            font-size: 3vh;
            color: var(--primary);
            margin-bottom: 1vh;
            text-shadow: 0 0 20px black, 0 0 10px black;
        }
        .next-prayer-time {
            font-size: 12vh;
            font-weight: 900;
            font-family: monospace;
            direction: ltr;
            letter-spacing: 8px;
            text-shadow: 0 0 30px black, 0 0 20px var(--primary-glow);
            line-height: 1.2;
        }
        /* --- شريط التاريخ واسم المسجد --- */
        .datetime-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: transparent;
            border-radius: 8vh;
            padding: 1.5vh 2.5vw;
            margin: 2vh 0;
            border: none;
        }
        .mosque-title {
            font-size: 4vh;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF2CD, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px black;
        }
        .date-text {
            font-size: 3vh;
            font-weight: 600;
            direction: rtl;
            unicode-bidi: plaintext;
            text-shadow: 0 0 15px black;
        }
        .hijri-text {
            font-size: 2.2vh;
            opacity: 0.9;
            direction: rtl;
            unicode-bidi: plaintext;
            text-shadow: 0 0 15px black;
        }
        .live-clock {
            font-size: 8vh;
            font-weight: 700;
            font-family: monospace;
            direction: ltr;
            color: var(--primary);
            text-shadow: 0 0 25px black, 0 0 15px var(--primary-glow);
        }
        /* شبكة الصلوات - شفافة بالكامل بدون أي إطار */
        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5vw;
            margin: 3vh 0;
        }
        .prayer-card {
            background: transparent;
            backdrop-filter: none;
            border-radius: 3vh;
            padding: 2vh 1vw;
            text-align: center;
            border: none;
            transition: var(--transition);
            box-shadow: none;
            cursor: pointer;
        }
        .prayer-card.next {
            background: transparent;
            border: none;
            box-shadow: 0 0 5vh var(--primary-glow);
            transform: scale(1.05);
        }
        .prayer-name {
            font-size: 2.8vh;
            font-weight: 700;
            margin-bottom: 1vh;
            color: var(--primary);
            text-shadow: 0 0 20px black, 0 0 10px black;
        }
        .prayer-time {
            font-size: 4vh;
            font-weight: 800;
            font-family: monospace;
            direction: ltr;
            text-shadow: 0 0 15px black;
        }
        .iqama {
            font-size: 2vh;
            opacity: 0.95;
            margin-top: 1vh;
            direction: ltr;
            text-shadow: 0 0 15px black;
        }
        /* الآية والحديث - شفافة بالكامل */
        .verse-section {
            background: transparent;
            backdrop-filter: none;
            border-radius: 6vh;
            padding: 2vh 3vw;
            margin: 3vh 0;
            border-right: 0.5vh solid var(--primary);
            border: none;
            font-size: 3vh;
            font-family: var(--font-arabic);
            text-align: center;
            text-shadow: 0 0 20px black;
        }
        .hadith-ticker-wrapper {
            background: transparent;
            backdrop-filter: none;
            border-radius: 8vh;
            padding: 1.5vh 2vw;
            border: none;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 30s linear infinite;
            font-size: 2.2vh;
            text-shadow: 0 0 15px black;
        }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        /* النوافذ والأزرار (لم تتغير للحفاظ على وضوح الإعدادات) */
        .iqama-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0f2838;
            border: 3px solid var(--primary);
            border-radius: 5vh;
            padding: 4vh 5vw;
            z-index: 2500;
            display: none;
            flex-direction: column;
            gap: 2vh;
            backdrop-filter: blur(20px);
            min-width: 300px;
            text-align: center;
            box-shadow: 0 0 5vh black;
        }
        .iqama-modal.active {
            display: flex;
        }
        .modal-buttons {
            display: flex;
            gap: 2vw;
            justify-content: center;
        }
        .modal-buttons button {
            font-size: 3vh;
            padding: 1vh 3vw;
        }
        .overlay-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #030b12;
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(30px);
            color: var(--primary);
            font-family: var(--font-main);
        }
        .overlay-full.active {
            display: flex;
        }
        .countdown-circle-large {
            width: 50vh;
            height: 50vh;
            border-radius: 50%;
            border: 2vh solid #2ecc71;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5vh;
            box-shadow: 0 0 10vh #2ecc71;
            background: rgba(0,0,0,0.3);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .countdown-circle-large.red {
            border-color: #e74c3c;
            box-shadow: 0 0 12vh #e74c3c;
        }
        .countdown-number-large {
            font-size: 20vh;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 5vh currentColor;
        }
        .adhan-phrase {
            font-size: 6vh;
            margin: 3vh;
            font-weight: 700;
            text-shadow: 0 0 5vh gold;
            animation: fadeInOut 3s infinite;
            text-align: center;
        }
        .prayer-active-text {
            font-size: 8vh;
            font-weight: 900;
            animation: pulseGlow 2s infinite;
        }
        .azkar-overlay-text {
            font-size: 3.5vh;
            max-width: 90%;
            text-align: center;
            line-height: 1.8;
            background: rgba(0,0,0,0.5);
            padding: 5vh 6vw;
            border-radius: 10vh;
            backdrop-filter: blur(10px);
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 80vh;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.9; text-shadow: 0 0 3vh var(--primary); }
            50% { opacity: 1; text-shadow: 0 0 8vh var(--primary); }
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        /* أزرار الزاوية */
        .corner-buttons {
            position: fixed;
            bottom: 4vh;
            left: 3vw;
            display: flex;
            gap: 2vh;
            z-index: 1500;
        }
        .settings-fab, .fullscreen-fab, .opacity-fab {
            width: 8vh;
            height: 8vh;
            border-radius: 4vh;
            background: rgba(30, 58, 95, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4vh;
            cursor: pointer;
            box-shadow: 0 1vh 3vh black;
            border: 0.3vh solid var(--primary);
            opacity: 0.5;
            transition: 0.3s;
            color: var(--primary);
        }
        .fullscreen-fab {
            left: auto;
            right: 3vw;
        }
        .opacity-fab {
            left: auto;
            right: 13vw;
        }
        .settings-fab:hover, .fullscreen-fab:hover, .opacity-fab:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        /* درج الإعدادات */
        .settings-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 600px;
            height: 100%;
            background: rgba(10, 25, 40, 0.95);
            z-index: 3000;
            transform: translateX(100%);
            transition: 0.4s;
            overflow-y: auto;
            padding: 3vh 2.5vw;
            border-left: 0.6vh solid var(--primary);
            backdrop-filter: blur(20px);
        }
        .settings-drawer.open {
            transform: translateX(0);
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3vh;
        }
        .drawer-header h2 {
            color: var(--primary);
            font-size: 3vh;
        }
        .close-drawer {
            font-size: 5vh;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
        }
        .setting-block {
            background: #0f2838;
            border-radius: 3vh;
            padding: 2vh 2vw;
            margin-bottom: 2.5vh;
            border: 1px solid #2c4c64;
        }
        .setting-block label {
            display: block;
            margin-bottom: 1vh;
            font-weight: 600;
            color: #ccc;
            font-size: 2vh;
        }
        input, select, textarea, button {
            width: 100%;
            padding: 1.5vh 2vw;
            margin: 0.8vh 0;
            border-radius: 5vh;
            background: #0a1922;
            color: white;
            border: 1px solid #2c4c64;
            font-family: inherit;
            font-size: 2vh;
        }
        button {
            background: var(--primary);
            color: #0A1929;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background: #e6c458;
        }
        .toast-message {
            position: fixed;
            bottom: 15vh;
            right: 3vw;
            background: #2c5f2d;
            color: #ffecb3;
            padding: 1.5vh 3vw;
            border-radius: 8vh;
            z-index: 4000;
            font-size: 2vh;
            animation: fadeOutToast 3s forwards;
        }
        @keyframes fadeOutToast {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        /* تجاوب */
        @media (max-width: 800px) {
            .prayer-grid { grid-template-columns: repeat(3, 1fr); }
            .mosque-title { font-size: 3vh; }
        }
        @media (max-width: 500px) {
            .prayer-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body id="appBody" class="idle-cursor">
<div class="dashboard">
    <div class="countdown-header">
        <div class="next-prayer-label" id="nextPrayerLabel">متبقي لصلاة الفجر</div>
        <div class="next-prayer-time" id="nextPrayerCountdown">--:--:--</div>
    </div>
    <div class="datetime-bar">
        <div class="mosque-title" id="mosqueNameDisplay">🕌 مسجد الفرقان</div>
        <div>
            <div class="date-text" id="gregorianDate"></div>
            <div class="hijri-text" id="hijriDate"></div>
        </div>
        <div class="live-clock" id="liveClock">--:--:--</div>
    </div>
    <div class="prayer-grid" id="prayerGrid"></div>
    <div class="verse-section" id="verseBox">﴿ إِنَّ الصَّلَاةَ تَنْهَىٰ عَنِ الْفَحْشَاءِ وَالْمُنكَرِ ﴾</div>
    <div class="hadith-ticker-wrapper">
        <div class="ticker-content" id="hadithTicker">قال رسول الله ﷺ: "العهد الذي بيننا وبينهم الصلاة فمن تركها فقد كفر"</div>
    </div>
</div>
<!-- نافذة تعديل الإقامة -->
<div class="iqama-modal" id="iqamaModal">
    <h2 id="modalPrayerName">تعديل إقامة الفجر</h2>
    <div>الإقامة الحالية: <span id="currentIqamaValue">15</span> دقيقة</div>
    <div class="modal-buttons">
        <button id="modalIncrease">+1 دقيقة</button>
        <button id="modalDecrease">-1 دقيقة</button>
    </div>
    <button id="modalClose">إغلاق</button>
</div>
<!-- شاشة التغطية -->
<div class="overlay-full" id="fullOverlay">
    <div id="countdownCircleOverlay" class="countdown-circle-large" style="display: none;">
        <div class="countdown-number-large" id="countdownNumLarge">60</div>
    </div>
    <div id="adhanPhraseOverlay" class="adhan-phrase" style="display: none;"></div>
    <div id="prayerActiveOverlay" class="prayer-active-text" style="display: none;">الصلاة قائمة</div>
    <div id="azkarOverlay" class="azkar-overlay-text" style="display: none;"></div>
</div>
<!-- أزرار الزاوية -->
<div class="corner-buttons">
    <div class="settings-fab" id="settingsFab">⚙️</div>
    <div class="opacity-fab" id="opacityFab" title="ضبط شفافية الخلفية">🌓</div>
    <div class="fullscreen-fab" id="fullscreenFab" title="ملء الشاشة"><i class="fas fa-expand"></i></div>
</div>
<!-- درج الإعدادات -->
<div class="settings-drawer" id="settingsDrawer">
    <div class="drawer-header">
        <h2>⚙️ لوحة التحكم</h2>
        <button class="close-drawer" id="closeDrawerBtn">&times;</button>
    </div>
    <div class="setting-block">
        <label>🔐 كلمة المرور (افتراضي 0000)</label>
        <input type="password" id="passInput" placeholder="****">
        <button id="unlockBtn">فتح الإعدادات</button>
        <span id="lockStatus">🔒 مقفل</span>
    </div>
    <div id="settingsContent" style="display: none;">
        <div class="setting-block"><label>🕌 اسم المسجد</label><input type="text" id="mosqueNameInput"><button id="saveMosqueName">تحديث</button></div>
        <div class="setting-block">
            <label>🌍 جلب الأوقات (اختر المدينة المغربية)</label>
            <select id="citySelect">
                <option value="Casablanca">الدار البيضاء</option><option value="Rabat">الرباط</option><option value="Fes">فاس</option>
                <option value="Marrakech">مراكش</option><option value="Tangier">طنجة</option><option value="Agadir">أكادير</option>
                <option value="Meknes">مكناس</option><option value="Oujda">وجدة</option><option value="Kenitra">القنيطرة</option>
                <option value="Tetouan">تطوان</option><option value="Safi">آسفي</option><option value="Mohammedia">المحمدية</option>
                <option value="Khouribga">خريبكة</option><option value="Beni Mellal">بني ملال</option><option value="El Jadida">الجديدة</option>
                <option value="Nador" selected>الناظور</option><option value="Taza">تازة</option><option value="Settat">سطات</option>
                <option value="Larache">العرائش</option><option value="Khemisset">الخميسات</option><option value="Guelmim">كلميم</option>
                <option value="Berkane">بركان</option><option value="Taourirt">تاوريرت</option><option value="Khenifra">خنيفرة</option>
                <option value="Sidi Slimane">سيدي سليمان</option><option value="Taroudant">تارودانت</option>
                <option value="Essaouira">الصويرة</option><option value="Ouarzazate">ورزازات</option>
                <option value="Laayoune">العيون</option><option value="Dakhla">الداخلة</option>
            </select>
            <button id="fetchApiBtn">🌐 تحديث الأوقات من API (طريقة المغرب 21)</button>
        </div>
        <div class="setting-block">
            <label>🕌 أوضاع خاصة</label>
            <button id="toggleRamadanBtn">🌙 رمضان</button> <button id="toggleSummerBtn">☀️ الصيف</button>
            <button id="addHourAllBtn">➕ إضافة ساعة</button> <button id="subHourAllBtn">➖ إزالة ساعة</button>
            <span id="ramadanStatus"></span> <span id="summerStatus"></span>
        </div>
        <div class="setting-block"><label>⏱️ الإقامة (دقائق)</label><div id="iqamaPerPrayer"></div><button id="applyIqamaPerPrayer">تطبيق</button></div>
        <div class="setting-block"><label>📖 تعديل يدوي (دقائق)</label><div id="manualEditor"></div><button id="saveManual">حفظ</button></div>
        <div class="setting-block"><label>🎨 ثيمات حسب الصلاة</label><div id="themePerPrayer"></div></div>
        <div class="setting-block"><label>🖼️ خلفيات حسب الصلاة</label><div id="bgPerPrayer"></div></div>
        <div class="setting-block"><label>🌓 شفافية الخلفية</label><input type="range" id="bgOpacitySlider" min="0" max="100" value="60"><span id="opacityValue">60%</span></div>
        <div class="setting-block">
            <label>🕌 صلاة الجمعة</label>
            <input type="checkbox" id="jumuahEnabledCheck"> <label>تفعيل</label>
            <label>أذان أول</label><input type="time" id="jumuahAdhan1" value="12:15">
            <label>خطبة تلقائية</label><input type="checkbox" id="jumuahAutoKhutbah" checked>
            <label>وقت الخطبة</label><input type="time" id="jumuahKhutbah" value="12:30">
            <button id="saveJumuah">حفظ</button>
        </div>
        <div class="setting-block">
            <label>🔊 الصوت</label>
            <select id="adhanSoundType"><option value="full">أذان كامل</option><option value="takbeer">تكبيرات فقط</option></select>
            <button id="testAdhanSound">تجربة</button>
            <label>كتم</label><input type="checkbox" id="muteSound">
        </div>
        <div class="setting-block"><label>📅 تعديل التاريخ الهجري</label><button id="hijriPlus">+1</button><button id="hijriMinus">-1</button><button id="hijriReset">تعيين</button></div>
        <div class="setting-block"><label>📜 الأحاديث</label><textarea id="hadithListInput" rows="3"></textarea><button id="saveHadith">حفظ</button></div>
        <div class="setting-block"><label>📖 الآية الثابتة</label><textarea id="verseInput" rows="2"></textarea><button id="saveVerse">حفظ</button></div>
        <div class="setting-block"><button id="exportData">تصدير</button><button id="importData">استيراد</button><input type="file" id="importFile" accept=".json" style="display:none;"></div>
        <div class="setting-block"><button id="factoryReset" style="background:#a00;">إعادة ضبط</button></div>
    </div>
</div>
<script>
    (function(){
        "use strict";

        // ---------- الحالة العامة ----------
        const state = {
            mosqueName: 'مسجد الفرقان',
            city: 'Nador',
            country: 'MA',
            prayerTimes: {
                Fajr: { adhan: '05:01', iqama: '05:23' },
                Dhuhr: { adhan: '13:16', iqama: '13:25' },
                Asr: { adhan: '16:51', iqama: '17:06' },
                Maghrib: { adhan: '19:52', iqama: '20:02' },
                Isha: { adhan: '21:11', iqama: '21:26' }
            },
            iqamaMinutes: { Fajr: 22, Dhuhr: 9, Asr: 15, Maghrib: 10, Isha: 15 },
            manualAdjust: { Fajr: 0, Dhuhr: 0, Asr: 0, Maghrib: 0, Isha: 0 },
            ramadanMode: false,
            summerMode: false,
            hijriOffset: 0,
            hadithList: [
                "قال رسول الله ﷺ: «العهد الذي بيننا وبينهم الصلاة فمن تركها فقد كفر»",
                "قال ﷺ: «صلاة الجماعة تفضل صلاة الفذ بسبع وعشرين درجة»",
                "قال ﷺ: «بشر المشائين في الظلم إلى المساجد بالنور التام يوم القيامة»",
                "قال ﷺ: «من صلى البردين دخل الجنة»",
                "قال ﷺ: «أول ما يحاسب به العبد يوم القيامة الصلاة»",
                "قال ﷺ: «الصلاة نور»",
                "قال ﷺ: «أرحنا بها يا بلال»",
                "قال ﷺ: «خير صفوف الرجال أولها»",
                "قال ﷺ: «من بنى لله مسجداً بنى الله له بيتاً في الجنة»",
                "قال ﷺ: «إن في الجنة غرفاً يرى ظاهرها من باطنها»"

        // ---------- دوال مساعدة (أرقام إنجليزية) ----------
        function formatTimeEn(date) { return date.toLocaleTimeString('en-GB', { hour12: false }); }
        function parseTime(str) { const [h,m] = str.split(':').map(Number); return h * 60 + m; }
        function minutesToTime(m) { const h = Math.floor(m / 60) % 24; return `${h.toString().padStart(2,'0')}:${(m % 60).toString().padStart(2,'0')}`; }
        function addMinutes(timeStr, mins) { return minutesToTime((parseTime(timeStr) + mins + 1440) % 1440); }

        // الحصول على الوقت الفعلي (بعد التعديلات)
        function getEffectiveTime(prayerKey) {
            let base = state.prayerTimes[prayerKey].adhan;
            if (state.manualAdjust[prayerKey]) base = addMinutes(base, state.manualAdjust[prayerKey]);
            if (state.ramadanMode) {
                base = addMinutes(base, -60);
                if (prayerKey === 'Isha') base = addMinutes(base, 30);
            }
            if (state.summerMode) base = addMinutes(base, -60);
            return base;
        }
        function getEffectiveIqama(prayerKey) {
            return addMinutes(getEffectiveTime(prayerKey), state.iqamaMinutes[prayerKey]);
        }

        // تحديث التاريخ والوقت (تاريخ عربي بأرقام لاتينية)
        function updateDateTime() {
            const now = new Date();
            els.liveClock.textContent = formatTimeEn(now);
            const gregStr = now.toLocaleDateString('ar-MA', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
            els.gregorianDate.textContent = gregStr.replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632);
            try {
                let hijriDate = new Date(now);
                hijriDate.setDate(hijriDate.getDate() + state.hijriOffset);
                const hijriStr = hijriDate.toLocaleDateString('ar-SA-u-ca-islamic-umalqura', { day:'numeric', month:'long', year:'numeric' });
                const latinized = hijriStr.replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632);
                els.hijriDate.textContent = latinized + ' هـ';
            } catch(e) {}
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // تغيير الآية تلقائياً
        function rotateVerse() {
            state.verseIndex = (state.verseIndex + 1) % state.verses.length;
            els.verseBox.textContent = state.verses[state.verseIndex];
        }
        setInterval(rotateVerse, 15000);

        // عرض شبكة الصلوات (نقية تماماً بدون أي إطار)
        function renderPrayerGrid() {
            const order = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const names = { Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء' };
            const nowMin = parseTime(formatTimeEn(new Date()));
            let next = null, minDiff = Infinity;
            
            // تحديد الصلاة القادمة
            order.forEach(key => {
                const adhanTime = parseTime(getEffectiveTime(key));
                let diff = adhanTime - nowMin;
                if (diff < 0) diff += 1440;
                if (diff < minDiff) { minDiff = diff; next = key; }
            });

            let gridHtml = '';
            order.forEach(key => {
                const adhanTime = getEffectiveTime(key);
                const iqamaTime = getEffectiveIqama(key);
                const iqamaMinutes = state.iqamaMinutes[key];
                const isNext = (key === next);
                
                if (isNext) {
                    applyTheme(state.themePerPrayer[key] || state.theme);
                }
                
                // لاحظ: تم تصحيح النص إلى "إقامة" بشكل صارم
                gridHtml += `<div class="prayer-card ${isNext ? 'next' : ''}" data-prayer="${key}">
                    <div class="prayer-name">${names[key]}</div>
                    <div class="prayer-time">${adhanTime}</div>
                    <div class="iqama">إقامة (${iqamaMinutes}) ${iqamaTime}</div>
                </div>`;
            });
            
            els.prayerGrid.innerHTML = gridHtml;

            if (next) {
                els.nextPrayerLabel.textContent = `متبقي لصلاة ${names[next]}`;
                startMainCountdown(next);
                const bgImage = state.bgPerPrayer[next] || state.customBg;
                if (bgImage) document.body.style.backgroundImage = `url(${bgImage})`;
            }

            // إضافة مستمعي النقر
            document.querySelectorAll('.prayer-card').forEach(card => {
                card.addEventListener('click', () => openIqamaModal(card.dataset.prayer));
            });
        }

        let mainCountdownInterval;
        function startMainCountdown(prayerKey) {
            if (mainCountdownInterval) clearInterval(mainCountdownInterval);
            const update = () => {
                const nowMin = parseTime(formatTimeEn(new Date()));
                let targetMin = parseTime(getEffectiveTime(prayerKey));
                let diff = targetMin - nowMin;
                if (diff < 0) diff += 1440;
                
                const hours = Math.floor(diff / 60);
                const minutes = diff % 60;
                const seconds = 59 - new Date().getSeconds();
                
                els.nextPrayerCountdown.textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (diff === 0) {
                    renderPrayerGrid();
                }
            };
            update();
            mainCountdownInterval = setInterval(update, 1000);
        }

        // نافذة الإقامة
        let currentModalPrayer = null;
        function openIqamaModal(prayer) {
            currentModalPrayer = prayer;
            const names = { Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء' };
            $('modalPrayerName').textContent = `تعديل إقامة ${names[prayer]}`;
            $('currentIqamaValue').textContent = state.iqamaMinutes[prayer];
            $('iqamaModal').classList.add('active');
        }
        $('modalIncrease').onclick = () => {
            if (currentModalPrayer) {
                state.iqamaMinutes[currentModalPrayer] += 1;
                $('currentIqamaValue').textContent = state.iqamaMinutes[currentModalPrayer];
                renderPrayerGrid(); saveToStorage();
            }
        };
        $('modalDecrease').onclick = () => {
            if (currentModalPrayer && state.iqamaMinutes[currentModalPrayer] > 1) {
                state.iqamaMinutes[currentModalPrayer] -= 1;
                $('currentIqamaValue').textContent = state.iqamaMinutes[currentModalPrayer];
                renderPrayerGrid(); saveToStorage();
            }
        };
        $('modalClose').onclick = () => $('iqamaModal').classList.remove('active');

        // جلب الأوقات من API (المغرب) - طريقة 21
        async function fetchTimes() {
            const city = els.citySelect.value;
            const country = 'MA';
            const d = new Date();
            const url = `https://api.aladhan.com/v1/timingsByCity/${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}?city=${city}&country=${country}&method=21`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.code === 200) {
                    const t = data.data.timings;
                    state.city = city;
                    state.prayerTimes = {
                        Fajr: { adhan: t.Fajr.slice(0,5), iqama: addMinutes(t.Fajr, state.iqamaMinutes.Fajr) },
                        Dhuhr: { adhan: t.Dhuhr.slice(0,5), iqama: addMinutes(t.Dhuhr, state.iqamaMinutes.Dhuhr) },
                        Asr: { adhan: t.Asr.slice(0,5), iqama: addMinutes(t.Asr, state.iqamaMinutes.Asr) },
                        Maghrib: { adhan: t.Maghrib.slice(0,5), iqama: addMinutes(t.Maghrib, state.iqamaMinutes.Maghrib) },
                        Isha: { adhan: t.Isha.slice(0,5), iqama: addMinutes(t.Isha, state.iqamaMinutes.Isha) }
                    };
                    renderPrayerGrid();
                    saveToStorage();
                    showToast(`✅ تم تحديث الأوقات لمدينة ${city}`);
                }
            } catch(e) { alert('فشل الاتصال'); }
        }

        // إدارة الـ Overlay
        let overlayTimer;
        function showOverlay(type, data={}) {
            clearOverlay();
            els.fullOverlay.classList.add('active');
            if (type === 'countdownAdhan' || type === 'countdownIqama') {
                els.countdownCircleOverlay.style.display = 'flex';
                els.countdownCircleOverlay.classList.remove('red');
                let sec = data.seconds || 60;
                els.countdownNumLarge.textContent = sec;
                const int = setInterval(() => {
                    sec--;
                    els.countdownNumLarge.textContent = sec;
                    if (sec <= 10) els.countdownCircleOverlay.classList.add('red');
                    if (sec <= 0) { clearInterval(int); hideOverlay(); }
                }, 1000);
                overlayTimer = int;
            } else if (type === 'adhan') {
                els.adhanPhraseOverlay.style.display = 'block';
                const phrases = (state.adhanSoundType === 'full') ? 
                    ["الله أكبر الله أكبر","أشهد أن لا إله إلا الله","أشهد أن محمدًا رسول الله","حي على الصلاة","حي على الفلاح","الله أكبر الله أكبر","لا إله إلا الله"] :
                    ["الله أكبر", "الله أكبر", "الله أكبر", "الله أكبر"];
                let i = 0;
                els.adhanPhraseOverlay.textContent = phrases[i];
                const int = setInterval(() => {
                    i++;
                    if (i < phrases.length) els.adhanPhraseOverlay.textContent = phrases[i];
                    else { clearInterval(int); setTimeout(hideOverlay, 2000); }
                }, (state.adhanSoundType === 'full') ? 3500 : 1500);
                if (state.soundEnabled) {
                    const audio = state.adhanSoundType === 'full' ? 
                        'https://www.islamcan.com/audio/adhan/azan1.mp3' : 
                        'https://www.islamcan.com/audio/adhan/takbeer.mp3';
                    new Audio(audio).play().catch(()=>{});
                }
            } else if (type === 'prayer') {
                els.prayerActiveOverlay.style.display = 'block';
                setTimeout(() => {
                    hideOverlay();
                    const hour = new Date().getHours();
                    if (hour >= 3 && hour < 12) showOverlay('azkar', { text: state.morningAzkar });
                    else if (hour >= 12 || hour < 3) showOverlay('azkar', { text: state.eveningAzkar });
                    renderPrayerGrid();
                }, (data.duration || state.prayerDuration) * 60000);
            } else if (type === 'azkar') {
                els.azkarOverlay.style.display = 'block';
                els.azkarOverlay.textContent = data.text;
                setTimeout(hideOverlay, (data.duration || state.adhkarDuration) * 60000);
            }
        }
        function hideOverlay() {
            els.fullOverlay.classList.remove('active');
            ['countdownCircleOverlay','adhanPhraseOverlay','prayerActiveOverlay','azkarOverlay'].forEach(id => $(id).style.display = 'none');
            if (overlayTimer) clearInterval(overlayTimer);
        }
        function clearOverlay() { hideOverlay(); }

        // التحقق من الأوقات (كل دقيقة)
        function checkSchedule() {
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();
            const day = now.getDay();
            const isFriday = (day === 5);

            for (let k in state.prayerTimes) {
                const adhan = parseTime(getEffectiveTime(k));
                const iqama = parseTime(getEffectiveIqama(k));
                if (nowMin === adhan - 1) showOverlay('countdownAdhan', { seconds: 60 });
                if (nowMin === adhan) {
                    showOverlay('adhan');
                    if (state.notifications) new Notification(`أذان ${k}`);
                    const diffToIqama = parseTime(getEffectiveIqama(k)) - adhan;
                    if (diffToIqama > 0) setTimeout(() => showOverlay('countdownIqama', { seconds: 60 }), (diffToIqama - 1) * 60000);
                }
                if (nowMin === iqama) showOverlay('prayer');
            }
            // الجمعة
            if (isFriday && state.jumuahEnabled) {
                const jAdhan = parseTime(state.jumuahAdhan1);
                const jKhutbah = state.jumuahAutoKhutbah ? jAdhan + 15 : parseTime(state.jumuahKhutbah);
                if (nowMin === jAdhan) showOverlay('adhan');
                if (nowMin === jKhutbah) {
                    showOverlay('countdownIqama', { seconds: 60 });
                    setTimeout(() => showOverlay('prayer', { duration: 20 }), 60000);
                }
            }
        }
        setInterval(checkSchedule, 60000);

        // تطبيق الثيم (مع دعم 5 ثيمات)
        function applyTheme(theme) {
            const primaryMap = { 
                gold:'#D4AF37', 
                green:'#2ecc71', 
                blue:'#3498db', 
                purple:'#9b59b6',
                red:'#e74c3c'
            };
            document.documentElement.style.setProperty('--primary', primaryMap[theme] || '#D4AF37');
            state.currentTheme = theme;
        }

        // حفظ واسترجاع
        function saveToStorage() { localStorage.setItem('mosqueFinal', JSON.stringify(state)); }
        function loadFromStorage() {
            const saved = localStorage.getItem('mosqueFinal');
            if (saved) Object.assign(state, JSON.parse(saved));
            applySettingsToUI();
        }
        function applySettingsToUI() {
            els.mosqueNameDisplay.textContent = state.mosqueName;
            els.verseBox.textContent = state.verses[state.verseIndex] || state.verse;
            els.hadithTicker.textContent = state.hadithList[0];
            document.body.style.backgroundImage = state.customBg ? `url(${state.customBg})` : '';
            applyTheme(state.theme);
            els.ramadanStatus.textContent = state.ramadanMode ? '✅ رمضان مفعل' : '⏺️ رمضان غير مفعل';
            els.summerStatus.textContent = state.summerMode ? '✅ الصيف مفعل' : '⏺️ الصيف غير مفعل';
            els.muteSound.checked = !state.soundEnabled;
            els.citySelect.value = state.city || 'Nador';
            els.bgOpacitySlider.value = state.bgOpacity * 100;
            els.opacityValue.textContent = Math.round(state.bgOpacity * 100) + '%';
            document.body.style.setProperty('--bg-opacity', state.bgOpacity);
            els.adhanSoundType.value = state.adhanSoundType;
            renderPrayerGrid();
            populateSettingsFields();
        }

        function populateSettingsFields() {
            els.mosqueNameInput.value = state.mosqueName;
            els.hadithListInput.value = state.hadithList.join('\n');
            els.verseInput.value = state.verses[0] || state.verse;
            els.jumuahEnabledCheck.checked = state.jumuahEnabled;
            els.jumuahAdhan1.value = state.jumuahAdhan1;
            els.jumuahAutoKhutbah.checked = state.jumuahAutoKhutbah;
            els.jumuahKhutbah.value = state.jumuahKhutbah;
            renderIqamaPerPrayer();
            renderManualEditor();
            renderThemePerPrayer();
            renderBgPerPrayer();
        }

        function renderIqamaPerPrayer() {
            let html = ''; const names = { Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء' };
            for (let k in state.iqamaMinutes) html += `<label>${names[k]}</label> <input type="number" id="iqama_${k}" value="${state.iqamaMinutes[k]}" min="5" max="60"> دقيقة<br>`;
            els.iqamaPerPrayer.innerHTML = html;
        }
        function renderManualEditor() {
            let html = ''; const names = { Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء' };
            for (let k in state.manualAdjust) html += `<label>${names[k]}</label> <input type="number" id="adj_${k}" value="${state.manualAdjust[k]}" step="1"> دقيقة<br>`;
            els.manualEditor.innerHTML = html;
        }
        function renderThemePerPrayer() {
            let html = ''; const names = { Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء' };
            for (let k in state.themePerPrayer) {
                html += `<label>${names[k]}</label> <select id="theme_${k}">
                    <option value="gold" ${state.themePerPrayer[k]==='gold'?'selected':''}>ذهبي</option>
                    <option value="green" ${state.themePerPrayer[k]==='green'?'selected':''}>أخضر</option>
                    <option value="blue" ${state.themePerPrayer[k]==='blue'?'selected':''}>أزرق</option>
                    <option value="purple" ${state.themePerPrayer[k]==='purple'?'selected':''}>بنفسجي</option>
                    <option value="red" ${state.themePerPrayer[k]==='red'?'selected':''}>أحمر</option>
                </select><br>`;
            }
            els.themePerPrayer.innerHTML = html + '<button id="saveThemePerPrayer">حفظ الثيمات</button>';
            $('saveThemePerPrayer').onclick = () => {
                for (let k in state.themePerPrayer) state.themePerPrayer[k] = $(`theme_${k}`).value;
                renderPrayerGrid(); saveToStorage();
            };
        }
        function renderBgPerPrayer() {
            let html = ''; const names = { Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء' };
            for (let k in state.bgPerPrayer) {
                html += `<label>${names[k]}</label> <input type="file" id="bg_${k}" accept="image/*"><br>`;
            }
            els.bgPerPrayer.innerHTML = html + '<button id="saveBgPerPrayer">حفظ الخلفيات</button>';
            for (let k in state.bgPerPrayer) {
                $(`bg_${k}`).onchange = (e) => {
                    const f = e.target.files[0]; if (!f) return;
                    const r = new FileReader();
                    r.onload = ev => { state.bgPerPrayer[k] = ev.target.result; saveToStorage(); };
                    r.readAsDataURL(f);
                };
            }
        }

        // زر ملء الشاشة
        els.fullscreenFab.onclick = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };

        // شفافية الخلفية
        els.bgOpacitySlider.oninput = (e) => {
            const val = e.target.value / 100;
            state.bgOpacity = val;
            document.body.style.setProperty('--bg-opacity', val);
            els.opacityValue.textContent = e.target.value + '%';
            saveToStorage();
        };
        
        els.opacityFab.onclick = () => {
            const newVal = prompt("أدخل قيمة شفافية الخلفية (0 إلى 100)\n0 = صورة واضحة جداً\n100 = صورة باهتة", Math.round(state.bgOpacity * 100));
            if (newVal !== null) {
                const val = Math.min(100, Math.max(0, parseInt(newVal) || 0)) / 100;
                state.bgOpacity = val;
                document.body.style.setProperty('--bg-opacity', val);
                els.bgOpacitySlider.value = val * 100;
                els.opacityValue.textContent = Math.round(val * 100) + '%';
                saveToStorage();
                showToast(`تم ضبط الشفافية على ${Math.round(val * 100)}%`);
            }
        };

        // ربط الأحداث
        els.settingsFab.onclick = () => els.settingsDrawer.classList.add('open');
        els.closeDrawerBtn.onclick = () => els.settingsDrawer.classList.remove('open');
        els.unlockBtn.onclick = () => {
            if (els.passInput.value === state.password) {
                state.unlocked = true;
                els.settingsContent.style.display = 'block';
                els.lockStatus.textContent = '🔓 مفتوح';
            } else alert('كلمة مرور خاطئة');
        };
        $('saveMosqueName').onclick = () => { state.mosqueName = els.mosqueNameInput.value; els.mosqueNameDisplay.textContent = state.mosqueName; saveToStorage(); };
        $('fetchApiBtn').onclick = fetchTimes;
        $('applyIqamaPerPrayer').onclick = () => {
            for (let k in state.iqamaMinutes) { const inp = $(`iqama_${k}`); if (inp) state.iqamaMinutes[k] = parseInt(inp.value) || 15; }
            for (let k in state.prayerTimes) state.prayerTimes[k].iqama = addMinutes(state.prayerTimes[k].adhan, state.iqamaMinutes[k]);
            renderPrayerGrid(); saveToStorage(); showToast('تم تحديث الإقامات');
        };
        $('toggleRamadanBtn').onclick = () => { state.ramadanMode = !state.ramadanMode; els.ramadanStatus.textContent = state.ramadanMode ? '✅ رمضان مفعل' : '⏺️ رمضان غير مفعل'; renderPrayerGrid(); saveToStorage(); };
        $('toggleSummerBtn').onclick = () => { state.summerMode = !state.summerMode; els.summerStatus.textContent = state.summerMode ? '✅ الصيف مفعل' : '⏺️ الصيف غير مفعل'; renderPrayerGrid(); saveToStorage(); };
        $('addHourAllBtn').onclick = () => { for (let k in state.manualAdjust) state.manualAdjust[k] -= 60; renderPrayerGrid(); saveToStorage(); };
        $('subHourAllBtn').onclick = () => { for (let k in state.manualAdjust) state.manualAdjust[k] += 60; renderPrayerGrid(); saveToStorage(); };
        $('saveManual').onclick = () => { for (let k in state.manualAdjust) { const inp = $(`adj_${k}`); if (inp) state.manualAdjust[k] = parseInt(inp.value) || 0; } renderPrayerGrid(); saveToStorage(); };
        $('saveHadith').onclick = () => { 
            state.hadithList = els.hadithListInput.value.split('\n').filter(l=>l.trim()); 
            if (state.hadithList.length === 0) state.hadithList = ["قال رسول الله ﷺ: «العهد الذي بيننا وبينهم الصلاة فمن تركها فقد كفر»"];
            els.hadithTicker.textContent = state.hadithList[0]; 
            saveToStorage(); 
        };
        $('saveVerse').onclick = () => { 
            const newVerse = els.verseInput.value.trim();
            if (newVerse) {
                state.verses[0] = newVerse;
                els.verseBox.textContent = newVerse;
                saveToStorage();
            }
        };
        $('saveJumuah').onclick = () => {
            state.jumuahEnabled = els.jumuahEnabledCheck.checked;
            state.jumuahAdhan1 = els.jumuahAdhan1.value;
            state.jumuahAutoKhutbah = els.jumuahAutoKhutbah.checked;
            state.jumuahKhutbah = els.jumuahKhutbah.value;
            saveToStorage(); showToast('تم حفظ إعدادات الجمعة');
        };
        els.adhanSoundType.onchange = () => { state.adhanSoundType = els.adhanSoundType.value; saveToStorage(); };
        $('testAdhanSound').onclick = () => {
            showOverlay('adhan'); setTimeout(hideOverlay, 5000);
        };
        els.muteSound.onchange = () => { state.soundEnabled = !els.muteSound.checked; saveToStorage(); };
        $('hijriPlus').onclick = () => { state.hijriOffset++; updateDateTime(); saveToStorage(); };
        $('hijriMinus').onclick = () => { state.hijriOffset--; updateDateTime(); saveToStorage(); };
        $('hijriReset').onclick = () => { state.hijriOffset = 0; updateDateTime(); saveToStorage(); };
        $('exportData').onclick = () => { const b = new Blob([JSON.stringify(state)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'mosque_settings.json'; a.click(); };
        $('importData').onclick = () => els.importFile.click();
        els.importFile.onchange = (e) => { const f = e.target.files[0]; const r = new FileReader(); r.onload = ev => { Object.assign(state, JSON.parse(ev.target.result)); saveToStorage(); location.reload(); }; r.readAsText(f); };
        $('factoryReset').onclick = () => { if (confirm('مسح جميع الإعدادات؟')) { localStorage.clear(); location.reload(); } };

        // مؤشر الفأرة
        let idleTimer;
        document.addEventListener('mousemove', () => { els.body.classList.remove('idle-cursor'); clearTimeout(idleTimer); idleTimer = setTimeout(() => els.body.classList.add('idle-cursor'), 4000); });

        // تدوير الأحاديث
        let hadithIndex = 0;
        function rotateHadith() {
            hadithIndex = (hadithIndex + 1) % state.hadithList.length;
            els.hadithTicker.textContent = state.hadithList[hadithIndex];
        }
        setInterval(rotateHadith, 25000);

        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast-message'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

        // بدء التشغيل
        loadFromStorage();
        if (!localStorage.getItem('mosqueFinal')) saveToStorage();
        setInterval(() => { const now = new Date(); if (now.getHours() === 0 && now.getMinutes() === 1) fetchTimes(); }, 60000);
        rotateVerse();
    })();
</script>
</body>
</html>
