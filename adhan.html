<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذان مسجد نور - وجدة</title>
</head>
<body style="margin:0; font-family:Arial; background:#f5f5f5;">
<div id="adhanAlert" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(198,40,40,0.97); z-index:9999; color:white; text-align:center; padding-top:15%;">
<h1 style="font-size:35px; margin:0; animation: pulse 1s infinite;">🕌 الله أكبر 🕌</h1>
<h2 id="prayerName" style="font-size:25px; margin:20px 0;"></h2>
<p id="currentTime" style="font-size:18px; margin:10px 0;"></p>
<audio id="adhanSound" loop>
<source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/adhaan/adhaan.mp3" type="audio/mpeg">
</audio>
<button onclick="closeAdhan()" style="background:white; color:#C62828; border:none; padding:15px 30px; font-size:18px; font-weight:bold; border-radius:8px; margin-top:20px; cursor:pointer;">إغلاق</button>
</div>
<div id="statusBox" style="background:#E3F2FD; color:#0D47A1; padding:20px; text-align:center; font-size:16px;">
⏳ جاري جلب مواقيت الصلاة لمدينة وجدة...<br>
<small>خلي هاد الصفحة محلولة باش يأذن تلقائياً فكل صلاة</small>
</div>
<style>
@keyframes pulse { 0% { transform:scale(1); } 50% { transform:scale(1.1); } 100% { transform:scale(1); } }
</style>
<script>
let prayerTimes = {};
let alertShown = false;
async function fetchPrayerTimes() {
try {
const today = new Date();
const dateStr = today.getDate() + '-' + (today.getMonth()+1) + '-' + today.getFullYear();
const response = await fetch(`https://api.aladhan.com/v1/timingsByCity/${dateStr}?city=Oujda&country=Morocco&method=3`);
const data = await response.json();
const timings = data.data.timings;
prayerTimes = {
[timings.Fajr.slice(0,5)]: "الفجر",
[timings.Dhuhr.slice(0,5)]: "الظهر",
[timings.Asr.slice(0,5)]: "العصر",
[timings.Maghrib.slice(0,5)]: "المغرب",
[timings.Isha.slice(0,5)]: "العشاء"
};
document.getElementById('statusBox').innerHTML = `✅ تم جلب المواقيت: الفجر ${timings.Fajr.slice(0,5)} | الظهر ${timings.Dhuhr.slice(0,5)} | العصر ${timings.Asr.slice(0,5)} | المغرب ${timings.Maghrib.slice(0,5)} | العشاء ${timings.Isha.slice(0,5)}<br><small>خلي هاد الصفحة محلولة باش يأذن تلقائياً</small>`;
} catch (error) {
document.getElementById('statusBox').innerHTML = "❌ خطأ في جلب المواقيت. تأكد من الأنترنت";
}
}
function checkAdhanTime() {
if (Object.keys(prayerTimes).length === 0) return;
const now = new Date();
const timeNow = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
if (prayerTimes[timeNow] &&!alertShown) {
document.getElementById('prayerName').innerText = "حان الآن وقت أذان " + prayerTimes[timeNow];
document.getElementById('currentTime').innerText = "الساعة الآن: " + timeNow;
document.getElementById('adhanAlert').style.display = 'block';
document.getElementById('adhanSound').play().catch(e => {});
alertShown = true;
setTimeout(() => {
document.getElementById('adhanAlert').style.display = 'none';
alertShown = false;
}, 90000);
}
if (timeNow === "00:01") { fetchPrayerTimes(); }
}
function closeAdhan() {
document.getElementById('adhanAlert').style.display = 'none';
document.getElementById('adhanSound').pause();
alertShown = false;
}
fetchPrayerTimes();
setInterval(checkAdhanTime, 15000);
</script>
</body>
</html>
