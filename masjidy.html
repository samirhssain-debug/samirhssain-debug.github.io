<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosque Ultra Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow:hidden;
transition:0.5s;
}

/* THEMES */
body.green{background:#001a10;}
body.blue{background:#001427;}

/* BG */
#bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
opacity:0.35;
}

/* top */
.top{
display:flex;
justify-content:space-between;
padding:10px;
}

.menu{font-size:28px;cursor:pointer;}
.mosque-name{font-size:22px;font-weight:bold;}

/* info */
.info{
display:flex;
justify-content:space-between;
padding:0 15px;
font-size:14px;
opacity:0.8;
}

/* clock */
.clock{
text-align:center;
font-size:80px;
color:#00ffcc;
}

/* friday */
.friday{
text-align:center;
font-size:22px;
color:#ffd700;
margin-top:5px;
}

/* prayers */
.prayers{
display:flex;
justify-content:space-around;
margin-top:15px;
}

.prayer{
padding:8px;
background:rgba(255,255,255,0.08);
border-radius:8px;
}

.active{background:#00ffcc;color:#000;}

/* countdown */
.next,.countdown,.iqama{
text-align:center;
margin-top:8px;
}

.countdown{color:#ff4d4d;font-size:28px;}
.iqama{color:#ffd700;font-size:24px;}

/* SETTINGS */
.settings{
position:fixed;
left:-100%;
top:0;
width:85%;
height:100%;
background:#111;
padding:15px;
overflow:auto;
transition:0.4s;
z-index:999;
}

.settings input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

.settings button{
width:100%;
padding:10px;
margin-top:8px;
background:#00ffcc;
border:none;
font-weight:bold;
}

/* floating buttons */
.fab{
position:fixed;
bottom:10px;
padding:10px;
border-radius:8px;
background:#00ffcc;
cursor:pointer;
}

.full{left:10px;}
.theme{right:10px;}
</style>
</head>

<body>

<audio id="adhanSound" src="https://www.islamcan.com/audio/adhan/azan1.mp3"></audio>

<img id="bg">

<div class="top">
<div class="menu" onclick="toggleSettings()">☰</div>
<div class="mosque-name" id="mosqueName"></div>
</div>

<div class="info">
<div id="date"></div>
<div id="day"></div>
</div>

<div class="clock" id="clock"></div>

<div class="friday" id="friday"></div>

<div class="next" id="next"></div>
<div class="countdown" id="countdown"></div>
<div class="iqama" id="iqama"></div>

<div class="prayers">
<div class="prayer" id="fajr"></div>
<div class="prayer" id="dhuhr"></div>
<div class="prayer" id="asr"></div>
<div class="prayer" id="maghrib"></div>
<div class="prayer" id="isha"></div>
</div>

<div class="fab full" onclick="goFull()">⛶</div>
<div class="fab theme" onclick="changeTheme()">🎨</div>

<!-- SETTINGS -->
<div class="settings" id="settings">
<h3>⚙️ ULTRA PRO PANEL</h3>

<input id="mosqueInput" placeholder="اسم المسجد">
<input id="cityInput" placeholder="المدينة">

<select id="adhanToggle">
<option value="on">🔊 الأذان ON</option>
<option value="off">🔇 الأذان OFF</option>
</select>

<select id="themeSelect">
<option value="dark">Dark</option>
<option value="green">Green</option>
<option value="blue">Blue</option>
</select>

<input id="bgInput" type="file">

<button onclick="saveSettings()">حفظ</button>
</div>

<script>

let mosque = localStorage.getItem("mosque") || "مسجد النور";
let city = localStorage.getItem("city") || "Fes";
let adhanOn = localStorage.getItem("adhan") || "on";
let theme = localStorage.getItem("theme") || "dark";

document.body.classList.add(theme);

document.getElementById("mosqueName").innerText = mosque;
document.getElementById("mosqueInput").value = mosque;
document.getElementById("cityInput").value = city;

document.getElementById("adhanToggle").value = adhanOn;
document.getElementById("themeSelect").value = theme;

/* DATE */
function updateDate(){
let d=new Date();
let days=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

document.getElementById("date").innerText=d.toLocaleDateString("ar-MA");
document.getElementById("day").innerText=days[d.getDay()];

if(d.getDay()===5){
document.getElementById("friday").innerText="🕌 جمعة مباركة";
}
}
updateDate();

/* CLOCK */
function pad(n){return n<10?"0"+n:n;}
setInterval(()=>{
let d=new Date();
document.getElementById("clock").innerText=
pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
},1000);

/* CACHE SYSTEM (offline save) */
let times={};
let toMin=t=>{let[h,m]=t.split(":");return +h*60+ +m;}

/* LOAD PRAYER */
async function load(){
try{
let res=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=MA&method=2`);
let data=await res.json();
times=data.data.timings;
localStorage.setItem("times",JSON.stringify(times));
}catch(e){
times=JSON.parse(localStorage.getItem("times")||"{}");
}

["fajr","dhuhr","asr","maghrib","isha"].forEach(p=>{
document.getElementById(p).innerText=times[p.charAt(0).toUpperCase()+p.slice(1)];
});

nextPrayer();
}
load();

/* NEXT PRAYER */
function nextPrayer(){
let now=new Date();
let cur=now.getHours()*60+now.getMinutes();

let list=[
{name:"Fajr",t:times.Fajr},
{name:"Dhuhr",t:times.Dhuhr},
{name:"Asr",t:times.Asr},
{name:"Maghrib",t:times.Maghrib},
{name:"Isha",t:times.Isha}
];

let next=null;

for(let p of list){
if(!p.t) continue;
let tt=toMin(p.t);
if(tt>cur && !next) next=p;
}

if(next){
document.getElementById("next").innerText="الصلاة القادمة: "+next.name;
count(next.t);
}
}

/* COUNTDOWN + IQAMA */
let c, last="";

function count(t){
clearInterval(c);

c=setInterval(()=>{
let now=new Date();
let cur=now.getHours()*60+now.getMinutes();

let remain=toMin(t)-cur;
let m=Math.floor(remain/60);
let s=remain%60;

document.getElementById("countdown").innerText="⏳ "+m+":"+String(s).padStart(2,"0");

if(remain<=0 && last!==t){
last=t;

document.getElementById("iqama").innerText="🕌 وقت الإقامة";

if(adhanOn==="on"){
document.getElementById("adhanSound").play().catch(()=>{});
}

setTimeout(()=>location.reload(),60000);
}

},1000);
}

/* FULLSCREEN */
function goFull(){
document.documentElement.requestFullscreen();
}

/* THEME */
function changeTheme(){
let themes=["dark","green","blue"];
let current=document.body.className||"dark";
let i=themes.indexOf(current);
let next=themes[(i+1)%themes.length];
document.body.className=next;
localStorage.setItem("theme",next);
}

/* SETTINGS */
function toggleSettings(){
let s=document.getElementById("settings");
s.style.left=(s.style.left==="0px")?"-100%":"0px";
}

function saveSettings(){
localStorage.setItem("mosque",mosqueInput.value);
localStorage.setItem("city",cityInput.value);
localStorage.setItem("adhan",adhanToggle.value);
localStorage.setItem("theme",themeSelect.value);
location.reload();
}

/* BG */
document.getElementById("bgInput").addEventListener("change",e=>{
let f=e.target.files[0];
let url=URL.createObjectURL(f);
document.getElementById("bg").src=url;
localStorage.setItem("bg",url);
});

let bg=localStorage.getItem("bg");
if(bg) document.getElementById("bg").src=bg;

</script>

</body>
</html>
