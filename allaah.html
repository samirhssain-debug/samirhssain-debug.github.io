<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مسجد النور - لوحة التحكم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --primary: #0a5c3e;
            --secondary: #d4af37;
            --dark: #064e3b;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #0d472e 100%);
            min-height: 100vh;
            color: white;
        }

        .dashboard {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        /* رأس الصفحة */
        .header-section {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 25px 30px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid var(--secondary);
        }

        .mosque-name {
            font-size: 2rem;
            font-weight: bold;
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* الساعة الكبيرة - أرقام إنجليزية */
        .clock-wrapper {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 100px;
            padding: 20px 35px;
            border: 2px solid var(--secondary);
            display: inline-block;
            width: auto;
            min-width: 400px;
        }

        .big-clock {
            font-size: 5rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
            direction: ltr;
            color: var(--secondary);
        }

        .date-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            font-size: 1.1rem;
            flex-wrap: wrap;
        }

        /* بطاقات الصلاة - أرقام إنجليزية */
        .prayers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .prayer-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.4);
            transition: 0.2s;
        }

        .prayer-card.active {
            background: rgba(212, 175, 55, 0.85);
            color: #1a3a2a;
            transform: scale(1.02);
        }

        .prayer-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .adhan-time {
            font-size: 1.8rem;
            font-weight: bold;
            font-family: monospace;
        }

        .iqama-time {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* العدادات - أرقام إنجليزية */
        .counters {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .counter-box {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50px;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border-right: 3px solid var(--secondary);
        }

        /* شريط الأحاديث */
        .ticker {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 20px;
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-text {
            display: inline-block;
            animation: scrollText 20s linear infinite;
            font-size: 1.2rem;
        }

        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* الأدعية */
        .dua-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            padding: 20px;
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 15px;
        }

        /* أذكار الوقت */
        .time-dhikr {
            background: rgba(0, 100, 0, 0.5);
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            font-size: 1.1rem;
        }

        /* زر القائمة */
        .menu-button {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 200;
        }

        .menu-btn {
            background: var(--secondary);
            border: none;
            color: #1e3a2a;
            font-size: 1.5rem;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            background: #ffd966;
        }

        /* لوحة الإعدادات - جميع الأرقام إنجليزية */
        .settings-panel {
            position: fixed;
            left: 25px;
            bottom: 90px;
            background: rgba(30, 50, 35, 0.98);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 30px;
            z-index: 200;
            display: none;
            flex-direction: column;
            gap: 20px;
            min-width: 320px;
            border: 2px solid var(--secondary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .settings-panel h3 {
            color: var(--secondary);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 5px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 1rem;
        }

        .setting-item label {
            font-weight: bold;
        }

        /* أزرار الصعود والهبوط */
        .value-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 50px;
        }

        .value-control span {
            min-width: 50px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
        }

        .arrow-btn {
            background: var(--secondary);
            border: none;
            color: #1e3a2a;
            font-size: 1.3rem;
            font-weight: bold;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        .arrow-btn:hover {
            transform: scale(1.1);
            background: #ffd966;
        }

        .settings-panel input, .settings-panel select {
            padding: 8px 12px;
            border-radius: 30px;
            border: none;
            font-family: monospace;
        }

        .btn-settings {
            background: var(--secondary);
            border: none;
            color: #1e3a2a;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        .close-btn {
            background: #8b0000;
            color: white;
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-width: 700px) {
            .big-clock { font-size: 2.8rem; }
            .clock-wrapper { min-width: 250px; padding: 12px 20px; }
            .mosque-name { font-size: 1.3rem; }
            .prayer-name { font-size: 1.1rem; }
            .adhan-time { font-size: 1.3rem; }
            .settings-panel { min-width: 280px; left: 10px; bottom: 80px; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <!-- رأس الصفحة مع الساعة -->
    <div class="header-section">
        <div class="mosque-name">
            <span>🕌</span> مسجد النور <span>🕌</span>
        </div>
        <div class="clock-wrapper">
            <div class="big-clock" id="clock">--:--:--</div>
        </div>
        <div class="date-info">
            <div id="gregorianDate">📅 -- -- ----</div>
            <div id="hijriDate">📖 -- -- ---- هـ</div>
        </div>
    </div>

    <!-- أوقات الصلاة -->
    <div class="prayers-grid" id="prayersGrid"></div>

    <!-- العدادات -->
    <div class="counters">
        <div class="counter-box" id="nextPrayerCounter">⏳ متبقي للصلاة: --</div>
        <div class="counter-box" id="iqamaCounter" style="display:none;">⏰ متبقي للإقامة: --</div>
    </div>

    <!-- شريط الأحاديث -->
    <div class="ticker">
        <div class="ticker-text" id="hadithTicker">ﷺ قال رسول الله صلى الله عليه وسلم: إنما بعثت لأتمم مكارم الأخلاق</div>
    </div>

    <!-- الأدعية المتغيرة -->
    <div class="dua-box" id="duaBox">🤲 سبحان الله وبحمده</div>

    <!-- أذكار الصباح والمساء -->
    <div class="time-dhikr" id="timeDhikr">📿 أذكار الصباح: سبحان الله العظيم</div>
</div>

<!-- زر القائمة -->
<div class="menu-button">
    <button class="menu-btn" id="menuBtn">☰ القائمة</button>
</div>

<!-- لوحة الإعدادات - تحتوي على أزرار صعود وهبوط -->
<div class="settings-panel" id="settingsPanel">
    <h3>⚙️ الإعدادات</h3>
    
    <div class="setting-item">
        <label>🎵 مستوى الصوت:</label>
        <div class="value-control">
            <button class="arrow-btn" id="volumeDown">▼</button>
            <span id="volumeValue">70</span>
            <button class="arrow-btn" id="volumeUp">▲</button>
        </div>
    </div>

    <div class="setting-item">
        <label>🔄 سرعة الأدعية (ثانية):</label>
        <div class="value-control">
            <button class="arrow-btn" id="speedDown">▼</button>
            <span id="speedValue">3</span>
            <button class="arrow-btn" id="speedUp">▲</button>
        </div>
    </div>

    <div class="setting-item">
        <label>🎨 اللون الأساسي:</label>
        <input type="color" id="themeColor" value="#0a5c3e">
    </div>

    <div class="setting-item">
        <label>🌙 وضع الليل/النهار:</label>
        <select id="modeSelect">
            <option value="night">ليلي (افتراضي)</option>
            <option value="day">نهاري</option>
        </select>
    </div>

    <button class="btn-settings close-btn" id="closeSettings">إغلاق</button>
</div>

<script>
    // جميع الأرقام إنجليزية (ستظهر كما هي 1,2,3...)
    
    // أوقات الصلاة
    let prayerTimes = {
        "الفجر": { adhan: "05:20", iqama: "05:40" },
        "الظهر": { adhan: "13:00", iqama: "13:15" },
        "العصر": { adhan: "16:30", iqama: "16:45" },
        "المغرب": { adhan: "18:45", iqama: "19:00" },
        "العشاء": { adhan: "20:15", iqama: "20:30" }
    };

    // قوائم المحتوى
    const hadithList = [
        "ﷺ قال رسول الله ﷺ: من صلى عليَّ مرة صلى الله عليه بها عشراً",
        "ﷺ خيركم من تعلم القرآن وعلمه",
        "ﷺ لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه",
        "ﷺ إنما الأعمال بالنيات",
        "ﷺ المؤمن للمؤمن كالبنيان يشد بعضه بعضاً"
    ];
    
    const duaList = [
        "🤲 ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة",
        "🤲 سبحان الله والحمد لله ولا إله إلا الله والله أكبر",
        "🤲 اللهم اغفر لي وارحمني واهدني",
        "🤲 حسبي الله لا إله إلا هو عليه توكلت",
        "🤲 اللهم صل على محمد وعلى آل محمد"
    ];

    // متغيرات التحكم
    let volume = 70;
    let duaSpeed = 3; // ثواني
    let duaIndex = 0;
    let hadithIndex = 0;
    let soundEnabled = true;
    let duaInterval;

    // تحديث الساعة والتاريخ
    function updateClock() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('clock').innerHTML = `${hours}:${minutes}:${seconds}`;
        
        // التاريخ الميلادي
        const gregDate = now.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('gregorianDate').innerHTML = `📅 ${gregDate}`;
        
        // التاريخ الهجري
        const hijri = new Intl.DateTimeFormat('ar-TN-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(now);
        document.getElementById('hijriDate').innerHTML = `📖 ${hijri} هـ`;
        
        // أذكار الصباح والمساء
        const hour = now.getHours();
        const dhikrEl = document.getElementById('timeDhikr');
        if (hour >= 6 && hour < 12) {
            dhikrEl.innerHTML = "📿 أذكار الصباح: سبحان الله وبحمده عدد خلقه";
        } else if (hour >= 18 || hour < 5) {
            dhikrEl.innerHTML = "📿 أذكار المساء: أعوذ بكلمات الله التامات من شر ما خلق";
        } else {
            dhikrEl.innerHTML = "📿 سبحان الله والحمد لله";
        }
    }

    // عرض أوقات الصلاة
    function renderPrayers() {
        const grid = document.getElementById('prayersGrid');
        grid.innerHTML = "";
        const now = new Date();
        const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        for (let [name, times] of Object.entries(prayerTimes)) {
            const card = document.createElement('div');
            card.className = 'prayer-card';
            if (currentTime >= times.adhan && currentTime < times.iqama) {
                card.classList.add('active');
            }
            card.innerHTML = `
                <div class="prayer-name">${name}</div>
                <div class="adhan-time">${times.adhan}</div>
                <div class="iqama-time">إقامة ${times.iqama}</div>
            `;
            grid.appendChild(card);
        }
    }

    // حساب أقرب صلاة
    function getNextPrayer() {
        const now = new Date();
        let next = null;
        let nextName = "";
        
        for (let [name, times] of Object.entries(prayerTimes)) {
            let [hour, minute] = times.adhan.split(':').map(Number);
            let prayerDate = new Date();
            prayerDate.setHours(hour, minute, 0, 0);
            if (prayerDate > now && (!next || prayerDate < next)) {
                next = prayerDate;
                nextName = name;
            }
        }
        
        if (!next) {
            let first = Object.entries(prayerTimes)[0];
            let [hour, minute] = first[1].adhan.split(':').map(Number);
            next = new Date();
            next.setDate(next.getDate() + 1);
            next.setHours(hour, minute, 0, 0);
            nextName = first[0];
        }
        
        return { next, nextName };
    }

    // تحديث العدادات
    function updateCounters() {
        const now = new Date();
        const { next, nextName } = getNextPrayer();
        const diffSec = Math.floor((next - now) / 1000);
        
        if (diffSec > 0) {
            const mins = Math.floor(diffSec / 60);
            const secs = diffSec % 60;
            document.getElementById('nextPrayerCounter').innerHTML = `⏳ متبقي لصلاة ${nextName}: ${mins} دقيقة ${secs} ثانية`;
        } else if (diffSec > -10) {
            document.getElementById('nextPrayerCounter').innerHTML = `🔔 وقت صلاة ${nextName} الآن 🔔`;
        }
    }

    // تحديث الأدعية حسب السرعة
    function startDuaRotation() {
        if (duaInterval) clearInterval(duaInterval);
        duaInterval = setInterval(() => {
            duaIndex = (duaIndex + 1) % duaList.length;
            document.getElementById('duaBox').innerHTML = duaList[duaIndex];
        }, duaSpeed * 1000);
    }

    // تحديث شريط الأحاديث
    function startHadithRotation() {
        setInterval(() => {
            hadithIndex = (hadithIndex + 1) % hadithList.length;
            document.getElementById('hadithTicker').innerHTML = hadithList[hadithIndex];
        }, 8000);
    }

    // تطبيق الثيم
    function applyTheme() {
        const color = document.getElementById('themeColor').value;
        document.documentElement.style.setProperty('--primary', color);
        document.body.style.background = `linear-gradient(135deg, ${color}20 0%, ${color}60 100%)`;
    }

    // تطبيق وضع النهار/الليل
    function applyMode() {
        const mode = document.getElementById('modeSelect').value;
        if (mode === 'day') {
            document.body.style.background = "linear-gradient(135deg, #f5e6c8 0%, #e8d5a8 100%)";
            document.body.style.color = "#2d4a2d";
            document.querySelectorAll('.prayer-card').forEach(c => c.style.background = "rgba(255,255,200,0.9)");
            document.querySelectorAll('.counter-box, .ticker, .dua-box, .time-dhikr').forEach(el => {
                el.style.background = "rgba(0,0,0,0.15)";
                el.style.color = "#2d4a2d";
            });
        } else {
            location.reload();
        }
    }

    // التحكم بالصوت
    function updateVolume() {
        document.getElementById('volumeValue').innerHTML = volume;
        if (soundEnabled) {
            console.log(`🔊 مستوى الصوت: ${volume}%`);
        }
    }

    // فتح/إغلاق الإعدادات
    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    // تهيئة الصفحة
    function init() {
        updateClock();
        renderPrayers();
        updateCounters();
        startDuaRotation();
        startHadithRotation();
        
        // تحديث كل ثانية
        setInterval(() => {
            updateClock();
            updateCounters();
            renderPrayers();
        }, 1000);
        
        // أزرار الصعود والهبوط لمستوى الصوت
        document.getElementById('volumeUp').onclick = () => {
            if (volume < 100) volume += 5;
            updateVolume();
        };
        document.getElementById('volumeDown').onclick = () => {
            if (volume > 0) volume -= 5;
            updateVolume();
        };
        
        // أزرار الصعود والهبوط لسرعة الأدعية
        document.getElementById('speedUp').onclick = () => {
            if (duaSpeed < 10) {
                duaSpeed += 0.5;
                document.getElementById('speedValue').innerHTML = duaSpeed;
                startDuaRotation();
            }
        };
        document.getElementById('speedDown').onclick = () => {
            if (duaSpeed > 1) {
                duaSpeed -= 0.5;
                document.getElementById('speedValue').innerHTML = duaSpeed;
                startDuaRotation();
            }
        };
        
        // زر القائمة الرئيسي
        document.getElementById('menuBtn').onclick = toggleSettings;
        
        // إغلاق الإعدادات
        document.getElementById('closeSettings').onclick = toggleSettings;
        
        // تغيير اللون
        document.getElementById('themeColor').onchange = applyTheme;
        
        // تغيير الوضع
        document.getElementById('modeSelect').onchange = applyMode;
        
        // عرض القيم الابتدائية
        document.getElementById('volumeValue').innerHTML = volume;
        document.getElementById('speedValue').innerHTML = duaSpeed;
    }
    
    init();
</script>
</body>
</html>
