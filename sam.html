<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>شاشة المسجد</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    height: 100vh;
    overflow: hidden;
    background: url('https://images.unsplash.com/photo-1542816417-0983c9c9ad53') no-repeat center center/cover;
}

/* تغميق */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.60);
}

/* الحاوية الرئيسية العمودية */
.container {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 15px;
}

/* العنوان */
.top {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 10px;
}

/* الساعة كبيرة */
.clock {
    text-align: center;
    font-size: 80px;
    font-weight: bold;
    margin-top: 10px;
}

/* التاريخ */
.date {
    text-align: center;
    font-size: 22px;
    opacity: 0.9;
}

/* الصلاة القادمة */
.next {
    text-align: center;
    font-size: 26px;
    color: #ffd700;
    margin-top: 10px;
}

/* مواقيت الصلاة عمودي */
.times {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 15px;
}

.time-box {
    background: rgba(255,255,255,0.12);
    padding: 14px;
    border-radius: 12px;
    font-size: 22px;
    display: flex;
    justify-content: space-between;
    font-weight: bold;
}

.time-box small {
    color: #ffd700;
    font-size: 16px;
}

/* الأذكار */
.adhkar {
    text-align: center;
    font-size: 24px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="top">🕌 شاشة المسجد</div>

    <div>
        <div class="clock" id="clock">00:00:00</div>
        <div class="date" id="date"></div>
        <div class="next" id="nextPrayer">الصلاة القادمة: --</div>
    </div>

    <!-- مواقيت الصلاة -->
    <div class="times">

        <div class="time-box">
            الفجر
            <span>05:10</span>
            <small>الإقامة 05:20</small>
        </div>

        <div class="time-box">
            الظهر
            <span>12:30</span>
            <small>الإقامة 12:40</small>
        </div>

        <div class="time-box">
            العصر
            <span>15:45</span>
            <small>الإقامة 15:55</small>
        </div>

        <div class="time-box">
            المغرب
            <span>18:10</span>
            <small>الإقامة 18:20</small>
        </div>

        <div class="time-box">
            العشاء
            <span>19:30</span>
            <small>الإقامة 19:40</small>
        </div>

    </div>

    <div class="adhkar" id="adhkar">
        سبحان الله • الحمد لله • لا إله إلا الله • الله أكبر
    </div>

</div>

<script>

// ⏰ الساعة
function updateClock() {
    let now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString('ar-MA');
}
setInterval(updateClock, 1000);
updateClock();

// 📅 التاريخ
let d = new Date();
document.getElementById("date").innerHTML =
    d.toLocaleDateString('ar-MA');

// 🕌 الصلاة القادمة (مثال)
document.getElementById("nextPrayer").innerText =
    "الصلاة القادمة: المغرب 18:10";

// 📿 الأذكار
let adhkarList = [
    "سبحان الله",
    "الحمد لله",
    "لا إله إلا الله",
    "الله أكبر",
    "أستغفر الله"
];

let i = 0;
setInterval(() => {
    document.getElementById("adhkar").innerHTML = adhkarList[i];
    i = (i + 1) % adhkarList.length;
}, 4000);

</script>

</body>
</html>
