<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مسجد النور - لوحة رقمية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --primary-color: #0a4d3a;
            --secondary-color: #d4af37;
            --accent-color1: #e67e22;
            --accent-color2: #3498db;
            --accent-color3: #9b59b6;
            --text-light: #ffffff;
            --text-dark: #1a2a1f;
            --card-bg: rgba(0, 0, 0, 0.55);
            --prayer-card-bg: rgba(0, 0, 0, 0.55);
            --prayer-text-color: #ffffff;
            --prayer-border-radius: 30px;
            --prayer-card-size: 130px;
            --show-iqama: block;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.3s ease;
            color: var(--text-light);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            backdrop-filter: blur(8px);
            border: 1px solid var(--secondary-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.05);
        }
        .menu-btn span {
            width: 24px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .menu-btn:hover span {
            background: black;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.4));
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }

        .mosque-name {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, rgba(212,175,55,0.3), rgba(212,175,55,0.1));
            padding: 8px 20px;
            border-radius: 50px;
            border-right: 3px solid var(--secondary-color);
        }

        .datetime {
            text-align: left;
            font-family: monospace;
        }

        .live-clock {
            font-size: 1.8rem;
            font-weight: bold;
            direction: ltr;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 40px;
            overflow-y: auto;
        }

        .prayers-section {
            margin-bottom: 25px;
        }

        .prayer-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .prayer-card {
            background: var(--prayer-card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--prayer-border-radius);
            padding: 15px 25px;
            text-align: center;
            min-width: var(--prayer-card-size);
            border: 1px solid rgba(212,175,55,0.4);
            transition: all 0.2s;
            color: var(--prayer-text-color);
        }
        .prayer-card:nth-child(1) { border-top: 3px solid var(--accent-color1); }
        .prayer-card:nth-child(2) { border-top: 3px solid var(--accent-color2); }
        .prayer-card:nth-child(3) { border-top: 3px solid var(--accent-color3); }
        .prayer-card:nth-child(4) { border-top: 3px solid var(--secondary-color); }
        .prayer-card:nth-child(5) { border-top: 3px solid var(--accent-color1); }
        
        .prayer-card.active-prayer {
            background: linear-gradient(135deg, rgba(212,175,55,0.9), rgba(212,175,55,0.7));
            color: var(--text-dark);
            text-shadow: none;
            transform: scale(1.02);
            border: 2px solid #ffd700;
        }
        .prayer-name {
            font-size: 1.6rem;
            font-weight: bold;
        }
        .adhan-time {
            font-size: 2rem;
            font-family: monospace;
            font-weight: bold;
            direction: ltr;
        }
        .iqama-time {
            font-size: 1rem;
            opacity: 0.85;
            margin-top: 5px;
            display: var(--show-iqama);
        }

        .countdowns-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .countdown-box {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            border-radius: 60px;
            padding: 12px 30px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            border-right: 4px solid var(--secondary-color);
        }
        .takbeer-box {
            background: linear-gradient(135deg, rgba(139,69,19,0.9), rgba(139,69,19,0.7));
            border-radius: 60px;
            padding: 12px 30px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            border-right: 4px solid #ff6600;
        }
        .ticker-section {
            margin: 15px 0;
        }
        .ticker-container {
            background: linear-gradient(90deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
            border-radius: 50px;
            padding: 12px 20px;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-text {
            display: inline-block;
            font-size: 1.4rem;
            animation: scrollText var(--ticker-speed, 25s) linear infinite;
        }
        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .dua-section {
            margin: 15px 0;
        }
        .dua-rotator {
            font-size: 1.8rem;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            padding: 20px;
            border-radius: 60px;
            text-align: center;
            transition: all 0.3s;
        }
        .time-dhikr {
            font-size: 1.4rem;
            background: linear-gradient(135deg, rgba(0,100,0,0.7), rgba(0,100,0,0.5));
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin-top: 10px;
        }

        .settings-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #1e3a2a, #0a2f1a);
            padding: 20px;
            border-radius: 25px;
            z-index: 200;
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 340px;
            max-height: 85vh;
            border: 2px solid var(--secondary-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        .settings-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .scroll-arrow {
            background: rgba(212,175,55,0.3);
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .scroll-arrow:hover {
            background: var(--secondary-color);
            color: black;
        }
        .settings-panel label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .settings-panel input, .settings-panel select {
            padding: 8px;
            border-radius: 20px;
            border: none;
        }
        .btn {
            background: linear-gradient(135deg, #2c5530, #1a3a1a);
            border: none;
            color: white;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        .btn:hover {
            background: linear-gradient(135deg, var(--secondary-color), #b8960c);
            color: black;
        }
        .overlay-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 2rem;
            text-align: center;
        }
        @media (max-width: 800px) {
            .top-bar { padding: 10px 20px; }
            .prayer-card { min-width: 100px; padding: 8px 12px; }
            .prayer-name { font-size: 1.1rem; }
            .adhan-time { font-size: 1.3rem; }
            .settings-panel { width: 300px; left: 10px; right: 10px; }
            .menu-btn { top: 10px; right: 10px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
<div class="dashboard" id="dashboard">
    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="top-bar">
        <div class="mosque-name">🕌 مسجد النور</div>
        <div class="datetime">
            <div id="gregorianDate"></div>
            <div id="hijriDate" style="font-size:0.9rem;"></div>
            <div class="live-clock" id="liveClock"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="prayers-section">
            <div class="prayer-grid" id="prayerGrid"></div>
        </div>

        <div class="countdowns-section">
            <div class="countdown-box" id="nextPrayerCountdown">متبقي للصلاة: --</div>
            <div class="takbeer-box" id="takbeerCountdown" style="display:none;">تكبيرات قبل الأذان: --</div>
            <div class="countdown-box" id="iqamaCountdown" style="display:none;">متبقي للإقامة: --</div>
        </div>

        <div class="ticker-section">
            <div class="ticker-container" id="tickerContainer">
                <div class="ticker-text" id="hadithTicker">قال رسول الله صلى الله عليه وسلم: إنما بعثت لأتمم مكارم الأخلاق</div>
            </div>
        </div>

        <div class="dua-section">
            <div class="dua-rotator" id="duaRotator">سبحان الله وبحمده</div>
        </div>

        <div class="time-dhikr" id="timeDhikr">أذكار الصباح: سبحان الله العظيم</div>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
        <button class="scroll-arrow" id="scrollUpBtn">↑</button>
        <h3 style="color:gold;">⚙️ الإعدادات المتقدمة</h3>
        <button class="scroll-arrow" id="scrollDownBtn">↓</button>
    </div>
    
    <label>🔊 رفع الصوت:</label>
    <button id="volumeUpBtn" class="btn">رفع الصوت ▲</button>
    
    <label>🔉 خفض الصوت:</label>
    <button id="volumeDownBtn" class="btn">خفض الصوت ▼</button>
    
    <label>🏙️ اختيار المدينة:</label>
    <select id="citySelect">
        <option value="">جاري تحميل المدن...</option>
    </select>

    <label>🕐 وضع الأوقات:</label>
    <select id="timeModeSelect">
        <option value="auto">تلقائي (API)</option>
        <option value="manual">يدوي</option>
    </select>

    <div id="manualTimesSection" style="display:none;">
        <h4>📅 أوقات يدوية</h4>
        <label>الفجر: <input type="time" id="fajrAdhan" value="05:20"></label>
        <label>إقامة الفجر: <input type="time" id="fajrIqama" value="05:40"></label>
        <label>الظهر: <input type="time" id="dhuhrAdhan" value="13:00"></label>
        <label>إقامة الظهر: <input type="time" id="dhuhrIqama" value="13:15"></label>
        <label>العصر: <input type="time" id="asrAdhan" value="16:30"></label>
        <label>إقامة العصر: <input type="time" id="asrIqama" value="16:45"></label>
        <label>المغرب: <input type="time" id="maghribAdhan" value="18:45"></label>
        <label>إقامة المغرب: <input type="time" id="maghribIqama" value="19:00"></label>
        <label>العشاء: <input type="time" id="ishaAdhan" value="20:15"></label>
        <label>إقامة العشاء: <input type="time" id="ishaIqama" value="20:30"></label>
        <button id="saveManualTimesBtn" class="btn">💾 حفظ الأوقات</button>
    </div>

    <h4 style="color:gold;">🎨 شكل بطاقات الصلوات</h4>
    <label>🎨 لون خلفية البطاقات:</label>
    <input type="color" id="prayerCardBg" value="#0000008C">
    <label>✏️ لون النص:</label>
    <input type="color" id="prayerTextColor" value="#ffffff">
    <label>🔘 شكل الحواف:</label>
    <select id="prayerBorderRadius">
        <option value="15px">مربعة</option>
        <option value="30px" selected>دائرية</option>
        <option value="50px">مستديرة جداً</option>
    </select>
    <label>📏 حجم البطاقات:</label>
    <select id="prayerCardSize">
        <option value="100px">صغير</option>
        <option value="130px" selected>متوسط</option>
        <option value="160px">كبير</option>
    </select>
    <label>📢 إظهار إقامة الصلاة:</label>
    <select id="showIqamaToggle">
        <option value="block">نعم</option>
        <option value="none">لا</option>
    </select>

    <label>🎨 اللون الرئيسي:</label>
    <input type="color" id="themeColor" value="#0a4d3a">

    <label>🖼️ خلفية (لون):</label>
    <input type="color" id="bgColorPicker" value="#0a2f2a">

    <label>🖼️ خلفية (صورة من جهازك):</label>
    <input type="file" id="bgImageUpload" accept="image/*">

    <label>📜 سرعة الشريط المتحرك (ثانية):</label>
    <input type="range" id="tickerSpeed" min="10" max="50" value="25">

    <label>🔄 سرعة تغير الأدعية (ثانية):</label>
    <input type="range" id="duaSpeed" min="1" max="5" step="0.5" value="2">

    <label>⬛ مدة الشاشة السوداء (<span style="color:yellow;">بالدقائق</span>):</label>
    <input type="number" id="blackScreenMinutes" value="5" min="1" max="60">

    <label>📿 مدة أذكار ما بعد الصلاة (<span style="color:yellow;">بالدقائق</span>):</label>
    <input type="number" id="dhikrMinutes" value="2" min="1" max="30">

    <label>🔔 تفعيل الإعلانات:</label>
    <select id="announcementsToggle">
        <option value="all">الكل مفعل</option>
        <option value="azan_only">الأذان فقط</option>
        <option value="prayer_only">الصلاة فقط</option>
    </select>

    <label>🌞 وضع النهار:</label>
    <button id="dayModeBtn" class="btn">☀️ تفعيل وضع النهار</button>
    
    <label>🌙 وضع الليل:</label>
    <button id="nightModeBtn" class="btn">🌙 تفعيل وضع الليل</button>

    <button id="closeSettings" class="btn">❌ إغلاق الإعدادات</button>
</div>

<script>
    let prayerTimes = {
        الفجر: { adhan: "05:20", iqama: "05:40" },
        الظهر: { adhan: "13:00", iqama: "13:15" },
        العصر: { adhan: "16:30", iqama: "16:45" },
        المغرب: { adhan: "18:45", iqama: "19:00" },
        العشاء: { adhan: "20:15", iqama: "20:30" }
    };
    let activeOverlay = null;
    let soundEnabled = true;
    let volumeLevel = 70;
    let takbeerTimer = null;
    let announcementsMode = "all";
    let citiesList = [];
    let currentCityId = null;
    let isAutoMode = true;

    const hadithList = [
        "قال رسول الله ﷺ: من صلى عليَّ مرة صلى الله عليه بها عشراً",
        "قال النبي ﷺ: الدعاء هو العبادة",
        "خيركم من تعلم القرآن وعلمه",
        "لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه",
        "إنما الأعمال بالنيات",
        "المؤمن للمؤمن كالبنيان يشد بعضه بعضاً"
    ];
    const duaList = [
        "🤲 ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة",
        "🤲 سبحان الله والحمد لله ولا إله إلا الله والله أكبر",
        "🤲 اللهم اغفر لي وارحمني واهدني",
        "🤲 حسبي الله لا إله إلا هو عليه توكلت",
        "🤲 اللهم صل على محمد وعلى آل محمد",
        "🤲 اللهم إني أسألك العفو والعافية"
    ];
    const morningDhikr = "🌅 أذكار الصباح: سبحان الله وبحمده عدد خلقه";
    const eveningDhikr = "🌙 أذكار المساء: أعوذ بكلمات الله التامات من شر ما خلق";

    let hadithIndex = 0, duaIndex = 0;
    let duaInterval;

    async function loadCities() {
        try {
            const response = await fetch('https://habous-prayer-times-api.onrender.com/api/v1/available-cities');
            if (!response.ok) throw new Error('فشل في تحميل المدن');
            const data = await response.json();
            citiesList = data.cities || [];
            const citySelect = document.getElementById('citySelect');
            citySelect.innerHTML = '<option value="">📌 اختر المدينة</option>';
            citiesList.forEach(city => {
                const option = document.createElement('option');
                option.value = city.id;
                option.textContent = city.name;
                citySelect.appendChild(option);
            });
            const savedCity = localStorage.getItem('selectedCityId');
            if (savedCity && citiesList.find(c => c.id == savedCity)) {
                citySelect.value = savedCity;
                await loadPrayerTimes(savedCity);
            } else if (citiesList.length > 0) {
                await loadPrayerTimes(citiesList[0].id);
            }
        } catch (error) {
            console.error('خطأ في تحميل المدن:', error);
            document.getElementById('citySelect').innerHTML = '<option value="">⚠️ خطأ في التحميل</option>';
        }
    }

    async function loadPrayerTimes(cityId) {
        if (!cityId || !isAutoMode) return;
        currentCityId = cityId;
        localStorage.setItem('selectedCityId', cityId);
        try {
            const response = await fetch(`https://habous-prayer-times-api.onrender.com/api/v1/prayer-times?cityId=${cityId}`);
            if (!response.ok) throw new Error('فشل في تحميل أوقات الصلاة');
            const data = await response.json();
            if (data.data && data.data.timings) {
                const timings = data.data.timings;
                prayerTimes = {
                    الفجر: { adhan: timings.Fajr || "05:20", iqama: timings.Sunrise || timings.Fajr || "05:40" },
                    الظهر: { adhan: timings.Dhuhr || "13:00", iqama: timings.Dhuhr || "13:15" },
                    العصر: { adhan: timings.Asr || "16:30", iqama: timings.Asr || "16:45" },
                    المغرب: { adhan: timings.Maghrib || "18:45", iqama: timings.Maghrib || "19:00" },
                    العشاء: { adhan: timings.Isha || "20:15", iqama: timings.Isha || "20:30" }
                };
                renderPrayerTimes();
            }
        } catch (error) {
            console.error('خطأ في تحميل أوقات الصلاة:', error);
        }
    }

    function formatEnglishNumber(num) {
        return num.toString();
    }

    function updateDateTime() {
        const now = new Date();
        const day = formatEnglishNumber(now.getDate());
        const month = now.toLocaleString('ar', { month: 'long' });
        const year = formatEnglishNumber(now.getFullYear());
        document.getElementById('gregorianDate').innerHTML = `📅 ${day} ${month} ${year}`;
        
        const hours = formatEnglishNumber(now.getHours().toString().padStart(2,'0'));
        const minutes = formatEnglishNumber(now.getMinutes().toString().padStart(2,'0'));
        const seconds = formatEnglishNumber(now.getSeconds().toString().padStart(2,'0'));
        document.getElementById('liveClock').innerHTML = `${hours}:${minutes}:${seconds}`;
        
        try {
            const hijri = new Intl.DateTimeFormat('ar-TN-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(now);
            document.getElementById('hijriDate').innerHTML = `📖 ${hijri} هـ`;
        } catch(e) {
            document.getElementById('hijriDate').innerHTML = `📖 التاريخ الهجري`;
        }
        
        const hour = now.getHours();
        const dhikrElement = document.getElementById('timeDhikr');
        if (hour >= 6 && hour < 12) dhikrElement.innerHTML = morningDhikr;
        else if (hour >= 18 || hour < 5) dhikrElement.innerHTML = eveningDhikr;
        else dhikrElement.innerHTML = "🕌 سبحان الله والحمد لله";
    }

    function renderPrayerTimes() {
        const grid = document.getElementById('prayerGrid');
        if (!grid) return;
        grid.innerHTML = "";
        const now = new Date();
        const currentTime = `${formatEnglishNumber(now.getHours().toString().padStart(2,'0'))}:${formatEnglishNumber(now.getMinutes().toString().padStart(2,'0'))}`;
        for (let [name, times] of Object.entries(prayerTimes)) {
            const card = document.createElement('div');
            card.className = 'prayer-card';
            if (currentTime >= times.adhan && currentTime < times.iqama) {
                card.classList.add('active-prayer');
            }
            card.innerHTML = `
                <div class="prayer-name">${name}</div>
                <div class="adhan-time">${times.adhan}</div>
                <div class="iqama-time">إقامة ${times.iqama}</div>
            `;
            grid.appendChild(card);
        }
    }

    function getNextPrayerTime() {
        const now = new Date();
        let next = null;
        let nextName = "";
        for (let [name, times] of Object.entries(prayerTimes)) {
            const [hour, minute] = times.adhan.split(':').map(Number);
            let prayerDate = new Date();
            prayerDate.setHours(hour, minute, 0, 0);
            if (prayerDate > now) {
                if (!next || prayerDate < next) {
                    next = prayerDate;
                    nextName = name;
                }
            }
        }
        if (!next) {
            const first = Object.entries(prayerTimes)[0];
            const [hour, minute] = first[1].adhan.split(':').map(Number);
            next = new Date();
            next.setDate(next.getDate() + 1);
            next.setHours(hour, minute, 0, 0);
            nextName = first[0];
        }
        return { next, nextName };
    }

    function updateCountdowns() {
        const now = new Date();
        const { next, nextName } = getNextPrayerTime();
        const diffSec = Math.floor((next - now) / 1000);
        if (diffSec <= 5 && diffSec > -10) {
            document.getElementById('nextPrayerCountdown').innerHTML = `🔔 وقت صلاة ${nextName} الآن 🔔`;
        } else if (diffSec > 0) {
            const mins = Math.floor(diffSec / 60);
            const secs = diffSec % 60;
            document.getElementById('nextPrayerCountdown').innerHTML = `⏳ متبقي لصلاة ${nextName}: ${formatEnglishNumber(mins)} دقيقة ${formatEnglishNumber(secs)} ثانية`;
        }
    }

    function playSound(type) {
        if (!soundEnabled) return;
        console.log(`تشغيل صوت: ${type} (مستوى الصوت ${volumeLevel}%)`);
    }

    function adjustVolume(delta) {
        volumeLevel = Math.min(100, Math.max(0, volumeLevel + delta));
        alert(`🔊 مستوى الصوت: ${volumeLevel}%`);
    }

    function applyPrayerCardStyle() {
        document.documentElement.style.setProperty('--prayer-card-bg', document.getElementById('prayerCardBg').value);
        document.documentElement.style.setProperty('--prayer-text-color', document.getElementById('prayerTextColor').value);
        document.documentElement.style.setProperty('--prayer-border-radius', document.getElementById('prayerBorderRadius').value);
        document.documentElement.style.setProperty('--prayer-card-size', document.getElementById('prayerCardSize').value);
        document.documentElement.style.setProperty('--show-iqama', document.getElementById('showIqamaToggle').value);
        renderPrayerTimes();
    }

    function applyTheme() {
        const themeColor = document.getElementById('themeColor').value;
        document.documentElement.style.setProperty('--primary-color', themeColor);
    }

    function applyBackground() {
        const color = document.getElementById('bgColorPicker').value;
        const file = document.getElementById('bgImageUpload').files[0];
        const dashboard = document.getElementById('dashboard');
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                dashboard.style.backgroundImage = `url('${e.target.result}')`;
                dashboard.style.backgroundColor = color;
            };
            reader.readAsDataURL(file);
        } else {
            dashboard.style.backgroundImage = 'none';
            dashboard.style.backgroundColor = color;
        }
    }

    function setDayMode() {
        const dashboard = document.getElementById('dashboard');
        dashboard.style.backgroundImage = "linear-gradient(135deg, #fdf5e6, #f0e6d0)";
        dashboard.style.backgroundColor = "#fdf5e6";
        dashboard.style.color = "#2c3e2b";
        dashboard.style.textShadow = "none";
    }

    function setNightMode() {
        location.reload();
    }

    function updateTickerSpeed() {
        const speed = document.getElementById('tickerSpeed').value;
        document.getElementById('tickerContainer').style.setProperty('--ticker-speed', `${speed}s`);
    }

    function updateDuaSpeed() {
        const speed = parseFloat(document.getElementById('duaSpeed').value);
        if (duaInterval) clearInterval(duaInterval);
        duaInterval = setInterval(() => {
            duaIndex = (duaIndex + 1) % duaList.length;
            document.getElementById('duaRotator').innerHTML = duaList[duaIndex];
        }, speed * 1000);
    }

    function toggleTimeMode() {
        const mode = document.getElementById('timeModeSelect').value;
        const manualSection = document.getElementById('manualTimesSection');
        isAutoMode = mode === 'auto';
        manualSection.style.display = isAutoMode ? 'none' : 'block';
        if (isAutoMode && currentCityId) {
            loadPrayerTimes(currentCityId);
        }
    }

    function saveManualTimes() {
        prayerTimes = {
            الفجر: { adhan: document.getElementById('fajrAdhan').value, iqama: document.getElementById('fajrIqama').value },
            الظهر: { adhan: document.getElementById('dhuhrAdhan').value, iqama: document.getElementById('dhuhrIqama').value },
            العصر: { adhan: document.getElementById('asrAdhan').value, iqama: document.getElementById('asrIqama').value },
            المغرب: { adhan: document.getElementById('maghribAdhan').value, iqama: document.getElementById('maghribIqama').value },
            العشاء: { adhan: document.getElementById('ishaAdhan').value, iqama: document.getElementById('ishaIqama').value }
        };
        renderPrayerTimes();
        alert("✅ تم حفظ أوقات الصلاة بنجاح");
    }

    function openSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    function scrollSettings(direction) {
        const panel = document.getElementById('settingsPanel');
        panel.scrollBy({ top: direction === 'up' ? -150 : 150, behavior: 'smooth' });
    }

    function initEventListeners() {
        const menuBtn = document.getElementById('menuBtn');
        if (menuBtn) menuBtn.onclick = openSettings;
        
        const closeSettings = document.getElementById('closeSettings');
        if (closeSettings) closeSettings.onclick = () => document.getElementById('settingsPanel').style.display = 'none';
        
        const volumeUpBtn = document.getElementById('volumeUpBtn');
        if (volumeUpBtn) volumeUpBtn.onclick = () => adjustVolume(10);
        
        const volumeDownBtn = document.getElementById('volumeDownBtn');
        if (volumeDownBtn) volumeDownBtn.onclick = () => adjustVolume(-10);
        
        const dayModeBtn = document.getElementById('dayModeBtn');
        if (dayModeBtn) dayModeBtn.onclick = setDayMode;
        
        const nightModeBtn = document.getElementById('nightModeBtn');
        if (nightModeBtn) nightModeBtn.onclick = setNightMode;
        
        const themeColor = document.getElementById('themeColor');
        if (themeColor) themeColor.onchange = applyTheme;
        
        const bgColorPicker = document.getElementById('bgColorPicker');
        if (bgColorPicker) bgColorPicker.onchange = applyBackground;
        
        const bgImageUpload = document.getElementById('bgImageUpload');
        if (bgImageUpload) bgImageUpload.onchange = applyBackground;
        
        const tickerSpeed = document.getElementById('tickerSpeed');
        if (tickerSpeed) tickerSpeed.onchange = updateTickerSpeed;
        
        const duaSpeed = document.getElementById('duaSpeed');
        if (duaSpeed) duaSpeed.onchange = updateDuaSpeed;
        
        const timeModeSelect = document.getElementById('timeModeSelect');
        if (timeModeSelect) timeModeSelect.onchange = toggleTimeMode;
        
        const saveManualTimesBtn = document.getElementById('saveManualTimesBtn');
        if (saveManualTimesBtn) saveManualTimesBtn.onclick = saveManualTimes;
        
        const announcementsToggle = document.getElementById('announcementsToggle');
        if (announcementsToggle) announcementsToggle.onchange = (e) => { announcementsMode = e.target.value; };
        
        const citySelect = document.getElementById('citySelect');
        if (citySelect) citySelect.onchange = (e) => loadPrayerTimes(e.target.value);
        
        const scrollUpBtn = document.getElementById('scrollUpBtn');
        if (scrollUpBtn) scrollUpBtn.onclick = () => scrollSettings('up');
        
        const scrollDownBtn = document.getElementById('scrollDownBtn');
        if (scrollDownBtn) scrollDownBtn.onclick = () => scrollSettings('down');
        
        const prayerCardBg = document.getElementById('prayerCardBg');
        if (prayerCardBg) prayerCardBg.onchange = applyPrayerCardStyle;
        
        const prayerTextColor = document.getElementById('prayerTextColor');
        if (prayerTextColor) prayerTextColor.onchange = applyPrayerCardStyle;
        
        const prayerBorderRadius = document.getElementById('prayerBorderRadius');
        if (prayerBorderRadius) prayerBorderRadius.onchange = applyPrayerCardStyle;
        
        const prayerCardSize = document.getElementById('prayerCardSize');
        if (prayerCardSize) prayerCardSize.onchange = applyPrayerCardStyle;
        
        const showIqamaToggle = document.getElementById('showIqamaToggle');
        if (showIqamaToggle) showIqamaToggle.onchange = applyPrayerCardStyle;
    }

    loadCities();
    updateDateTime();
    renderPrayerTimes();
    initEventListeners();
    
    setInterval(() => {
        updateDateTime();
        updateCountdowns();
        renderPrayerTimes();
    }, 1000);
    
    setInterval(() => {
        hadithIndex = (hadithIndex + 1) % hadithList.length;
        document.getElementById('hadithTicker').innerHTML = hadithList[hadithIndex];
    }, 8000);
    
    updateDuaSpeed();
    applyTheme();
</script>
</body>
</html>
